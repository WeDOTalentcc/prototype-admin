name: Settings Audit Sensors (2026-05-24)

# Registrado 2026-05-24 (sessão auditoria menu Configurações).
# Modelado em .github/workflows/pydantic-conventions-sensors.yml.
#
# 5 sensores canonical permanentes (todos em baseline 0 quando criados):
#   1. check_proxy_canonical.py — proxy routes sem helper canonical (Bug 1)
#   2. check_tool_wrapper.py — tools sem wrapper _context (Bug 3)
#   3. check_settings_dispatch.py — settings panels sem dispatchEvent (Bug 6)
#   4. check_alembic_singlehead.py — alembic_version multi-head (Bug 2)
#   5. check_chat_context_hint.py — ChatContextType sem mapping (Bug 5)
#
# Baseline 2026-05-24 (todos zerados nesta sessão):
#   1: 1→0  ✅
#   2: 28→0 ✅
#   3: 45→0 ✅
#   4: 0→0  ✅
#   5: 5→0  ✅
#
# Promovido a BLOCKING imediato — qualquer nova violação bloqueia CI.

on:
  push:
    branches: [main, develop, "feat/**", "fix/**"]
  pull_request:
    branches: [main, develop]
    paths:
      - "lia-agent-system/**"
      - "plataforma-lia/**"
      - ".github/workflows/settings-audit-sensors-2026-05-24.yml"

concurrency:
  group: settings-audit-sensors-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-sensors:
    name: Backend sensors 2+4 (tool wrapper + alembic singlehead, BLOCKING)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lia-agent-system
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal deps for sensor 4 (alembic singlehead)
        run: pip install sqlalchemy asyncpg

      - name: Sensor 2 — tools sem wrapper _context (BLOCKING, baseline 0)
        run: python3 scripts/check_tool_wrapper.py --blocking

      - name: Sensor 4 — alembic_version multi-head (BLOCKING, baseline 0, skipped if no DATABASE_URL)
        run: python3 scripts/check_alembic_singlehead.py --blocking
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || '' }}

  frontend-sensors:
    name: Frontend sensors 1+3+5 (proxy + dispatch + chat hint, BLOCKING)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plataforma-lia
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sensor 1 — proxy routes sem helper canonical (BLOCKING, baseline 0)
        run: python3 scripts/check_proxy_canonical.py --blocking

      - name: Sensor 3 — settings panels sem dispatch chat (BLOCKING, baseline 0)
        run: python3 scripts/check_settings_dispatch.py --blocking

      - name: Sensor 5 — ChatContextType sem domain_hint (BLOCKING, baseline 0)
        run: python3 scripts/check_chat_context_hint.py --blocking
