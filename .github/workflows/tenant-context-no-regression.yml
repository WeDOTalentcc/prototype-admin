name: Tenant-Context No-Regression (daily)

# Task #986 — roda diariamente o eval criado na Task #977
# (lia-agent-system/eval/tenant_context_no_regression_eval.py) contra um
# backend efêmero. Falha o build se qualquer cenário FAIL e notifica o Slack.
#
# Trigger: cron diário 06:00 UTC (~03:00 BRT) + workflow_dispatch manual.
# Mantido isolado dos workflows pesados (`ci.yml.disabled`) para feedback rápido
# de regressão de tenant-context.

on:
  schedule:
    # Diário às 06:00 UTC.
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      agent:
        description: "Filtrar por agente (opcional, ex: wizard)"
        required: false
        default: ""
      case_id:
        description: "Rodar apenas um cenário (opcional, ex: TCNR-WZ-001)"
        required: false
        default: ""

concurrency:
  group: tenant-context-no-regression-${{ github.ref }}
  cancel-in-progress: false

jobs:
  no-regression:
    name: tenant-context no-regression eval
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: lia-agent-system

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: lia
          POSTGRES_PASSWORD: lia
          POSTGRES_DB: lia
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lia -d lia"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      APP_ENV: test
      SECRET_KEY: ci-test-secret-key-not-for-production
      DATABASE_URL: postgresql+asyncpg://lia:lia@localhost:5432/lia
      SYNC_DATABASE_URL: postgresql://lia:lia@localhost:5432/lia
      REDIS_URL: redis://localhost:6379/0
      API_PORT: "8000"
      LIA_BACKEND_URL: http://localhost:8000
      LIA_AGENT_TENANT_STRICT: "true"
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install runtime dependencies
        run: pip install -r requirements.txt

      - name: Install internal libs
        run: |
          pip install --no-cache-dir \
            -e libs/config \
            -e libs/utils \
            -e libs/audit \
            -e libs/messaging \
            -e libs/models \
            -e libs/agents-core \
            -e libs/services \
            -e libs/contexts \
            -e libs/auth

      - name: Apply database migrations
        run: alembic upgrade head

      - name: Start FastAPI backend (background)
        run: |
          mkdir -p .ci-logs
          nohup uvicorn app.main:app --host 0.0.0.0 --port 8000 \
            > .ci-logs/backend.log 2>&1 &
          echo $! > .ci-logs/backend.pid

      - name: Wait for backend health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8000/api/v1/health > /dev/null 2>&1; then
              echo "Backend up after ${i}s"
              exit 0
            fi
            sleep 2
          done
          echo "::error::Backend failed to come up in 120s"
          tail -n 200 .ci-logs/backend.log || true
          exit 1

      - name: Run tenant-context no-regression eval
        id: eval
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.case_id }}" ]; then
            ARGS="$ARGS --id ${{ github.event.inputs.case_id }}"
          fi
          if [ -n "${{ github.event.inputs.agent }}" ]; then
            ARGS="$ARGS --agent ${{ github.event.inputs.agent }}"
          fi
          python eval/tenant_context_no_regression_eval.py \
            --url http://localhost:8000 \
            --verbose \
            $ARGS

      - name: Stop backend
        if: always()
        run: |
          if [ -f .ci-logs/backend.pid ]; then
            kill "$(cat .ci-logs/backend.pid)" || true
          fi

      - name: Upload eval result JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tenant-context-no-regression-${{ github.run_id }}
          path: |
            lia-agent-system/eval/tenant_context_no_regression_*.json
            lia-agent-system/.ci-logs/backend.log
          if-no-files-found: warn
          retention-days: 30

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "::warning::SLACK_WEBHOOK_URL secret not configured — skipping Slack notification"
            exit 0
          fi
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          PAYLOAD=$(cat <<EOF
          {
            "text": ":rotating_light: Tenant-context no-regression FAILED (Task #986)",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*:rotating_light: Tenant-context no-regression FAILED*\nA suite diária da Task #977 detectou regressão (\"LIA esquece a empresa\" ou erro de transporte).\n\n*Run:* <${RUN_URL}|#${GITHUB_RUN_NUMBER}>\n*Repo:* ${GITHUB_REPOSITORY}\n*Branch:* ${GITHUB_REF_NAME}\n\nBaixe o artifact \`tenant-context-no-regression-${GITHUB_RUN_ID}\` para o JSON detalhado."
                }
              }
            ]
          }
          EOF
          )
          curl -fsS -X POST -H 'Content-type: application/json' \
            --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"
