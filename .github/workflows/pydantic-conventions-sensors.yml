name: Pydantic Conventions + Smoke Test Sensors

# Registrado 2026-05-20 (Sprint 0 pós-audit E2E).
# Modelado em .github/workflows/adr-001-sensors.yml.
#
# Sensores:
#   - check_pydantic_conventions.py R1+R2+R3+R4 (AST checker, ~1s)
#   - test_endpoint_smoke.py (contract test, ~34s, requires uvicorn local)
#
# Baseline 2026-05-20 (pós Sprint 0 refinement):
#   R1: 694 violations (legacy, migration gradual Sprint 4+)
#   R2: 139 violations (request body schemas com company_id, Sprint 4+)
#   R3: 0 violations ✅ (mantém em 0 — sensor blocking)
#   R4: 29 violations (anti-pattern x_company_id Header, Sprint 1 refactor)
#   Smoke test: 1789/1798 passed (99.5%, 9 bugs em backlog)
#
# Modo atual: WARN-ONLY. Promover pra BLOCKING quando:
#   R4 → 0 (após Sprint 1 #40 refactor — REGRA 6 CLAUDE.md)
#   Smoke test pass rate → 100% (após Sprint 3 DB fixes)

on:
  push:
    branches: [main, develop, "feat/**", "fix/**"]
  pull_request:
    branches: [main, develop]
    paths:
      - "lia-agent-system/**"
      - ".github/workflows/pydantic-conventions-sensors.yml"

concurrency:
  group: pydantic-conventions-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pydantic-conventions:
    name: Pydantic Conventions R1+R2+R3+R4 (AST checker, warn-only)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lia-agent-system
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: R1+R2+R3+R4 — Pydantic Conventions canonical
        run: |
          # Warn-only inicialmente (baseline: R1=694, R2=139, R3=0, R4=29).
          # Output otimizado pra consumo de LLM (mensagens com fix sugerido em PT-BR).
          # Promover pra blocking quando R4 → 0 (após Sprint 1).
          python3 scripts/check_pydantic_conventions.py app/ || true

      - name: R3 specifically (blocking)
        run: |
          # R3 (UUID+Path pattern combo) já está em 0 violations.
          # Falha hard se alguém reintroduzir o anti-pattern.
          OUTPUT=$(python3 scripts/check_pydantic_conventions.py app/ 2>&1)
          if echo "$OUTPUT" | grep -q "R3 violation"; then
            echo "❌ R3 regression detected (UUID+Path pattern combo)"
            echo "$OUTPUT" | grep -A 10 "R3 violation" | head -20
            exit 1
          fi
          echo "✅ R3 maintained at 0 violations"
