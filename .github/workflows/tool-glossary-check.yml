name: Tool/Action Glossary Freshness

# Task #733 — Enforce that lia-agent-system/docs/GLOSSARIO_ACTIONS_TOOLS.md
# stays in sync with the tool/action source code.
#
# Reproduce locally:
#   cd lia-agent-system
#   python scripts/generate_tool_action_glossary.py --check
#
# To fix a stale glossary:
#   cd lia-agent-system
#   python scripts/generate_tool_action_glossary.py
#   git add docs/GLOSSARIO_ACTIONS_TOOLS.md && git commit

on:
  push:
    paths:
      - "lia-agent-system/scripts/generate_tool_action_glossary.py"
      - "lia-agent-system/docs/GLOSSARIO_ACTIONS_TOOLS.md"
      - "lia-agent-system/app/tools/**"
      - "lia-agent-system/app/domains/**/tools/**"
      - "lia-agent-system/app/domains/**/actions.py"
      - "lia-agent-system/app/domains/**/domain.py"
      - ".github/workflows/tool-glossary-check.yml"
  pull_request:
    paths:
      - "lia-agent-system/scripts/generate_tool_action_glossary.py"
      - "lia-agent-system/docs/GLOSSARIO_ACTIONS_TOOLS.md"
      - "lia-agent-system/app/tools/**"
      - "lia-agent-system/app/domains/**/tools/**"
      - "lia-agent-system/app/domains/**/actions.py"
      - "lia-agent-system/app/domains/**/domain.py"
      - ".github/workflows/tool-glossary-check.yml"

concurrency:
  group: tool-glossary-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  glossary-freshness:
    name: Tool/Action glossary — check freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install generator dependencies
        run: pip install pyyaml

      - name: Check glossary freshness
        working-directory: lia-agent-system
        run: |
          if ! python scripts/generate_tool_action_glossary.py --check; then
            echo "::error file=lia-agent-system/docs/GLOSSARIO_ACTIONS_TOOLS.md::Glossary is stale. Run 'cd lia-agent-system && python scripts/generate_tool_action_glossary.py' and commit the regenerated docs/GLOSSARIO_ACTIONS_TOOLS.md."
            exit 1
          fi
