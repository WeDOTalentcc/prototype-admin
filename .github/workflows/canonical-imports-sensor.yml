name: Canonical Import Paths Sensor

# Auditoria 2026-05-24: sensor canonical-import-paths bloqueia
# `from libs.models.lia_models.X` (drift, 13 sites pré-migração)
# vs `from lia_models.X` (canonical, 727 sites).
#
# Mistura de paths causa Python registrar mesmo módulo 2× em sys.modules
# (names diferentes) → módulo body executa 2× → classes Base registram 2×
# → InvalidRequestError "Table 'X' is already defined for this MetaData
# instance" em request time (vide bug `proactive_actions` 2026-05-24).
#
# Baseline pós-migração: 0 violations. Workflow blocking.

on:
  push:
    branches: [main, develop, "feat/**", "fix/**"]
  pull_request:
    branches: [main, develop]
    paths:
      - "lia-agent-system/**"
      - ".github/workflows/canonical-imports-sensor.yml"

concurrency:
  group: canonical-imports-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sensor:
    name: Canonical import paths (no libs.models.lia_models.* drift)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lia-agent-system
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sensor — imports MUST use canonical short path
        run: |
          # Blocking. Baseline 0 violations pós-migração 2026-05-24.
          # Escape hatch: comment `# CANONICAL-IMPORT-EXEMPT: <reason>`
          # na mesma linha do import (raro — só pra dependency cycles).
          python3 scripts/check_canonical_import_paths.py --blocking
