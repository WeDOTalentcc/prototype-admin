name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # в”Ђв”Ђ Backend (FastAPI / Python) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  backend:
    name: Backend вЂ” Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lia-agent-system

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install dev tools
        run: pip install -r requirements-dev.txt

      - name: Install internal libs
        run: |
          pip install --no-cache-dir \
            -e libs/config \
            -e libs/utils \
            -e libs/audit \
            -e libs/messaging \
            -e libs/models \
            -e libs/agents-core \
            -e libs/services \
            -e libs/contexts \
            -e libs/auth

      - name: Lint with ruff
        run: ruff check app/ --output-format=github

      - name: Type check with mypy
        run: mypy app/ --ignore-missing-imports --no-error-summary

      - name: Verify LangSmith config
        run: python -c "from app.config.langsmith import configure_langsmith, is_langsmith_enabled; print('LangSmith enabled:', is_langsmith_enabled())"
        env:
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
        continue-on-error: true

      - name: Run tests
        # Coverage gate: 27% (13/03/2026 вЂ” realinhado com pytest.ini). ProgressГЈo: 25%в†’29%в†’32%в†’27%в†’34%в†’40%в†’80%.
        # tests/e2e/ e tests/test_agents/ requerem servidor ativo вЂ” nГЈo rodam em CI sem infra.
        run: pytest tests/ -x -q --timeout=60 --cov=app --cov-report=term-missing --cov-fail-under=27 --ignore=tests/e2e --ignore=tests/test_agents --ignore=tests/load
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          SECRET_KEY: "ci-test-secret-key-not-for-production"
          APP_ENV: "test"

      - name: Run contract tests
        run: pytest tests/contract/ -v --timeout=60

      - name: Run fairness tests
        run: pytest tests/fairness/ -v --timeout=60
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          SECRET_KEY: "ci-test-secret-key-not-for-production"
          APP_ENV: "test"

      - name: Run integration tests (Sprint K2)
        run: pytest tests/integration/ -v --no-cov --timeout=120 --ignore=tests/integration/test_api_misc_coverage.py
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          SECRET_KEY: "ci-test-secret-key-not-for-production"
          APP_ENV: "test"

  # в”Ђв”Ђ Frontend (Next.js / TypeScript) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  frontend:
    name: Frontend вЂ” Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plataforma-lia

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: plataforma-lia/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint with Biome
        run: npx biome check src/ --reporter=github

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npx vitest run --reporter=verbose
        env:
          CI: true

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_API_URL: http://localhost:8000

  # в”Ђв”Ђ Frontend E2E (Playwright) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  frontend-e2e:
    name: Frontend вЂ” E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [frontend]
    defaults:
      run:
        working-directory: plataforma-lia
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: plataforma-lia/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true
          NEXT_PUBLIC_API_URL: http://localhost:8000

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: plataforma-lia/playwright-report/
          retention-days: 7

  # в”Ђв”Ђ Security (dependency audit) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Audit frontend dependencies
        run: cd plataforma-lia && npm audit --audit-level=high || true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit backend dependencies
        run: cd lia-agent-system && pip-audit -r requirements.txt --ignore-vuln PYSEC-2023-57 || true

  # в”Ђв”Ђ RAGAS вЂ” Qualidade de Respostas RAG (nГЈo-bloqueante) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  ragas-quality-check:
    name: RAGAS Quality Check
    runs-on: ubuntu-latest
    needs: [backend]
    continue-on-error: true
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install pytest pytest-asyncio
        working-directory: lia-agent-system
      - name: Validate RAGAS golden queries structure
        run: python -m pytest tests/ragas/ -v --no-cov
        working-directory: lia-agent-system

  # в”Ђв”Ђ Prompt Evals вЂ” LLM-as-judge (runs on PRs that change prompts) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  prompt-evals:
    name: Prompt Evals (LLM-as-judge)
    runs-on: ubuntu-latest
    needs: [backend]
    # Trigger path filter: only run when prompt files or golden datasets change
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect prompt file changes
        id: prompt-changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            prompts:
              - 'lia-agent-system/app/prompts/**'
              - 'tests/golden/**'
              - 'tests/eval_runner.py'

      - name: Set up Python
        if: steps.prompt-changes.outputs.prompts == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install eval dependencies
        if: steps.prompt-changes.outputs.prompts == 'true'
        run: pip install anthropic pyyaml

      - name: Validate golden dataset structure (always runs if prompts changed)
        if: steps.prompt-changes.outputs.prompts == 'true'
        run: python tests/eval_runner.py --dry-run
        working-directory: .

      - name: Run LLM-as-judge evals (blocks PR on failure)
        if: steps.prompt-changes.outputs.prompts == 'true'
        run: python tests/eval_runner.py --threshold 0.85 --output eval_report.json
        working-directory: .
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Upload eval report
        if: always() && steps.prompt-changes.outputs.prompts == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: prompt-eval-report
          path: eval_report.json
          retention-days: 30

  # в”Ђв”Ђ Acessibilidade вЂ” Axe-core WCAG 2.1 AA (nГЈo-bloqueante) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  accessibility-check:
    name: Accessibility Check (WCAG 2.1 AA)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install axe-core CLI
        run: npm install -g @axe-core/cli
      - name: Check accessibility baseline
        run: echo "Axe-core accessibility check configured вЂ” run against staging URL"
        # TODO: axe https://staging.wedotalent.com --exit
