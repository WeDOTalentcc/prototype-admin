name: Tools Have Canonical Category Sensor

# Registrado 2026-05-24 (Sprint 3 — capability registry canonical).
# Modelado em .github/workflows/silent-tenant-context-sensor.yml.
#
# Enforça contrato Sprint 3: TODO tool registrado em app/tools/__init__.py
# MUST estar mapeado em app/tools/categories.TOOL_TO_CATEGORY. Tools sem
# categoria caem em OTHER → invisíveis ao agrupamento de capabilities do
# system_prompt, e o LLM trata como inexistentes.
#
# Histórico de baseline:
#   2026-05-24 (Sprint 3.2): 88 tools mapeados → 0 em OTHER ✅
#   2026-05-24 (Sprint 3.4): BLOCKING — wired CI
#
# Próximo offender bloqueia o CI. Bypass: adicionar entrada em
# TOOL_TO_CATEGORY com ToolCategory.* apropriado. NÃO há escape hatch.

on:
  push:
    branches: [main, develop, "feat/**", "fix/**"]
  pull_request:
    branches: [main, develop]
    paths:
      - "lia-agent-system/app/tools/**"
      - "lia-agent-system/app/domains/**/tools/**"
      - "lia-agent-system/app/shared/prompts/system_prompt_builder.py"
      - ".github/workflows/tools-have-canonical-category-sensor.yml"

concurrency:
  group: tools-have-canonical-category-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tools-have-canonical-category:
    name: Tools Canonical Category Sensor (BLOCKING, baseline 0)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lia-agent-system
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal deps
        run: |
          pip install --quiet -r requirements.txt || pip install --quiet fastapi pydantic sqlalchemy

      - name: Tools have canonical category sensor (BLOCKING)
        env:
          DATABASE_URL: "postgresql://stub:stub@localhost/stub"
        run: |
          # Promoted to BLOCKING em 2026-05-24 após Sprint 3.2 mapear todos
          # os 88 tools registrados. Detecta:
          #   - tool registrado em app/tools/__init__.py
          #   - sem entrada em TOOL_TO_CATEGORY (categories.py)
          #   → cai em "OTHER" → invisível ao agrupamento de capabilities
          python3 scripts/check_tools_have_category.py --blocking

      - name: Human-readable report (always)
        if: always()
        env:
          DATABASE_URL: "postgresql://stub:stub@localhost/stub"
        run: |
          python3 scripts/check_tools_have_category.py | head -100
