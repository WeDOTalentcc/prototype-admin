name: Wizard E2E Sensors (Nightly)

# Sprint R.4 — canonical wizard bateria 9 sensors run as nightly regression batch.
#
# Roda os 4 testes em tests/wizard/test_canonical_e2e_sensors.py contra um stack
# efêmero (Postgres + Redis + lia-agent-system). Cobre:
#   - test_wizard_initial_stage (intake stage advancement)
#   - test_wizard_hitl_gate_awaiting (HITL gate awaiting_confirmation invariant)
#   - test_wizard_company_id_invariant (multi-tenancy)
#   - test_wizard_5turn_conversation_and_publish (full 6-turn → publish)
#
# Total tempo esperado: ~6 minutos (turn 4 chama LLM real e leva 5+ min).
#
# Por que cron 06:00 UTC: roda APÓS o wizard-e2e-cenario-a (05:30 UTC) para
# escalonar carga LLM. Defesa em profundidade — se o cenário A passar mas a
# bateria 9 falhar, é regressão de invariant (HITL/tenancy/stage) que o cenário
# Playwright não pega.
#
# workflow_dispatch permite trigger manual via GitHub Actions UI.

on:
  schedule:
    - cron: "0 6 * * *"  # 06:00 UTC daily = 03:00 BRT
  workflow_dispatch:

jobs:
  wizard-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      REDIS_URL: redis://localhost:6379/0
      LIA_E2E_SENSORS_ENABLED: "true"
      AI_INTEGRATIONS_ANTHROPIC_BASE_URL: ${{ secrets.AI_PROXY_URL }}
      AI_INTEGRATIONS_ANTHROPIC_API_KEY: ${{ secrets.AI_PROXY_KEY }}
      FIELD_ENCRYPTION_KEY: ${{ secrets.FIELD_ENCRYPTION_KEY }}
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: lia-agent-system/requirements.txt

      - name: Install deps
        working-directory: lia-agent-system
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        working-directory: lia-agent-system
        run: alembic upgrade head

      - name: Start backend
        working-directory: lia-agent-system
        run: |
          python3 -m uvicorn app.main:app --host 0.0.0.0 --port 8001 &
          echo "Waiting for backend to come up..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8001/health >/dev/null 2>&1; then
              echo "Backend ready after ${i} attempt(s)"
              break
            fi
            sleep 2
          done
          curl -sf http://localhost:8001/health || (echo "Backend failed to start" && exit 1)

      - name: Wizard E2E sensors (bateria 9)
        working-directory: lia-agent-system
        run: |
          pytest tests/wizard/test_canonical_e2e_sensors.py \
            -v -s --timeout=720 \
            --tb=short \
            -o log_cli=true -o log_cli_level=INFO

      - name: Upload pytest logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: wizard-nightly-logs
          path: |
            lia-agent-system/*.log
            lia-agent-system/pytest.log
          retention-days: 7
          if-no-files-found: ignore
