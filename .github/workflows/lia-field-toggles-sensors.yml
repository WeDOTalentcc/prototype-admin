name: LIA Field Toggles Sensors

# Registrado 2026-05-21 (audit pos P0-1 + Sensor lint anti-regressão).
# Modelado em .github/workflows/pydantic-conventions-sensors.yml.
#
# Sensores:
#   - check_lia_field_definitions_sync.py — TS↔Python schema-sync (BLOCKING, baseline 0)
#   - check_agent_respects_lia_toggles.py — agentes leem profile.<field> sem
#     o helper canonical build_company_agent_context (BLOCKING, baseline 0)
#   - tests/contract/test_offer_approval_gate.py
#   - tests/contract/test_wsi_effectiveness_gate.py
#   - tests/contract/test_self_scheduling_gate.py
#   - tests/contract/test_lia_field_config_service_canonical.py
#
# Baseline 2026-05-21:
#   schema-sync: 34/34 in sync (BLOCKING — qualquer drift falha o CI)
#   agent-respect: 0 offenders (BLOCKING desde 2026-05-21 — Strict ratchet locked)
#   contract tests: 24/24 passing
#
# Promoção BLOCKING aplicada em 2026-05-21 — step "Strict baseline=0"
# falha o build em qualquer novo offender (allowlist explícita em
# scripts/check_agent_respects_lia_toggles.py com justification).
# Step prévio "Anti-regressão P0-1" segue rodando para gerar relatório
# legível mesmo quando o strict step passa.

on:
  push:
    branches: [main, develop, "feat/**", "fix/**"]
  pull_request:
    branches: [main, develop]
    paths:
      - "lia-agent-system/app/domains/**"
      - "lia-agent-system/app/shared/services/lia_agent_context_builder.py"
      - "lia-agent-system/libs/models/lia_models/lia_field_toggles.py"
      - "lia-agent-system/scripts/check_lia_field_definitions_sync.py"
      - "lia-agent-system/scripts/check_agent_respects_lia_toggles.py"
      - "lia-agent-system/tests/contract/test_offer_approval_gate.py"
      - "lia-agent-system/tests/contract/test_wsi_effectiveness_gate.py"
      - "lia-agent-system/tests/contract/test_self_scheduling_gate.py"
      - "lia-agent-system/tests/contract/test_lia_field_config_service_canonical.py"
      - "plataforma-lia/src/hooks/company/use-company-lia-instructions.ts"
      - ".github/workflows/lia-field-toggles-sensors.yml"

concurrency:
  group: lia-field-toggles-${{ github.ref }}
  cancel-in-progress: true

jobs:
  schema-sync:
    name: Schema-sync TS↔Python (BLOCKING)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lia-agent-system
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: LIA_FIELD_DEFINITIONS (TS) ↔ DEFAULT_FIELD_TOGGLES (Python)
        run: |
          # P2-10 sensor. Baseline: 34/34 in sync. Drift here is silent and
          # devastating — frontend exposes toggle, backend has no row for it.
          # Mensagem do script inclui fix sugerido (LLM-friendly).
          python3 scripts/check_lia_field_definitions_sync.py

  agent-respects-toggles:
    name: Agent respeita lia_field_toggles (BLOCKING via strict step)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lia-agent-system
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Anti-regressão P0-1 — agentes consomem helper canonical
        run: |
          # Heurística conservadora: attribute access apenas. Próxima
          # sprint amplia pra dict-access. Warn-only enquanto matura.
          python3 scripts/check_agent_respects_lia_toggles.py || true

      - name: Strict baseline=0 (audit 2026-05-21, ratchet locked)
        run: |
          # Baseline locked to 0 em 2026-05-21 (final do dia). Os 2 known
          # offenders anteriores (policy_tool_registry + jd_generator_service)
          # foram allowlisted com justificativa documentada — não eram
          # prompt-injection sites, eram template builders / tool dict
          # returns que recebem context filtrado do caller. ALLOWLIST_PREFIXES
          # em scripts/check_agent_respects_lia_toggles.py é o registro
          # canonical das exceções.
          #
          # Daqui pra frente: QUALQUER novo offender (read direto de
          # canonical field em arquivo target NÃO allowlisted) bloqueia
          # o CI. Pra adicionar nova allowlist entry: edit do script
          # COM justification comment + audit trace anchor.
          OUTPUT=$(python3 scripts/check_agent_respects_lia_toggles.py 2>&1 || true)
          COUNT=$(echo "$OUTPUT" | grep -oE '^⚠ [0-9]+' | grep -oE '[0-9]+' | head -1)
          if [ -z "$COUNT" ]; then
            echo "✅ No offenders detected — baseline 0 mantido."
            exit 0
          fi
          echo "❌ Regression: $COUNT new offender(s) introduced."
          echo "$OUTPUT"
          echo ""
          echo "Either migrate the call sites to build_company_agent_context"
          echo "or add the file to ALLOWLIST_PREFIXES with explicit"
          echo "justification (see existing entries for the canonical format)."
          exit 1

  contract-tests:
    name: Policy gates contract tests (BLOCKING)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lia-agent-system
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          # Install only what the contract tests need — they are unit-style
          # with mocks, no DB / external services required. Adjust the pin
          # if the project requires a different install path.
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt 2>/dev/null \
            || pip install -e . 2>/dev/null \
            || echo "⚠ no installable manifest — relying on system python"

      - name: P0-2 + P1-4 + P1-7 + P1-8 + P1-9 contract tests
        run: |
          # 24 testes contract-level. Cobrem hierarquia OfferPolicyGateError,
          # gate-skip logging WSI, fail-safe self-scheduling, shim identity.
          python3 -m pytest \
            tests/contract/test_offer_approval_gate.py \
            tests/contract/test_wsi_effectiveness_gate.py \
            tests/contract/test_self_scheduling_gate.py \
            tests/contract/test_lia_field_config_service_canonical.py \
            --no-header --no-cov -q
