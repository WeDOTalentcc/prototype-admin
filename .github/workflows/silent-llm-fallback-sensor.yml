name: Silent LLM Fallback Sensor

# Registrado 2026-05-21 (Wave 3 P0.D — silent fallback eliminado em 8 sites).
# Modelado em .github/workflows/cross-tenant-sensor.yml.
#
# Enforça REGRA 4 do bloco "Pydantic Conventions" (CLAUDE.md):
# NUNCA `except ...: return template_fallback` em path crítico de IA —
# silent fallback mascara falha do LLM e retorna API HTTP 200 com dados
# falsa-positivos. Padrão canonical é re-raise + log estruturado OU
# retornar response COM flag explícita (`fallback_used: True`,
# `needs_manual_review: True`).
#
# Histórico de baseline:
#   2026-05-21 (Wave 3 C21):  baseline X (sensor criado em --warn-only)
#   2026-05-21 (Wave 3 C25):  Pattern D detection adicionado (return-after-try)
#   2026-05-21 (Wave 3 C29):  6 sites P0.D resolvidos
#   2026-05-21 (Wave 3 C31):  últimos sites resolvidos
#   2026-05-21 (Wave 3 BLOCKING): baseline 0 ✅ — promovido a --blocking
#
# Próximo offender bloqueia o CI. Bypass legítimo: usar canonical pattern
# (re-raise + fallback_used flag) em vez de silent return.

on:
  push:
    branches: [main, develop, "feat/**", "fix/**"]
  pull_request:
    branches: [main, develop]
    paths:
      - "lia-agent-system/**"
      - ".github/workflows/silent-llm-fallback-sensor.yml"

concurrency:
  group: silent-llm-fallback-${{ github.ref }}
  cancel-in-progress: true

jobs:
  silent-llm-fallback:
    name: Silent LLM Fallback Sensor (BLOCKING, baseline 0)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lia-agent-system
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Silent LLM fallback sensor (BLOCKING)
        run: |
          # Promoted to BLOCKING em 2026-05-21 após Wave 3 atingir baseline 0
          # via C29 + C31 (Pattern D eliminado em 8 sites total).
          # Detecta:
          #   - except ...: return <template_string_or_constant>
          #   - except ...: return await _build_template_response(...)
          #   - Pattern D: return-after-try com fallback constant
          # Para path crítico (LLM-driven question_generator, report_generator,
          # wsi prompt, etc), a única resposta canonical em exception é:
          #   (a) raise HTTPException(503, ...) — preferido
          #   (b) return {"data": [], "fallback_used": True, "reason": ...}
          python3 scripts/check_no_silent_llm_fallback.py --root . --blocking

      - name: Human-readable report (always)
        if: always()
        run: |
          python3 scripts/check_no_silent_llm_fallback.py --root . | head -100
