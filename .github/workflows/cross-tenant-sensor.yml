name: Cross-Tenant SQL Sensor

# Registrado 2026-05-21 (audit P0.A sistemico). Sensor BLOCKING que
# detecta queries SELECT/JOIN contra tabelas tenant-scoped (candidates,
# vacancy_candidates, candidate_list_members) sem filtro company_id.
#
# BASELINE 0 LOCKED em 2026-05-21 — P0.A sistemico resolvido.
# Trajetoria: 44 (audit inicial) -> 32 (Sub-sprint B sourcing) ->
# 18 (C cv_screening pipeline) -> 12 (C talent) -> 10 (C kanban) ->
# 6 (D pipeline domain) -> 0 (D jobs_mgmt + diversity + passive).
#
# REGRA canonical (ENFORCED BLOCKING): cada SQL block tocando tenant-scoped
# table DEVE ter company_id em WHERE, OU comment
# '# CROSS-TENANT-EXEMPT: <justification>' nas 5 linhas imediatamente
# acima do block.
#
# Adicionar nova allowlist entry requer:
#   1. Justification comment explicando por que o block nao injeta
#      cross-tenant data.
#   2. Audit trace anchor (audit doc date).
#   3. Inline EXEMPT comment no arquivo target.

on:
  push:
    branches:
      - main
      - develop
      - "feat/**"
      - "fix/**"
  pull_request:

jobs:
  cross-tenant-sql:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cross-tenant SQL sensor (BLOCKING, ratched baseline)
        working-directory: lia-agent-system
        run: |
          # BASELINE 0 LOCKED em 2026-05-21 — P0.A sistemico resolvido
          # (44 sites fixados em 7 arquivos via Sub-sprints A-E).
          # Strict --blocking: QUALQUER novo offender bloqueia o CI.
          python3 scripts/check_no_cross_tenant_query.py \
            --root . \
            --blocking \
            --baseline 0

      - name: Human-readable report (always)
        if: always()
        working-directory: lia-agent-system
        run: |
          python3 scripts/check_no_cross_tenant_query.py --root . | head -100
