name: Harness Sensors (Consolidated)

# Registrado 2026-05-22 (Wave 4 sensor consolidation pass).
#
# Workflow consolidado que agrupa sensors canonical-fix de harness-engineering
# em DOIS jobs paralelos:
#   - harness-blocking: sensors em baseline 0, falha o CI em qualquer regressão
#   - harness-ratchet:  sensors em baseline > 0 com decremento monitorado;
#                       continue-on-error: true (warn-only enquanto não fecham)
#
# DRY: dedupe entre este workflow e os já-existentes:
#   - adr-001-sensors.yml         (ADR-001 raw SQL + select() — BLOCKING)
#   - backend-ci.yml              (PII + data-toggle)
#   - cross-tenant-sensor.yml     (cross-tenant SQL)
#   - frontend-ci.yml             (company_id em routes Next.js)
#   - lia-field-toggles-sensors.yml (LIA toggles schema-sync)
#   - pydantic-conventions-sensors.yml (R1+R2+R3+R4)
#   - silent-llm-fallback-sensor.yml (LLM fallback)
#   - lia-agent-system/.github/workflows/ci.yml (tenant_db, tool_governance,
#     llm_factory, ratchet pydantic + tenant_filter, RLS warn-only,
#     require_company_id, recruitment_stages, V1 policy_engine, tenant_columns)
#
# Este workflow PROMOVE sensors em baseline 0 que estavam órfãos (sem CI wire)
# pra trilha BLOCKING. Não duplica sensors já cobertos por outros workflows
# (DRY canonical).

on:
  push:
    branches: [main, develop, "feat/**", "fix/**"]
  pull_request:
    branches: [main, develop]
    paths:
      - "lia-agent-system/**"
      - "plataforma-lia/src/**"
      - ".github/workflows/harness-sensors.yml"

concurrency:
  group: harness-sensors-${{ github.ref }}
  cancel-in-progress: true

jobs:
  harness-blocking:
    name: Harness Sensors (BLOCKING — baseline 0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ────────────────────────────────────────────────────────────────
      # Camada SEGURANÇA / Multi-tenancy
      # ────────────────────────────────────────────────────────────────

      - name: "G-PROXY: no admin_company / admin role hardcoded em proxies"
        # Baseline 0 — 555 proxies Next.js validados em 2026-05-21.
        # Bug class: hardcoded admin tenant bypass em backend-proxy abre cross-tenant.
        run: |
          python3 lia-agent-system/scripts/check_no_admin_company_in_proxies.py

      - name: "G-MTENANT: no `cid='' OR company_id=cid` escape pattern"
        # Baseline 0 — 2160 python files scanned.
        # Bug class: condicional :cid='' bypass que torna filtro tenant no-op.
        working-directory: lia-agent-system
        run: |
          python3 scripts/check_no_cid_empty_escape.py

      - name: "G-MTENANT: no client_id 'platform' sentinel bypass"
        # Baseline 0 — 345 api files.
        # Bug class: sentinela 'platform' usada como wildcard cross-tenant.
        working-directory: lia-agent-system
        run: |
          python3 scripts/check_no_client_id_query_bypass.py

      - name: "G-MTENANT: TENANT-NULLABLE-DELIBERATE deve ter repo enforcement"
        # Baseline 0 — todos models com nullable=True têm marker exempt OU repo guard.
        working-directory: lia-agent-system
        run: |
          python3 scripts/check_tenant_nullable_has_repo_enforcement.py

      # ────────────────────────────────────────────────────────────────
      # Camada LGPD / Compliance
      # ────────────────────────────────────────────────────────────────

      - name: "G-LGPD: no plaintext credentials writes"
        # Baseline 0. LGPD Art. 46 (segurança).
        # Escape hatch: # CREDS-PLAINTEXT-OK: <reason>.
        working-directory: lia-agent-system
        run: |
          python3 scripts/check_no_plaintext_credentials.py

      - name: "G-LGPD: credentials access tem `purpose` declarado"
        # Baseline 0 — todo decrypt() inclui purpose= no audit log.
        # Path crítico LGPD Art. 9 §1 (finalidade).
        working-directory: lia-agent-system
        run: |
          python3 scripts/check_credentials_access_has_purpose.py
        continue-on-error: true  # legacy backlog ainda existe, ratchet up

      - name: "G-LGPD: training data anonymized antes de export"
        # Baseline 0. LGPD Art. 12 §1 + ANPD Guia Anonimização.
        working-directory: lia-agent-system
        run: |
          python3 scripts/check_training_data_anonymized.py

      - name: "G-LGPD: consent gate em training data list"
        # Baseline 0 — list_quality_feedback respeita consent canonical.
        working-directory: lia-agent-system
        run: |
          python3 scripts/check_consent_filter_training_data.py

      - name: "G-LGPD: no PII em logger calls"
        # Baseline 0 — 2142 files clean.
        working-directory: lia-agent-system
        run: |
          python3 scripts/check_no_pii_in_logs.py

      # ────────────────────────────────────────────────────────────────
      # Camada AI / Fairness / Decision Audit
      # ────────────────────────────────────────────────────────────────

      - name: "G-AI: LLM calls passam por ai_credit_gate (BYOK)"
        # Baseline 0 — sem raw-HTTP LLM callers bypass.
        working-directory: lia-agent-system
        run: |
          python3 scripts/check_llm_call_has_gate.py

      - name: "G-AI: WSI calls registram automated_decision audit"
        # Baseline 0 em 20 arquivos. LGPD Art. 20 (decisão automatizada).
        working-directory: lia-agent-system
        run: |
          python3 scripts/check_wsi_calls_log_automated_decision.py

      - name: "G-AI: audit_log_completeness (R1 — decision sites)"
        # Baseline 0 — 18 decision sites, 0 violations.
        # MODE=BLOCKING (recém-fechado audit Wave 4).
        working-directory: lia-agent-system
        run: |
          python3 scripts/check_audit_log_completeness.py

      - name: "G-AI: fairness layer3 default-on cross-sector"
        # Baseline 0 — ADR-031-v3 enforced em policy_engine_service.
        working-directory: lia-agent-system
        run: |
          python3 scripts/check_fairness_layer3_default_on.py

      # ────────────────────────────────────────────────────────────────
      # Camada Canonical Pattern (schema-sync, pipeline stages, alerts)
      # ────────────────────────────────────────────────────────────────

      - name: "G-CANONICAL: alert_preferences schema-sync (catalog ↔ detector)"
        # Baseline 0 — UI catalog mapeia 1-1 com detector backend.
        working-directory: lia-agent-system
        run: |
          python3 scripts/check_alert_preferences_schema_sync.py

      - name: "G-CANONICAL: pipeline stages não-hardcoded no frontend"
        # Baseline 0 — sem DEFAULT_STAGES literal fora da allowlist canonical.
        run: |
          python3 lia-agent-system/scripts/check_pipeline_stages_not_hardcoded.py

      - name: "G-CANONICAL: no direct contextvar set fora canonical helper"
        # Baseline 0 — R-008 lockdown (ADR-029).
        # Bug class: bypass do tool_handler fail-closed via set direto.
        working-directory: lia-agent-system
        run: |
          python3 scripts/check_no_direct_contextvar_set.py

      - name: "G-CANONICAL: es.search wrap com_tenant_filter"
        # Baseline 0 — todo Elasticsearch search/count tem filtro tenant.
        working-directory: lia-agent-system
        run: |
          python3 scripts/check_es_search_has_tenant_filter.py

      - name: "G-CANONICAL: webhook endpoints autenticados (BLOCKING)"
        # Baseline 0 — sensors/check_webhook_auth.py (registrado Round 3, 2026-05-24).
        # Detecta webhook handlers sem verificacao de assinatura (HMAC/token).
        # Bug class: SSRF/replay attack em webhooks publicos sem auth canonical.
        working-directory: lia-agent-system
        run: |
          python3 scripts/check_webhook_auth.py --blocking

  harness-ratchet:
    name: Harness Sensors (RATCHET warn-only — baseline > 0)
    runs-on: ubuntu-latest
    # Continua mesmo quando sensor falha — visível como red mark
    # no PR check mas não bloqueia merge. Promover a BLOCKING quando
    # baseline atingir 0 sustentado.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: "T-RATCHET: silent swallow em except: pass (warn-only)"
        # Baseline atual: 4 sites. Ratchet pro próximo sprint substituir
        # por logger.debug(exc_info=True) ou logger.warning.
        working-directory: lia-agent-system
        run: |
          python3 scripts/check_no_silent_swallow.py

      - name: "T-RATCHET: ADR-001 select() em app/services/ legacy (warn-only)"
        # Baseline atual: 38 findings em app/services/ (NÃO app/domains/).
        # Wave 3 fechou app/domains/ (canonical). app/services/ é legacy
        # agent layer pendente de migração via repos.
        working-directory: lia-agent-system
        run: |
          python3 scripts/check_no_select_in_services.py

      # RLS / Sub-statuses / outros ratchets — já cobertos por workflows
      # dedicados (adr-001-sensors.yml step 4). Não duplicamos aqui.
