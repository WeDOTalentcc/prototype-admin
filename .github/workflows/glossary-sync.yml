name: Glossary Sync Gate

# Task #692 — Central LIA glossary with automatic sync.
# Fails the build if any term used in the codebase has no definition in docs/GLOSSARY.md.
# Orphan terms (in glossary but not in code) generate a warning, not a failure.
#
# Reproduce locally:
#   python3 scripts/glossary_sync.py --check
# Or:
#   make glossary-sync

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: glossary-sync-${{ github.ref }}
  cancel-in-progress: true

jobs:
  glossary-check:
    name: Glossary Sync — check for undefined terms
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run glossary sync (check mode)
        run: python3 scripts/glossary_sync.py --check

      - name: Upload sync report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: glossary-sync-report
          path: docs/glossary_sync_report.md
          retention-days: 30
