name: Feedback Learning Eval Gate (quality of the learning loop)

# Task #1300 — roda em CI o eval gate dedicado do CICLO DE APRENDIZAGEM de
# feedback:
#   - eval/golden/feedback_learning_quality.jsonl  (tríade canônica:
#     3 positivo + 3 anti-padrão + 3 fairness)
#
# Garante que a qualidade do ciclo "recrutador avalia → a LIA aprende → o
# comportamento muda" (Task #1297) não regrida silenciosamente:
#   - POSITIVO   — preferência legítima aprendida (modalidade/salário/
#     benefícios) DEVE aflorar na sugestão.
#   - ANTI-PADRÃO — o ciclo NUNCA inventa aprendizado sem base, re-sugere
#     valor rejeitado, nem vaza padrão de outro tenant.
#   - FAIRNESS   — aprendizado discriminatório (gênero/idade/aparência) é
#     SEMPRE recusado (mesma barreira do FairnessGuard que o learning_loop
#     aplica antes de persistir).
#
# Threshold do gate: 0.85 (espelha company_settings_prefill / wizard /
# tenant_context). Comportamento fail-CLOSED: qualquer step com exit ≠ 0
# derruba o job e — via branch protection no `main` (Settings → Branches →
# Require status checks → `feedback learning eval gate`) — bloqueia o merge.
# `enforce=false` só vale para `workflow_dispatch` manual (diagnóstico).
#
# A sentinela OFFLINE (sem LLM/backend) que prova fail-alto-em-regressão e a
# barreira de fairness da curadoria roda no job `offline-sentinel` abaixo e
# também em
# `lia-agent-system/tests/integration/agents/test_feedback_learning_golden_gate.py`.

on:
  workflow_dispatch:
    inputs:
      enforce:
        description: "Falhar o job quando o gate falha (default true; 'false' só p/ diagnóstico manual)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  push:
    paths:
      - "lia-agent-system/eval/eval_runner.py"
      - "lia-agent-system/eval/golden/feedback_learning_quality.jsonl"
      - "lia-agent-system/eval/golden/_generate_feedback_learning.py"
      - "lia-agent-system/app/shared/learning/learning_golden_curation_service.py"
      - "lia-agent-system/app/shared/learning/**"
      - "lia-agent-system/app/shared/compliance/fairness_guard.py"
      - "lia-agent-system/app/domains/analytics/services/feedback_service.py"
      - "lia-agent-system/tests/integration/agents/test_feedback_learning_golden_gate.py"
      - ".github/workflows/feedback-learning-eval-gate.yml"

concurrency:
  group: feedback-learning-eval-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # Job 1 — sentinela OFFLINE (rápida, sem backend/LLM/secrets).
  # Prova: tríade canônica + gerador determinístico + fail-alto-em-regressão
  # + barreira de fairness da curadoria.
  # ──────────────────────────────────────────────────────────────────────
  offline-sentinel:
    name: feedback learning offline sentinel
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: lia-agent-system/requirements.txt

      - name: Install backend runtime deps
        working-directory: lia-agent-system
        run: pip install -r requirements.txt

      - name: Install backend internal libs
        working-directory: lia-agent-system
        run: |
          pip install --no-cache-dir \
            -e libs/config \
            -e libs/utils \
            -e libs/audit \
            -e libs/messaging \
            -e libs/models \
            -e libs/schemas \
            -e libs/agents-core \
            -e libs/services

      - name: Dataset is in sync with generator (determinismo)
        working-directory: lia-agent-system
        run: |
          python -m eval.golden._generate_feedback_learning
          if ! git diff --quiet -- eval/golden/feedback_learning_quality.jsonl eval/golden/feedback_learning_quality.meta.json; then
            echo "::error::Dataset golden desatualizado. Regere com 'python -m eval.golden._generate_feedback_learning' e committe."
            git --no-pager diff -- eval/golden/feedback_learning_quality.jsonl
            exit 1
          fi

      - name: Offline sentinel (tríade + fail-alto + fairness)
        working-directory: lia-agent-system
        env:
          LIA_ENV: test
        run: |
          python -m pytest tests/integration/agents/test_feedback_learning_golden_gate.py -q -o addopts=""

  # ──────────────────────────────────────────────────────────────────────
  # Job 2 — gate END-TO-END contra backend real (replay dos 9 casos no chat).
  # ──────────────────────────────────────────────────────────────────────
  gate:
    name: feedback learning eval gate
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: offline-sentinel

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: lia
          POSTGRES_PASSWORD: lia
          POSTGRES_DB: lia
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lia -d lia"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      APP_ENV: development
      ENVIRONMENT: development
      SECRET_KEY: ci-test-secret-key-not-for-production
      DATABASE_URL: postgresql+asyncpg://lia:lia@localhost:5432/lia
      SYNC_DATABASE_URL: postgresql://lia:lia@localhost:5432/lia
      REDIS_URL: redis://localhost:6379/0
      API_PORT: "8001"
      LIA_BACKEND_URL: http://localhost:8001
      LIA_AGENT_TENANT_STRICT: "true"
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: lia-agent-system/requirements.txt

      - name: Install backend runtime deps
        working-directory: lia-agent-system
        run: pip install -r requirements.txt

      - name: Install backend internal libs
        working-directory: lia-agent-system
        run: |
          pip install --no-cache-dir \
            -e libs/config \
            -e libs/utils \
            -e libs/audit \
            -e libs/messaging \
            -e libs/models \
            -e libs/schemas \
            -e libs/agents-core \
            -e libs/services

      - name: Apply database migrations (alembic)
        working-directory: lia-agent-system
        run: alembic upgrade head

      - name: Seed demo company (plataforma data)
        working-directory: lia-agent-system
        run: python scripts/seed_full_platform.py --seed

      - name: Seed demo auth user (demo@wedotalent.com / demo123)
        working-directory: lia-agent-system
        run: |
          python -c "
          import asyncio
          from app.auth.dependencies import ensure_demo_user
          from lia_config.database import AsyncSessionLocal

          async def _run():
              async with AsyncSessionLocal() as db:
                  user = await ensure_demo_user(db)
                  print(f'demo user ready: id={user.id} email={user.email} company_id={user.company_id}')

          asyncio.run(_run())
          "

      - name: Start FastAPI backend (background)
        working-directory: lia-agent-system
        run: |
          mkdir -p .ci-logs
          nohup uvicorn app.main:app --host 0.0.0.0 --port 8001 \
            > .ci-logs/backend.log 2>&1 &
          echo $! > .ci-logs/backend.pid

      - name: Wait for backend health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8001/api/v1/health > /dev/null 2>&1; then
              echo "Backend up after ${i}s"
              exit 0
            fi
            sleep 2
          done
          echo "::error::Backend failed to come up in 120s"
          tail -n 200 lia-agent-system/.ci-logs/backend.log || true
          exit 1

      - name: "Gate — feedback_learning_quality (dataset run)"
        id: fbl_run
        continue-on-error: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.enforce == 'false' }}
        working-directory: lia-agent-system
        run: |
          python -m eval.eval_runner \
            --dataset eval/golden/feedback_learning_quality.jsonl \
            --url "$LIA_BACKEND_URL"

      - name: "Gate — feedback_learning_quality (gate check, threshold 0.85)"
        id: fbl_gate
        continue-on-error: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.enforce == 'false' }}
        working-directory: lia-agent-system
        run: |
          python -m eval.eval_runner --gate eval/golden/feedback_learning_quality.jsonl

      - name: Stop backend
        if: always()
        run: |
          if [ -f lia-agent-system/.ci-logs/backend.pid ]; then
            kill "$(cat lia-agent-system/.ci-logs/backend.pid)" 2>/dev/null || true
          fi

      - name: Upload eval results + gate history + backend log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: feedback-learning-eval-gate-${{ github.run_id }}
          path: |
            lia-agent-system/eval/.gate_history.json
            lia-agent-system/eval/eval_results_*.json
            lia-agent-system/.ci-logs/backend.log
          if-no-files-found: warn
          retention-days: 30

      - name: Aggregate gate result
        if: always()
        run: |
          ENFORCE="${{ github.event.inputs.enforce || 'true' }}"
          RUN="${{ steps.fbl_run.outcome }}"
          GATE="${{ steps.fbl_gate.outcome }}"
          echo "Gate outcomes: run=${RUN} gate=${GATE}"
          FAILED=0
          for outcome in "$RUN" "$GATE"; do
            if [ "$outcome" = "failure" ]; then FAILED=1; fi
          done
          if [ "$FAILED" = "1" ]; then
            if [ "$ENFORCE" = "true" ]; then
              echo "::error::Feedback learning eval gate FAILED and enforce=true — failing job."
              exit 1
            fi
            echo "::warning::Feedback learning eval gate FAILED but enforce=false — job stays green."
          else
            echo "Feedback learning eval gate passed."
          fi
