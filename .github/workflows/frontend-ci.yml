name: CI — Frontend

on:
  push:
    branches: [main, develop]
    paths:
      - 'plataforma-lia/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'plataforma-lia/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint · Test · Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plataforma-lia

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: plataforma-lia/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint (Rules of Hooks sensor)
        # Sensor harness focado: bloqueia `react-hooks/rules-of-hooks` em main.
        # Não quebra a build pela dívida ESLint legada (22 errors pré-existentes
        # em 2026-05-04) — apenas pela classe de bug que crashou o Bulk Import.
        # Quando a dívida for sanada, troque para `npx eslint src` direto.
        # Ver CLAUDE.md § Frontend / React rules-of-hooks discipline.
        run: |
          set -o pipefail
          npx eslint src --no-color 2>&1 | tee /tmp/eslint.out
          if grep -E "rules-of-hooks" /tmp/eslint.out; then
            echo "::error::react-hooks/rules-of-hooks violation detected — see CLAUDE.md"
            exit 1
          fi
          echo "OK: no Rules of Hooks violations"

      - name: Unit & Component tests
        run: npx vitest run --reporter=verbose

      - name: Build
        run: npm run build
