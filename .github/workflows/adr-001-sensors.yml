name: ADR-001 Repository Pattern Sensors

# Lightweight CI workflow that enforces ADR-001 (services MUST NOT contain
# raw SQL or `select(Model)` direct — all DB access via repositories).
#
# Both sensors are blocking (Sprint 7 + Sprint 8 batch 2 promoted them).
# Files marked `# ADR-001-EXEMPT: <reason>` are skipped per the marker.
#
# This workflow is INTENTIONALLY isolated from the heavy `ci.yml.disabled`
# to keep PR feedback fast and the rule enforcement decoupled from the
# broader test pipeline.

on:
  push:
    branches: [main, develop, "feat/**", "fix/**"]
  pull_request:
    branches: [main, develop]
    # T-1129 sealing (Task #1149): Sensores 4 e 5 (RLS coverage + multi-
    # tenant ownership inventory) precisam disparar em QUALQUER PR que
    # toque o backend Python, jobs Celery, schemas Alembic, scripts ou
    # specs/tests. O path filter abaixo é deliberadamente largo —
    # restringi-lo deixaria escapar PRs que adicionem endpoints novos
    # sem _require_company_id, tasks Celery sem TenantAwareTask, queries
    # ES sem with_tenant_filter, chaves Redis sem namespace ou tabelas
    # com company_id sem RLS. Os outros sensores (1-3) toleram a passada
    # extra; o custo é ~1 min de CI por PR.
    paths:
      - "lia-agent-system/**"
      - ".github/workflows/adr-001-sensors.yml"

concurrency:
  group: adr-001-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sensors:
    name: ADR-001 + Canonical Sensors (raw SQL + select direct + wizard domain dup)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lia-agent-system
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sensor 1 — services MUST NOT contain raw SQL inline
        run: |
          # Blocking by default since Sprint 7 (commit 228dae85f).
          # Use `--warn-only` if you legitimately need to bypass on a stale branch.
          python3 scripts/check_no_sql_inline_in_services.py

      - name: Sensor 2 — services MUST NOT contain select() direct on ORM models
        run: |
          # Blocking by default since Sprint 8 batch 2 (commit 65b033556).
          # Use `--warn-only` if you legitimately need to bypass on a stale branch.
          python3 scripts/check_no_select_in_services.py

      - name: Sensor 3 — canonical wizard domain (Onda 4.D4 PLAN_FIX_wizard_memory_loss)
        run: |
          # Blocking since Onda 4.D4. ADR-CANONICAL-001 documenta as
          # exceptions legacy (job_management/agents/job_wizard_graph.py
          # + wizard_step_service/service.py) com marker CANONICAL-EXEMPT.
          # Use `--warn-only` se ratchet temporario for legitimo.
          python3 scripts/check_no_duplicate_wizard_domain.py

      - name: Sensor 4 — RLS coverage (ADR-030 v2 / T-1129 sealing)
        run: |
          # Task #1149 (T-1129 sealing, passo 4): promovido de warn-only
          # para `--block`. Toda tabela com `company_id` precisa ter
          # ALTER TABLE ... ENABLE ROW LEVEL SECURITY em alguma migration
          # Alembic. Allowlist: `lia-agent-system/scripts/.rls_allowlist.txt`.
          # Exempções inline: `# RLS-EXEMPT: <reason>` no modelo.
          python3 scripts/check_table_has_rls_policy.py --block

      - name: Sensor 5 — Multi-tenant ownership inventory (T-1129 sealing)
        run: |
          # Task #1149 — 5 asserções AST que selam as 6 camadas de
          # ownership entregues pelas tasks #1129a..f:
          #   (a) endpoints sem _require_company_id
          #   (b) chaves Redis sem company_id namespace
          #   (c) await es.search(...) sem with_tenant_filter
          #   (d) @celery_app.task sem base=TenantAwareTask
          #   (e) cross_tenant_session_legacy ainda referenciado
          python3 -m pytest tests/integration/security/test_multi_tenant_ownership_inventory_t_1129.py -v
