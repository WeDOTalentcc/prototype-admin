name: Chat Capabilities Audit Gate

# Task #672 / Fase 2C P2-4 — regression guard for the chat-capabilities audit.
# Fails the build if any previously-fixed gap (broken handlers, actions
# without handlers, orphan tools, agent-types pointing to unknown domains,
# domains with gaps) is reintroduced, or if the registered-domains count
# drops below the baseline.
#
# Reproduce locally:
#   cd lia-agent-system
#   python3 scripts/ci_audit_gate.py

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-audit-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit-gate:
    name: Audit Gate — chat capabilities
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lia-agent-system
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install internal libs
        run: |
          pip install --no-cache-dir \
            -e libs/config \
            -e libs/utils \
            -e libs/audit \
            -e libs/messaging \
            -e libs/models \
            -e libs/agents-core \
            -e libs/services \
            -e libs/contexts \
            -e libs/auth

      - name: Run chat capabilities audit gate
        run: python3 scripts/ci_audit_gate.py
        env:
          LIA_ALLOW_NON_COMPLIANT_DOMAINS: "1"
          LIA_SKIP_DB: "1"

      - name: Run meta-question detector regression gate (Task #730)
        run: python3 scripts/ci_meta_question_gate.py
        env:
          LIA_SKIP_DB: "1"

      - name: Run forbidden-imports guard (ADR-012 / task #343 / FIX 13)
        run: python3 scripts/check_forbidden_imports.py
        env:
          LIA_SKIP_DB: "1"

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chat-capabilities-audit
          path: lia-agent-system/docs/chat_capabilities_audit.json
          retention-days: 30

      - name: Run production readiness audit (Task #691)
        working-directory: ${{ github.workspace }}
        run: python3 production_readiness_audit.py --production-only
        env:
          LIA_SKIP_DB: "1"

      - name: Upload production readiness report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-readiness-report
          path: production_readiness_report.json
          if-no-files-found: ignore
          retention-days: 30
