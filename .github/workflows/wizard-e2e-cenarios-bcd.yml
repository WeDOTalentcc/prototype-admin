name: Wizard E2E — Cenários B/C/D (daily)

# Task #1057 — sentinela diária dos demais cenários canônicos do wizard:
#   - B: vaga executiva (Diretor de Marketing) — `03-vaga-executiva.spec.ts`
#        (cenário B canônico de "vaga não-técnica"; estagio + operacional já
#         cobertos por 04/05 mas NÃO entram aqui para manter o gate enxuto;
#         se algum regredir o cenário B serve de canário comum por usar a
#         mesma trilha de helpers e o mesmo classificador de tile.)
#   - C: HITL com correção em texto livre — `08-hitl-correcao.spec.ts`
#   - D: edge cases (cancelar / retomar via wizard_session_pin / fallback
#        determinístico do JdEnrichmentService) — `09-edge-cases.spec.ts`
#
# Espelha o workflow `wizard-e2e-cenario-a.yml` em ~98% — única divergência
# significativa: o job D injeta `LIA_JD_ENRICHMENT_TIMEOUT_S=0.001` no
# backend para forçar o caminho de fallback no node `jd_enrichment_node`
# (graph.py L336-374). B e C rodam contra o backend "live".
#
# Trigger: cron diário 06:30 UTC (1h depois do cenário A) + workflow_dispatch.

on:
  schedule:
    - cron: "30 6 * * *"
  workflow_dispatch:
    inputs:
      cenarios:
        description: "Cenários a rodar (CSV — ex.: 'B,C,D' ou 'D' para triagem rápida). Default: todos."
        required: false
        default: "B,C,D"

concurrency:
  group: wizard-e2e-cenarios-bcd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  cenario:
    name: pw-cenario-${{ matrix.cenario }} (wizard e2e)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - cenario: B
            spec: e2e/tests/wizard/03-vaga-executiva.spec.ts
            extra_backend_env: ""
          - cenario: C
            spec: e2e/tests/wizard/08-hitl-correcao.spec.ts
            extra_backend_env: ""
          - cenario: D
            spec: e2e/tests/wizard/09-edge-cases.spec.ts
            # Força o caminho de fallback determinístico do JdEnrichmentService.
            # Subteste D3 fica TOLERANTE quando rodado sem essa env (live OK)
            # mas com ela passa a exercitar de fato o `_fallback_enrichment`.
            extra_backend_env: "LIA_JD_ENRICHMENT_TIMEOUT_S=0.001"

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: lia
          POSTGRES_PASSWORD: lia
          POSTGRES_DB: lia
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lia -d lia"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      APP_ENV: development
      ENVIRONMENT: development
      SECRET_KEY: ci-test-secret-key-not-for-production
      DATABASE_URL: postgresql+asyncpg://lia:lia@localhost:5432/lia
      SYNC_DATABASE_URL: postgresql://lia:lia@localhost:5432/lia
      REDIS_URL: redis://localhost:6379/0
      API_PORT: "8001"
      LIA_BACKEND_URL: http://localhost:8001
      LIA_AGENT_TENANT_STRICT: "true"
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      NODE_ENV: development
      LIA_DEV_AUTO_LOGIN: "true"
      DEV_AUTO_LOGIN_EMAIL: demo@wedotalent.com
      DEV_AUTO_LOGIN_PASSWORD: demo123
      PLAYWRIGHT_BASE_URL: http://localhost:5000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: lia-agent-system/requirements.txt

      - name: Install backend runtime deps
        working-directory: lia-agent-system
        run: pip install -r requirements.txt

      - name: Install backend internal libs
        working-directory: lia-agent-system
        run: |
          pip install --no-cache-dir \
            -e libs/config \
            -e libs/utils \
            -e libs/audit \
            -e libs/messaging \
            -e libs/models \
            -e libs/schemas \
            -e libs/agents-core \
            -e libs/services

      - name: Apply database migrations (alembic)
        working-directory: lia-agent-system
        run: alembic upgrade head

      - name: Seed demo company
        working-directory: lia-agent-system
        run: python scripts/seed_full_platform.py --seed

      - name: Seed demo auth user (demo@wedotalent.com / demo123)
        working-directory: lia-agent-system
        run: |
          python -c "
          import asyncio
          from app.auth.dependencies import ensure_demo_user
          from lia_config.database import AsyncSessionLocal

          async def _run():
              async with AsyncSessionLocal() as db:
                  user = await ensure_demo_user(db)
                  print(f'demo user ready: id={user.id} email={user.email} company_id={user.company_id}')

          asyncio.run(_run())
          "

      - name: Start FastAPI backend (background)
        working-directory: lia-agent-system
        run: |
          mkdir -p .ci-logs
          # Injeta a env extra do cenário (vazio para B/C; timeout=0.001 para D).
          if [ -n "${{ matrix.extra_backend_env }}" ]; then
            export ${{ matrix.extra_backend_env }}
            echo "Injected backend env: ${{ matrix.extra_backend_env }}"
          fi
          nohup uvicorn app.main:app --host 0.0.0.0 --port 8001 \
            > .ci-logs/backend.log 2>&1 &
          echo $! > .ci-logs/backend.pid

      - name: Wait for backend health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8001/api/v1/health > /dev/null 2>&1; then
              echo "Backend up after ${i}s"
              exit 0
            fi
            sleep 2
          done
          echo "::error::Backend failed to come up in 120s"
          tail -n 200 lia-agent-system/.ci-logs/backend.log || true
          exit 1

      - name: Sanity-check demo login
        run: |
          curl -fsS -X POST http://localhost:8001/api/v1/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"demo@wedotalent.com","password":"demo123"}' \
            | python -c 'import json,sys; d=json.load(sys.stdin); assert d.get("access_token") or d.get("data",{}).get("access_token"), f"login response missing access_token: {d}"; print("demo login OK")'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: plataforma-lia/pnpm-lock.yaml

      - name: Install frontend deps
        working-directory: plataforma-lia
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: plataforma-lia
        run: pnpm exec playwright install --with-deps chromium

      - name: Start Next.js frontend (background)
        working-directory: plataforma-lia
        run: |
          mkdir -p .ci-logs
          nohup npm run dev > .ci-logs/frontend.log 2>&1 &
          echo $! > .ci-logs/frontend.pid

      - name: Wait for frontend health
        run: |
          for i in $(seq 1 90); do
            if curl -fsS http://localhost:5000/ > /dev/null 2>&1; then
              echo "Frontend up after ${i}s"
              exit 0
            fi
            sleep 2
          done
          echo "::error::Frontend failed to come up in 180s"
          tail -n 200 plataforma-lia/.ci-logs/frontend.log || true
          exit 1

      - name: Skip if cenário não requisitado (workflow_dispatch)
        id: gate
        run: |
          REQUESTED="${{ github.event.inputs.cenarios || 'B,C,D' }}"
          if echo ",${REQUESTED}," | grep -q ",${{ matrix.cenario }},"; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
            echo "::notice::Cenário ${{ matrix.cenario }} pulado (não está em '${REQUESTED}')"
          fi

      - name: Run pw-cenario-${{ matrix.cenario }}
        if: steps.gate.outputs.run == 'true'
        working-directory: plataforma-lia
        env:
          # Propaga a env extra do cenário para o processo do Playwright
          # também — D3 do spec asserta o sinal de fallback determinístico
          # no DOM apenas quando essa env está setada (process.env check).
          LIA_JD_ENRICHMENT_TIMEOUT_S: ${{ matrix.cenario == 'D' && '0.001' || '' }}
        run: |
          APP_ENV=development pnpm playwright test "${{ matrix.spec }}" \
            --project=desktop-chrome --reporter=list

      - name: Stop backend & frontend
        if: always()
        run: |
          for pidfile in lia-agent-system/.ci-logs/backend.pid plataforma-lia/.ci-logs/frontend.pid; do
            if [ -f "$pidfile" ]; then
              kill "$(cat $pidfile)" 2>/dev/null || true
            fi
          done

      - name: Upload Playwright report + traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pw-cenario-${{ matrix.cenario }}-report-${{ github.run_id }}
          path: |
            plataforma-lia/playwright-report/
            plataforma-lia/test-results/
            lia-agent-system/.ci-logs/backend.log
            plataforma-lia/.ci-logs/frontend.log
          if-no-files-found: warn
          retention-days: 30

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "::warning::SLACK_WEBHOOK_URL secret not configured — skipping"
            exit 0
          fi
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          PAYLOAD=$(cat <<EOF
          {"text":":rotating_light: pw-cenario-${{ matrix.cenario }} FAILED (Task #1057)","blocks":[{"type":"section","text":{"type":"mrkdwn","text":"*Wizard E2E Cenário ${{ matrix.cenario }} FAILED*\n*Run:* <${RUN_URL}|#${GITHUB_RUN_NUMBER}>\n*Spec:* \`${{ matrix.spec }}\`\nBaixe \`pw-cenario-${{ matrix.cenario }}-report-${GITHUB_RUN_ID}\`."}}]}
          EOF
          )
          curl -fsS -X POST -H 'Content-type: application/json' \
            --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"
