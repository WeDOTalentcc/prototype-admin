name: Wizard Eval Gates (no-tenant-leak + pipeline-template + conversational-hitl)

# Task #1063 — roda em CI os 2 eval gates canônicos do wizard que até hoje só
# rodavam manualmente:
#   - eval/golden/wizard_no_tenant_leak.jsonl   (12 cenários, Task #1052 — B1/B2/B3/B4)
#   - eval/golden/wizard_pipeline_template.jsonl (7 cenários, Task #1058 —
#     técnico/operacional/executivo/estágio + retomada + fallback vago)
#
# Sentinela CI dos 4 bugs originais do wizard (B1 "LIA pergunta company_id no
# chat", B2 reset de título, B3 falsa perda de histórico, B4 salary tool re-
# perguntando empresa) e do contrato `pipeline_template` em
# `data.suggestions_data` (Task #1055).
#
# Para que esse workflow vire required-check de fato no `main` é preciso
# configurar branch protection no GitHub (Settings → Branches → main →
# Require status checks). Esse workflow apenas garante que falha ⇒ exit ≠ 0,
# que é o que o branch-protection observa.
#
# Comportamento de bloqueio: por DEFAULT esse workflow é fail-CLOSED — qualquer
# step de gate que retornar exit ≠ 0 derruba o job inteiro, garantindo que o
# branch protection de `main` (Settings → Branches → Require status checks →
# `wizard eval gates`) bloqueie merges com regressão nos 4 bugs originais
# (B1/B2/B3/B4) ou no contrato `pipeline_template`.
#
# D7 (auditoria docs/audits/wizard-job-creation-2026-05.md) — RESOLVIDO via
# Task #1064: o `eval_runner` agora aceita `--transport ws`, abre o WebSocket
# `/api/v1/ws/chat/{session_id}` por caso e agrega `message` +
# `wizard_stage` + `panel_update` no campo scoreado. Os 2 gates passam a
# rodar contra o mesmo transport que o frontend consome — sem isso o REST
# entregava só o prompt HITL terse (~56 chars), sem `parsed_title` /
# `pipeline_template`. O `workflow_dispatch` ainda aceita `enforce=false`
# para diagnóstico manual pontual, mas o default é fail-CLOSED em qualquer
# trigger.
#
# Trigger:
#   - workflow_dispatch (on-demand, com input para escolher quais gates rodar)
#   - push em paths que afetam os gates ou o wizard:
#       * eval_runner / golden datasets dos 2 gates
#       * graph + agente do wizard + sessão
#       * tools de save canônicas
#       * o próprio workflow

on:
  workflow_dispatch:
    inputs:
      gates:
        description: "Gates a rodar (CSV — 'leak,template,hitl,resilience,supervisor,meta' ou subconjunto)"
        required: false
        default: "leak,template,hitl,resilience,supervisor,meta"
      enforce:
        description: "Falhar o job quando o gate falha (default true; usar 'false' só para diagnóstico manual em casos pontuais)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  push:
    paths:
      - "lia-agent-system/eval/eval_runner.py"
      - "lia-agent-system/eval/golden/wizard_no_tenant_leak.jsonl"
      - "lia-agent-system/eval/golden/wizard_pipeline_template.jsonl"
      - "lia-agent-system/eval/golden/wizard_conversational_hitl.jsonl"
      - "lia-agent-system/eval/golden/wizard_conversational_resilience.jsonl"
      - "lia-agent-system/eval/golden/wizard_supervisor_routing.jsonl"
      - "lia-agent-system/eval/golden/wizard_meta_question_global.jsonl"
      - "lia-agent-system/app/shared/llm_models.py"
      - "lia-agent-system/app/domains/job_creation/services/wizard_meta_question_helper.py"
      - "lia-agent-system/app/domains/job_creation/services/intake_intent_classifier.py"
      - "lia-agent-system/app/domains/job_creation/services/wizard_gate_classifier.py"
      - "lia-agent-system/app/domains/job_creation/services/wizard_supervisor_classifier.py"
      - "lia-agent-system/app/prompts/job_creation/gate_classifier.yaml"
      - "lia-agent-system/app/domains/job_creation/**"
      - "lia-agent-system/app/domains/job_management/agents/wizard_react_agent.py"
      - "lia-agent-system/app/orchestrator/cascaded_router.py"
      - "lia-agent-system/app/orchestrator/main_orchestrator.py"
      - ".github/workflows/wizard-eval-gates.yml"

concurrency:
  group: wizard-eval-gates-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gates:
    name: wizard eval gates
    runs-on: ubuntu-latest
    timeout-minutes: 35

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: lia
          POSTGRES_PASSWORD: lia
          POSTGRES_DB: lia
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lia -d lia"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      # Backend env — espelha wizard-e2e-cenario-a.yml (mesmo demo seed,
      # mesma DATABASE_URL, mesma porta).
      APP_ENV: development
      ENVIRONMENT: development
      SECRET_KEY: ci-test-secret-key-not-for-production
      DATABASE_URL: postgresql+asyncpg://lia:lia@localhost:5432/lia
      SYNC_DATABASE_URL: postgresql://lia:lia@localhost:5432/lia
      REDIS_URL: redis://localhost:6379/0
      API_PORT: "8001"
      LIA_BACKEND_URL: http://localhost:8001
      # Mantém o fix canônico da Task #1051 explícito em CI.
      LIA_AGENT_TENANT_STRICT: "true"
      # T2 (Task #1085) — gate LLM-based ON em CI para validar o eval gate
      # `wizard_conversational_hitl` end-to-end (replay contra backend real).
      LIA_WIZARD_LLM_GATES: "true"
      # LLM keys — gates fazem chamada LLM real (igual aos cenários e2e).
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: lia-agent-system/requirements.txt

      - name: Install backend runtime deps
        working-directory: lia-agent-system
        run: pip install -r requirements.txt

      - name: Install backend internal libs
        working-directory: lia-agent-system
        run: |
          pip install --no-cache-dir \
            -e libs/config \
            -e libs/utils \
            -e libs/audit \
            -e libs/messaging \
            -e libs/models \
            -e libs/schemas \
            -e libs/agents-core \
            -e libs/services

      - name: Apply database migrations (alembic)
        working-directory: lia-agent-system
        run: alembic upgrade head

      - name: Seed demo company (plataforma data)
        working-directory: lia-agent-system
        run: python scripts/seed_full_platform.py --seed

      - name: Seed demo auth user (demo@wedotalent.com / demo123)
        working-directory: lia-agent-system
        run: |
          python -c "
          import asyncio
          from app.auth.dependencies import ensure_demo_user
          from lia_config.database import AsyncSessionLocal

          async def _run():
              async with AsyncSessionLocal() as db:
                  user = await ensure_demo_user(db)
                  print(f'demo user ready: id={user.id} email={user.email} company_id={user.company_id}')

          asyncio.run(_run())
          "

      - name: Start FastAPI backend (background)
        working-directory: lia-agent-system
        run: |
          mkdir -p .ci-logs
          nohup uvicorn app.main:app --host 0.0.0.0 --port 8001 \
            > .ci-logs/backend.log 2>&1 &
          echo $! > .ci-logs/backend.pid

      - name: Wait for backend health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8001/api/v1/health > /dev/null 2>&1; then
              echo "Backend up after ${i}s"
              exit 0
            fi
            sleep 2
          done
          echo "::error::Backend failed to come up in 120s"
          tail -n 200 lia-agent-system/.ci-logs/backend.log || true
          exit 1

      # ──────────────────────────────────────────────────────────────────
      # Gate 1 — wizard_no_tenant_leak.jsonl (Task #1052)
      # ──────────────────────────────────────────────────────────────────
      # Steps de gate são fail-CLOSED: qualquer exit ≠ 0 derruba o job e —
      # via branch protection — bloqueia o merge no `main`. O override por
      # `enforce=false` só vale para `workflow_dispatch` manual e está
      # implementado via `continue-on-error` dinâmico abaixo (resolve para
      # `false` em runs de `push`, garantindo gating no caminho de merge).
      - name: "Gate 1 — wizard_no_tenant_leak (dataset run)"
        id: leak_run
        if: ${{ contains(github.event.inputs.gates || 'leak,template', 'leak') }}
        continue-on-error: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.enforce == 'false' }}
        working-directory: lia-agent-system
        run: |
          python -m eval.eval_runner \
            --dataset eval/golden/wizard_no_tenant_leak.jsonl \
            --transport ws \
            --url "$LIA_BACKEND_URL"

      - name: "Gate 1 — wizard_no_tenant_leak (gate check)"
        id: leak_gate
        if: ${{ contains(github.event.inputs.gates || 'leak,template', 'leak') }}
        continue-on-error: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.enforce == 'false' }}
        working-directory: lia-agent-system
        run: |
          python -m eval.eval_runner --gate eval/golden/wizard_no_tenant_leak.jsonl

      # ──────────────────────────────────────────────────────────────────
      # Gate 2 — wizard_pipeline_template.jsonl (Task #1058)
      # ──────────────────────────────────────────────────────────────────
      - name: "Gate 2 — wizard_pipeline_template (dataset run)"
        id: tmpl_run
        if: ${{ contains(github.event.inputs.gates || 'leak,template', 'template') }}
        continue-on-error: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.enforce == 'false' }}
        working-directory: lia-agent-system
        run: |
          python -m eval.eval_runner \
            --dataset eval/golden/wizard_pipeline_template.jsonl \
            --transport ws \
            --url "$LIA_BACKEND_URL"

      - name: "Gate 2 — wizard_pipeline_template (gate check)"
        id: tmpl_gate
        if: ${{ contains(github.event.inputs.gates || 'leak,template,hitl', 'template') }}
        continue-on-error: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.enforce == 'false' }}
        working-directory: lia-agent-system
        run: |
          python -m eval.eval_runner --gate eval/golden/wizard_pipeline_template.jsonl

      # ──────────────────────────────────────────────────────────────────
      # Gate 3 — wizard_conversational_hitl.jsonl (Task #1085 / T2)
      # ──────────────────────────────────────────────────────────────────
      # Sentinela CI do bug "wizard repete 'preciso aprovação' 4× ignorando
      # 'manda bala' / 'tá liberado' / 'fica bom'". Replay dos 5 cenários
      # canônicos contra o backend com `LIA_WIZARD_LLM_GATES=true`.
      - name: "Gate 3 — wizard_conversational_hitl (dataset run)"
        id: hitl_run
        if: ${{ contains(github.event.inputs.gates || 'leak,template,hitl', 'hitl') }}
        continue-on-error: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.enforce == 'false' }}
        working-directory: lia-agent-system
        run: |
          python -m eval.eval_runner \
            --dataset eval/golden/wizard_conversational_hitl.jsonl \
            --transport ws \
            --url "$LIA_BACKEND_URL"

      - name: "Gate 3 — wizard_conversational_hitl (gate check)"
        id: hitl_gate
        if: ${{ contains(github.event.inputs.gates || 'leak,template,hitl', 'hitl') }}
        continue-on-error: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.enforce == 'false' }}
        working-directory: lia-agent-system
        run: |
          python -m eval.eval_runner --gate eval/golden/wizard_conversational_hitl.jsonl

      # ──────────────────────────────────────────────────────────────────
      # Gate 4 — wizard_conversational_resilience.jsonl (Task #1123)
      # ──────────────────────────────────────────────────────────────────
      # Sentinela CI da auditoria D-2026-05: wizard responde a perguntas
      # meta / off-topic / clarification SEM travar, mantém tenant
      # context (Demo Company / Tecnologia) e NUNCA reintroduz B1
      # (pergunta company_id em texto livre). 11 cenários cobrindo
      # jd_enrichment / competency / wsi_questions / review.
      - name: "Gate 4 — wizard_conversational_resilience (dataset run)"
        id: resilience_run
        if: ${{ contains(github.event.inputs.gates || 'leak,template,hitl,resilience', 'resilience') }}
        continue-on-error: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.enforce == 'false' }}
        working-directory: lia-agent-system
        run: |
          python -m eval.eval_runner \
            --dataset eval/golden/wizard_conversational_resilience.jsonl \
            --transport ws \
            --url "$LIA_BACKEND_URL"

      - name: "Gate 4 — wizard_conversational_resilience (gate check)"
        id: resilience_gate
        if: ${{ contains(github.event.inputs.gates || 'leak,template,hitl,resilience', 'resilience') }}
        continue-on-error: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.enforce == 'false' }}
        working-directory: lia-agent-system
        run: |
          python -m eval.eval_runner --gate eval/golden/wizard_conversational_resilience.jsonl

      # ──────────────────────────────────────────────────────────────────
      # Gate 5 — wizard_supervisor_routing.jsonl (Task #1131 / T5.2)
      # ──────────────────────────────────────────────────────────────────
      # Sentinela CI do WizardSupervisorClassifier (Task #1127): 10 cenários
      # cobrindo os 6 intents (continue_current / meta_question / exit_wizard
      # / create_new / resume_draft / edit_published) × stages mistos. Pareia
      # com o workflow `wizard-e2e-supervisor.yml` (5 specs 16-20).
      - name: "Gate 5 — wizard_supervisor_routing (dataset run)"
        id: sup_run
        if: ${{ contains(github.event.inputs.gates || 'leak,template,hitl,resilience,supervisor,meta', 'supervisor') }}
        continue-on-error: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.enforce == 'false' }}
        working-directory: lia-agent-system
        env:
          LIA_WIZARD_SUPERVISOR_CLASSIFIER: "true"
        run: |
          python -m eval.eval_runner \
            --dataset eval/golden/wizard_supervisor_routing.jsonl \
            --transport ws \
            --url "$LIA_BACKEND_URL"

      - name: "Gate 5 — wizard_supervisor_routing (gate check)"
        id: sup_gate
        if: ${{ contains(github.event.inputs.gates || 'leak,template,hitl,resilience,supervisor,meta', 'supervisor') }}
        continue-on-error: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.enforce == 'false' }}
        working-directory: lia-agent-system
        run: |
          python -m eval.eval_runner --gate eval/golden/wizard_supervisor_routing.jsonl

      # ──────────────────────────────────────────────────────────────────
      # Gate 6 — wizard_meta_question_global.jsonl (Task #1131 / T5.2)
      # ──────────────────────────────────────────────────────────────────
      # Sentinela CI do meta-question helper rodando em stages NÃO-gate
      # (intake/bigfive/salary/eligibility/calibration/handoff/publish):
      # garante que o supervisor short-circuita perguntas info em qualquer
      # nó do graph sem confundir com aprovação ou avanço.
      - name: "Gate 6 — wizard_meta_question_global (dataset run)"
        id: meta_run
        if: ${{ contains(github.event.inputs.gates || 'leak,template,hitl,resilience,supervisor,meta', 'meta') }}
        continue-on-error: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.enforce == 'false' }}
        working-directory: lia-agent-system
        env:
          LIA_WIZARD_SUPERVISOR_CLASSIFIER: "true"
        run: |
          python -m eval.eval_runner \
            --dataset eval/golden/wizard_meta_question_global.jsonl \
            --transport ws \
            --url "$LIA_BACKEND_URL"

      - name: "Gate 6 — wizard_meta_question_global (gate check)"
        id: meta_gate
        if: ${{ contains(github.event.inputs.gates || 'leak,template,hitl,resilience,supervisor,meta', 'meta') }}
        continue-on-error: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.enforce == 'false' }}
        working-directory: lia-agent-system
        run: |
          python -m eval.eval_runner --gate eval/golden/wizard_meta_question_global.jsonl

      # ──────────────────────────────────────────────────────────────────
      # Cleanup + artifacts
      # ──────────────────────────────────────────────────────────────────
      - name: Stop backend
        if: always()
        run: |
          if [ -f lia-agent-system/.ci-logs/backend.pid ]; then
            kill "$(cat lia-agent-system/.ci-logs/backend.pid)" 2>/dev/null || true
          fi

      - name: Upload eval results + gate history + backend log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wizard-eval-gates-${{ github.run_id }}
          path: |
            lia-agent-system/eval/.gate_history.json
            lia-agent-system/eval/eval_results_*.json
            lia-agent-system/.ci-logs/backend.log
          if-no-files-found: warn
          retention-days: 30

      # ──────────────────────────────────────────────────────────────────
      # Final gate decision — combina os 2 gates em um único exit code.
      # `enforce=true` no workflow_dispatch (ou após D7 fechado, basta
      # remover o continue-on-error acima) faz qualquer falha derrubar o
      # job, ativando o required-check no main.
      # ──────────────────────────────────────────────────────────────────
      - name: Aggregate gate result
        if: always()
        run: |
          ENFORCE="${{ github.event.inputs.enforce || 'false' }}"
          LEAK_RUN="${{ steps.leak_run.outcome }}"
          LEAK_GATE="${{ steps.leak_gate.outcome }}"
          TMPL_RUN="${{ steps.tmpl_run.outcome }}"
          TMPL_GATE="${{ steps.tmpl_gate.outcome }}"
          HITL_RUN="${{ steps.hitl_run.outcome }}"
          HITL_GATE="${{ steps.hitl_gate.outcome }}"
          RES_RUN="${{ steps.resilience_run.outcome }}"
          RES_GATE="${{ steps.resilience_gate.outcome }}"
          SUP_RUN="${{ steps.sup_run.outcome }}"
          SUP_GATE="${{ steps.sup_gate.outcome }}"
          META_RUN="${{ steps.meta_run.outcome }}"
          META_GATE="${{ steps.meta_gate.outcome }}"

          echo "Gate outcomes:"
          echo "  wizard_no_tenant_leak             run=${LEAK_RUN}  gate=${LEAK_GATE}"
          echo "  wizard_pipeline_template          run=${TMPL_RUN}  gate=${TMPL_GATE}"
          echo "  wizard_conversational_hitl        run=${HITL_RUN}  gate=${HITL_GATE}"
          echo "  wizard_conversational_resilience  run=${RES_RUN}   gate=${RES_GATE}"
          echo "  wizard_supervisor_routing         run=${SUP_RUN}   gate=${SUP_GATE}"
          echo "  wizard_meta_question_global       run=${META_RUN}  gate=${META_GATE}"

          FAILED=0
          for outcome in "$LEAK_RUN" "$LEAK_GATE" "$TMPL_RUN" "$TMPL_GATE" "$HITL_RUN" "$HITL_GATE" "$RES_RUN" "$RES_GATE" "$SUP_RUN" "$SUP_GATE" "$META_RUN" "$META_GATE"; do
            if [ "$outcome" = "failure" ]; then
              FAILED=1
            fi
          done

          if [ "$FAILED" = "1" ]; then
            if [ "$ENFORCE" = "true" ]; then
              echo "::error::Wizard eval gates FAILED and enforce=true — failing job."
              exit 1
            fi
            echo "::warning::Wizard eval gates FAILED but enforce=false — job stays green."
            echo "::warning::Veja o artifact wizard-eval-gates-${{ github.run_id }} para diagnóstico."
          else
            echo "All wizard eval gates passed."
          fi
