name: Silent Tenant Context Fallback Sensor

# Registrado 2026-05-24 (Sprint 2 G2 batch — 58 sites migrated to fail-loud).
# Modelado em .github/workflows/silent-llm-fallback-sensor.yml.
#
# Enforça CLAUDE.md REGRA 4 + ADR-001 §3 (multi-tenancy fail-closed):
# NUNCA `company_id = context.company_id if context else None` em tool —
# fallback silencioso pra NULL gera WHERE company_id IS NULL → 0 rows
# silenciosos. Padrão canonical: require_company_id_from_context(kwargs,
# "<tool_name>") em app/tools/context_helpers.py — fail-loud com
# ToolContextMissingError.
#
# Histórico de baseline:
#   2026-05-24 (Sprint 2.1): baseline 58 violations em 18 arquivos
#   2026-05-24 (Sprint 2.2): Pattern A migrado (52 sites) — baseline 6
#   2026-05-24 (Sprint 2.3): Pattern B EXEMPT markers (7 sites) — baseline 0 ✅
#   2026-05-24 (Sprint 2.3): BLOCKING — wired CI
#
# Próximo offender bloqueia o CI. Bypass legítimo: marker
# `# TENANT-FALLBACK-OK: <reason>` na linha imediatamente anterior.

on:
  push:
    branches: [main, develop, "feat/**", "fix/**"]
  pull_request:
    branches: [main, develop]
    paths:
      - "lia-agent-system/**"
      - ".github/workflows/silent-tenant-context-sensor.yml"

concurrency:
  group: silent-tenant-context-${{ github.ref }}
  cancel-in-progress: true

jobs:
  silent-tenant-context:
    name: Silent Tenant Context Fallback Sensor (BLOCKING, baseline 0)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lia-agent-system
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Silent tenant-context fallback sensor (BLOCKING)
        run: |
          # Promoted to BLOCKING em 2026-05-24 após Sprint 2 atingir baseline 0
          # via Pattern A migration (52 sites) + Pattern B EXEMPT markers (7).
          # Detecta:
          #   - company_id = ctx.attr if ctx else None
          #   - company_id = getattr(ctx, "company_id", None)
          # Para path tool, a única resposta canonical é:
          #   from app.tools.context_helpers import require_company_id_from_context
          #   company_id = require_company_id_from_context(kwargs, "<tool>")
          # Bypass legitimate: comment marker on N-1
          #   # TENANT-FALLBACK-OK: <reason — admin cross-tenant / RLS-loaded obj>
          python3 scripts/check_silent_context_fallback_in_tools.py --blocking

      - name: Human-readable report (always)
        if: always()
        run: |
          python3 scripts/check_silent_context_fallback_in_tools.py | head -100
