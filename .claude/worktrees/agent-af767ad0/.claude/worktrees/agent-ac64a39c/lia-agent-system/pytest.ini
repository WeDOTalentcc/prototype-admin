[pytest]
asyncio_mode = auto
# testpaths inclui app/tests (legado) + tests/ (novo padrão Sprint A-D)
testpaths = app/tests tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Coverage gate: 32% (Sprint I — 09/03/2026 — temporário, retomar para 40%).
# Progressão: 10% → 12% → 25% → 29% → 32% (atual) → 34% → 40% → 50% → 80% (target final).
# Sprint I adicionou: test_intent_classifier_coverage (56), test_candidate_search_schemas (50).
# TODO Sprint I4: adicionar testes para atingir 40% e subir gate.
addopts = -v --tb=short --cov=app --cov-report=term-missing --cov-fail-under=32 --ignore=app/tests/test_multi_tenancy_security.py --ignore=app/tests/test_policy_gaps_fixes.py --ignore=app/tests/test_sync_canonical_endpoint.py
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session
markers =
    easy: Testes unitários rápidos, funções puras, sem I/O (<5ms cada). Rodar em pre-commit.
    medium: Testes unitários com mocking moderado (<50ms cada). Rodar no CI push.
    hard: Testes com estado complexo ou múltiplos mocks (~100ms cada). Rodar no CI nightly.
    very_hard: Testes que requerem infraestrutura real ou chamadas LLM. Rodar apenas em release.
filterwarnings =
    ignore::DeprecationWarning
    ignore::pytest.PytestUnraisableExceptionWarning
