name: Docker Build & Push

on:
  push:
    branches: [main]
    paths:
      - "lia-agent-system/**"
      - ".github/workflows/docker-build.yml"
  workflow_dispatch:
    inputs:
      services:
        description: "Services to build (comma-separated: api,api-vagas,api-funil,api-onboarding — or 'all')"
        required: false
        default: "all"

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  build:
    name: Build ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        service:
          - name: api
            dockerfile: lia-agent-system/Dockerfile
            image: lia-api
            port: 8000
          - name: api-vagas
            dockerfile: lia-agent-system/apps/api-vagas/Dockerfile
            image: lia-api-vagas
            port: 8001
          - name: api-funil
            dockerfile: lia-agent-system/apps/api-funil/Dockerfile
            image: lia-api-funil
            port: 8002
          - name: api-onboarding
            dockerfile: lia-agent-system/apps/api-onboarding/Dockerfile
            image: lia-api-onboarding
            port: 8003

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service.image }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: lia-agent-system
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}

      - name: Smoke test image
        run: |
          docker run --rm -d \
            --name smoke-${{ matrix.service.name }} \
            -p ${{ matrix.service.port }}:${{ matrix.service.port }} \
            -e APP_ENV=test \
            -e SECRET_KEY=smoke-test-key \
            -e DATABASE_URL="" \
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service.image }}:latest

          # Wait up to 15s for the container to start
          for i in $(seq 1 15); do
            if docker inspect --format='{{.State.Running}}' smoke-${{ matrix.service.name }} 2>/dev/null | grep -q true; then
              echo "Container running"
              break
            fi
            sleep 1
          done

          docker stop smoke-${{ matrix.service.name }} || true

      - name: Image digest summary
        run: |
          echo "### Docker Image Built" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Image | Port |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| ${{ matrix.service.name }} | \`${{ env.IMAGE_PREFIX }}/${{ matrix.service.image }}:latest\` | ${{ matrix.service.port }} |" >> $GITHUB_STEP_SUMMARY
