# ==============================================================================
# docker-compose.prod.yml — LIA Agent System (Production override)
#
# Uso: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Requisitos de environment (secrets via .env.prod ou provider externo):
#   DATABASE_URL, SECRET_KEY, REDIS_URL, RABBITMQ_URL
#   ANTHROPIC_API_KEY, GOOGLE_API_KEY (optional)
#   LANGCHAIN_TRACING_V2=false (opt-in)
# ==============================================================================

version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: wedotalent/lia-agent-system:${IMAGE_TAG:-latest}
    restart: always
    env_file:
      - .env.prod
    environment:
      APP_ENV: production
      GUNICORN_WORKERS: "4"
      PORT: "8000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: wedotalent/lia-agent-system:${IMAGE_TAG:-latest}
    command: >
      celery -A app.core.celery_app worker
      --loglevel=info
      --concurrency=4
      --queues=high,normal,low
    restart: always
    env_file:
      - .env.prod
    environment:
      APP_ENV: production
    depends_on:
      - redis
      - rabbitmq
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: wedotalent/lia-agent-system:${IMAGE_TAG:-latest}
    command: celery -A app.core.celery_app beat --loglevel=info
    restart: always
    env_file:
      - .env.prod
    environment:
      APP_ENV: production
    depends_on:
      - redis

  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lia_prod}
      POSTGRES_USER: ${POSTGRES_USER:-lia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lia}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-lia}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD required}
    volumes:
      - rabbitmq_prod_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_prod_data:
  redis_prod_data:
  rabbitmq_prod_data:
