name: E2E Tests - Playwright

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'
  FRONTEND_PORT: 5000
  BACKEND_PORT: 8000

jobs:
  e2e-tests:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lia_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lia_test
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      CI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Get npm cache directory
        id: npm-cache-dir
        shell: bash
        run: echo "dir=$(npm config get cache)" >> $GITHUB_OUTPUT

      - name: Cache npm dependencies
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: |
            ${{ steps.npm-cache-dir.outputs.dir }}
            plataforma-lia/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('plataforma-lia/package-lock.json', 'plataforma-lia/package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('plataforma-lia/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('lia-agent-system/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install frontend dependencies
        working-directory: plataforma-lia
        run: npm ci

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: plataforma-lia
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: plataforma-lia
        run: npx playwright install-deps chromium

      - name: Install backend dependencies
        working-directory: lia-agent-system
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install --no-cache-dir \
            -e libs/config \
            -e libs/utils \
            -e libs/audit \
            -e libs/messaging \
            -e libs/models \
            -e libs/agents-core \
            -e libs/services \
            -e libs/contexts \
            -e libs/auth

      - name: Run database migrations
        working-directory: lia-agent-system
        run: alembic upgrade head
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Start backend server
        working-directory: lia-agent-system
        run: |
          python -m uvicorn app.main:app --host 0.0.0.0 --port ${{ env.BACKEND_PORT }} &
          echo $! > /tmp/backend.pid
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          OPENAI_API_KEY: ${{ env.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ env.ANTHROPIC_API_KEY }}

      - name: Start frontend server
        working-directory: plataforma-lia
        run: |
          npm run dev &
          echo $! > /tmp/frontend.pid
        env:
          NEXT_PUBLIC_API_URL: http://localhost:${{ env.BACKEND_PORT }}

      - name: Wait for backend to be ready
        run: |
          echo "Waiting for backend to be ready..."
          timeout 120 bash -c 'until curl -sf http://localhost:${{ env.BACKEND_PORT }}/health 2>/dev/null || curl -sf http://localhost:${{ env.BACKEND_PORT }}/ 2>/dev/null; do
            echo "Backend not ready yet, waiting..."
            sleep 5
          done'
          echo "Backend is ready!"
        continue-on-error: true

      - name: Wait for frontend to be ready
        run: |
          echo "Waiting for frontend to be ready..."
          timeout 120 bash -c 'until curl -sf http://localhost:${{ env.FRONTEND_PORT }} 2>/dev/null; do
            echo "Frontend not ready yet, waiting..."
            sleep 5
          done'
          echo "Frontend is ready!"
        continue-on-error: true

      - name: Run Playwright tests
        working-directory: plataforma-lia
        run: npx playwright test --reporter=html
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:${{ env.FRONTEND_PORT }}
          CI: true
        id: playwright-tests

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: plataforma-lia/playwright-report/
          retention-days: 30

      - name: Upload test screenshots
        uses: actions/upload-artifact@v4
        if: failure() || steps.playwright-tests.outcome == 'failure'
        with:
          name: test-screenshots
          path: plataforma-lia/test-results/
          retention-days: 30

      - name: Upload trace files
        uses: actions/upload-artifact@v4
        if: failure() || steps.playwright-tests.outcome == 'failure'
        with:
          name: playwright-traces
          path: plataforma-lia/test-results/**/*.zip
          retention-days: 30

      - name: Check test results
        if: steps.playwright-tests.outcome == 'failure'
        run: |
          echo "::error::E2E tests failed. Check the artifacts for details."
          echo "Review test results in the Playwright report and screenshots."
          exit 1

      - name: Cleanup
        if: always()
        run: |
          if [ -f /tmp/backend.pid ]; then kill $(cat /tmp/backend.pid) 2>/dev/null || true; fi
          if [ -f /tmp/frontend.pid ]; then kill $(cat /tmp/frontend.pid) 2>/dev/null || true; fi
