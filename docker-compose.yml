services:
  # ---------------------------------------------------------------------------
  # Infraestrutura
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: lia-postgres
    environment:
      POSTGRES_USER: lia_user
      POSTGRES_PASSWORD: lia_password
      POSTGRES_DB: lia_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lia_user -d lia_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lia-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: lia-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 30s
      retries: 5
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Backend (FastAPI)
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ./lia-agent-system
      dockerfile: Dockerfile
    container_name: lia-api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://lia_user:lia_password@postgres:5432/lia_db
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      # Override RAILS_API_URL para hostname interno Docker (evita roundtrip via internet).
      # No servidor este override aponta para staging2-web-1:3000.
      # Em dev local, sobrescreva via .env ou edite aqui para host.docker.internal:8080.
      RAILS_API_URL: ${RAILS_API_URL_OVERRIDE:-http://staging2-web-1:3000}
    networks:
      - default
      - ats_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    volumes:
      - ./lia-agent-system/app:/app/app
      - ./lia-agent-system/libs:/app/libs
      - ./lia-agent-system/alembic:/app/alembic
      - ./lia-agent-system/docker-entrypoint.sh:/docker-entrypoint.sh
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    entrypoint: ["/bin/bash", "/docker-entrypoint.sh"]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Celery Workers
  # ---------------------------------------------------------------------------
  celery-worker-high:
    build:
      context: ./lia-agent-system
      dockerfile: Dockerfile
    container_name: lia-celery-worker-high
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://lia_user:lia_password@postgres:5432/lia_db
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - ./lia-agent-system/app:/app/app
      - ./lia-agent-system/libs:/app/libs
      - ./lia-agent-system/docker-entrypoint.sh:/docker-entrypoint.sh
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    entrypoint: ["/bin/bash", "/docker-entrypoint.sh"]
    command: >
      celery -A app.core.celery_app worker
      --loglevel=info
      --queues=sourcing_high,evaluation_normal
      --concurrency=4
      --hostname=worker-high@%h
    restart: unless-stopped

  celery-worker-normal:
    build:
      context: ./lia-agent-system
      dockerfile: Dockerfile
    container_name: lia-celery-worker-normal
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://lia_user:lia_password@postgres:5432/lia_db
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - ./lia-agent-system/app:/app/app
      - ./lia-agent-system/libs:/app/libs
      - ./lia-agent-system/docker-entrypoint.sh:/docker-entrypoint.sh
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    entrypoint: ["/bin/bash", "/docker-entrypoint.sh"]
    command: >
      celery -A app.core.celery_app worker
      --loglevel=info
      --queues=vagas_normal,celery
      --concurrency=4
      --hostname=worker-normal@%h
    restart: unless-stopped

  celery-worker-low:
    build:
      context: ./lia-agent-system
      dockerfile: Dockerfile
    container_name: lia-celery-worker-low
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://lia_user:lia_password@postgres:5432/lia_db
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - ./lia-agent-system/app:/app/app
      - ./lia-agent-system/libs:/app/libs
      - ./lia-agent-system/docker-entrypoint.sh:/docker-entrypoint.sh
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    entrypoint: ["/bin/bash", "/docker-entrypoint.sh"]
    command: >
      celery -A app.core.celery_app worker
      --loglevel=info
      --queues=onboarding_low
      --concurrency=2
      --hostname=worker-low@%h
    restart: unless-stopped

  celery-beat:
    build:
      context: ./lia-agent-system
      dockerfile: Dockerfile
    container_name: lia-celery-beat
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://lia_user:lia_password@postgres:5432/lia_db
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - ./lia-agent-system/app:/app/app
      - ./lia-agent-system/libs:/app/libs
      - ./lia-agent-system/docker-entrypoint.sh:/docker-entrypoint.sh
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    entrypoint: ["/bin/bash", "/docker-entrypoint.sh"]
    command: celery -A app.core.celery_app beat --loglevel=info --scheduler=celery.beat:PersistentScheduler
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Flower (Celery monitoring) — http://localhost:5555
  # ---------------------------------------------------------------------------
  flower:
    image: mher/flower:2.0
    container_name: lia-flower
    ports:
      - "5555:5555"
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    command: celery flower --broker=redis://redis:6379/0
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Frontend (Next.js)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./plataforma-lia
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_URL: http://localhost:8000
        NEXT_PUBLIC_APP_URL: http://localhost:5000
        NEXT_PUBLIC_WS_URL: ws://localhost:8000
    container_name: lia-frontend
    ports:
      - "5000:3000"
    environment:
      NODE_ENV: production
      BACKEND_URL: http://api:8000
      RAILS_BACKEND_URL: http://staging2-web-1:3000
      SECRET_KEY: ${SECRET_KEY}
      WORKOS_API_KEY: dev_placeholder_key
      WORKOS_CLIENT_ID: dev_placeholder_client_id
      WORKOS_SESSION_SECRET: dev_placeholder_session_secret_at_least_32_chars
      JIRA_HOST: https://placeholder.atlassian.net
      JIRA_EMAIL: dev@placeholder.com
      JIRA_API_TOKEN: dev_placeholder_token
      DEV_AUTO_LOGIN_EMAIL: giovanni@wedotalent.com
      DEV_AUTO_LOGIN_PASSWORD: demo123
    networks:
      - default
      - ats_network
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  default: {}
  ats_network:
    external: true
