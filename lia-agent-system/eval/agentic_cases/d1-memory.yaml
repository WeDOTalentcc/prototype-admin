# D1 — Conversational memory
# 7 multi-turn scenarios that probe whether LIA preserves entities, IDs
# and decisions across turns inside the same conversation_id.
meta: { version: "1.0.0", dimension: "D1" }

scenarios:
  - id: AGT-D01-001
    tags: [d1, critical, smoke, passk]
    severity: critical
    goal: "Recruiter introduces a vaga ID in turn 1; refers to it as 'essa vaga' in turn 3."
    page_context: { scope: "global", page: "chat" }
    persona: { role: recruiter, language: pt-BR, consent_policy: always_yes }
    turns:
      - user: "Tô olhando a vaga V0037 (engenheira de dados sênior). Quantos candidatos ela tem hoje?"
      - user: "Quais estão na etapa de Entrevista?"
      - user: "Pausa essa vaga, quero rever os requisitos antes de continuar."
    facts_you_know: { job_id: "V0037", job_title: "Engenheira de dados sênior" }
    expected_tools: [list_jobs, get_pipeline_summary, pause_job]
    expected_state_after:
      - { check: tool_called, name: list_jobs }
      - { check: tool_called, name: get_pipeline_summary }
      - { check: tool_called, name: pause_job }
      - { check: language_pt }
    stop_when: "LIA confirma que a vaga V0037 está pausada."

  - id: AGT-D01-002
    tags: [d1, high, passk]
    severity: high
    goal: "Pronoun chain: 'esse candidato' must resolve to João Silva from turn 1."
    page_context: { scope: "pipeline", page: "pipeline" }
    persona: { role: recruiter, language: pt-BR, consent_policy: always_yes }
    turns:
      - user: "O João Silva está na etapa de Triagem da V0037. Me dá um resumo dele."
      - user: "E o WSI dele, já saiu?"
      - user: "Move ele pra Entrevista."
    facts_you_know: { candidate_name: "João Silva", job_id: "V0037" }
    expected_tools: [get_stage_candidates, get_wsi_status, move_candidate]
    expected_state_after:
      - { check: tool_called, name: get_stage_candidates }
      - { check: tool_called, name: get_wsi_status }
      - { check: tool_called, name: move_candidate }
      - { check: language_pt }
    stop_when: "LIA confirma a movimentação do João Silva para Entrevista."

  - id: AGT-D01-003
    tags: [d1, high]
    severity: high
    goal: "Decision recall: in turn 1 recruiter says 'só engenharia, não analytics'. Turn 4 must respect that filter."
    page_context: { scope: "sourcing", page: "sourcing" }
    persona: { role: recruiter, language: pt-BR, consent_policy: always_no }
    turns:
      - user: "Pra essa busca quero só pessoas de engenharia de dados, NÃO analytics. Combinado?"
      - user: "Busca candidatos com Python para a V0037."
      - user: "Quem ficou de fora por causa do filtro?"
      - user: "Me sugere mais 5 nessa mesma linha."
    facts_you_know: { filter_rule: "engineering only, no analytics" }
    expected_tools: [search_candidates, suggest_candidates]
    expected_state_after:
      - { check: tool_called, name: search_candidates }
      - { check: tool_called, name: suggest_candidates }
      - { check: language_pt }
    stop_when: "LIA propõe 5 candidatos respeitando a regra de engenharia."

  - id: AGT-D01-004
    tags: [d1, medium]
    severity: medium
    goal: "Cross-entity memory: candidate ID + vaga ID introduced in different turns."
    page_context: { scope: "pipeline", page: "pipeline" }
    persona: { role: recruiter, language: pt-BR, consent_policy: always_yes }
    turns:
      - user: "Estou trabalhando na V0037 hoje."
      - user: "A Maria Costa está em Teste Técnico."
      - user: "Dispara o WSI dela pra essa vaga."
    facts_you_know: { job_id: "V0037", candidate_name: "Maria Costa" }
    expected_tools: [start_wsi_screening]
    expected_state_after:
      - { check: tool_called, name: start_wsi_screening }
      - { check: language_pt }
    stop_when: "LIA confirma WSI iniciado para Maria Costa na V0037."

  - id: AGT-D01-005
    tags: [d1, medium]
    severity: medium
    goal: "Numeric memory: turn 1 says 'até 3 finalistas'. Turn 3 must respect 3, not invent 5."
    page_context: { scope: "pipeline", page: "pipeline" }
    persona: { role: recruiter, language: pt-BR, consent_policy: always_yes }
    turns:
      - user: "Pra V0037 vamos fechar com no máximo 3 finalistas."
      - user: "Quem está em Oferta hoje?"
      - user: "Me lista os finalistas que devo apresentar pro gestor."
    facts_you_know: { job_id: "V0037", finalist_cap: 3 }
    expected_tools: [get_stage_candidates]
    expected_state_after:
      - { check: tool_called, name: get_stage_candidates }
      - { check: language_pt }
    stop_when: "LIA lista no máximo 3 finalistas."

  - id: AGT-D01-006
    tags: [d1, high]
    severity: high
    goal: "Negation memory: 'NÃO mande WhatsApp ainda' must persist."
    page_context: { scope: "pipeline", page: "pipeline" }
    persona: { role: recruiter, language: pt-BR, consent_policy: ask_what_will_happen_first }
    turns:
      - user: "Avança o Pedro Lima para Entrevista, mas NÃO mande WhatsApp ainda — quero revisar a mensagem antes."
      - user: "Tudo certo? Me mostra o que ficou no histórico dele."
    facts_you_know: { candidate_name: "Pedro Lima" }
    expected_tools: [move_candidate]
    expected_state_after:
      - { check: tool_called, name: move_candidate }
      - { check: language_pt }
    stop_when: "LIA confirma movimentação sem ter chamado send_whatsapp."

  - id: AGT-D01-007
    tags: [d1, medium]
    severity: medium
    goal: "Time reference: 'essa semana' set in turn 1, must scope turn 3."
    page_context: { scope: "interview", page: "interview" }
    persona: { role: recruiter, language: pt-BR, consent_policy: always_yes }
    turns:
      - user: "Quero focar nas entrevistas dessa semana."
      - user: "Quantas confirmadas já temos?"
      - user: "Manda lembrete pra todas elas."
    facts_you_know: { time_scope: "this week" }
    expected_tools: [list_today_interviews, send_interview_reminder]
    expected_state_after:
      - { check: tool_called, name: list_today_interviews }
      - { check: tool_called, name: send_interview_reminder }
      - { check: language_pt }
    stop_when: "LIA confirma envio de lembretes para as entrevistas da semana."
