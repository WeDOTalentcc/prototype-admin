# Task #977 — Tenant-context no-regression eval suite
#
# Cenários realistas (wizard + agentes principais) que exercitam o /api/v1/chat
# com um JWT válido e MARCAM como falha qualquer resposta que contenha frases
# sintoma do bug "LIA esquece a empresa":
#   - "sua empresa", "sua organização", "qual a empresa", "qual sua empresa"
#   - "ID da empresa", "company_id", "informe a empresa", "preciso saber a empresa"
#   - "em qual empresa você trabalha", "qual o id"
#
# Asserção é puramente NEGATIVA: a LIA pode legitimamente perguntar outras
# coisas ("qual vaga?", "qual candidato?") — o que NÃO PODE é pedir/citar a
# empresa, porque o snippet de tenant já chega injetado pelo backend.
#
# Cobertura canônica: 18 cenários cobrindo os 16 ReActAgents do inventário
# sentinela (`tests/integration/agents/test_tenant_aware_rollout_t_d.py`) —
# wizard (3) + 15 demais agentes (1 cada). Expansão Task #1042 fechou os
# gaps de automation, autonomous, company_settings, cv_screening_pipeline,
# sourcing e pipeline_transition sobre a base original (Task #977).
# Escopo dos prompts é intencionalmente diverso: criação de vaga, busca de
# candidatos, kanban, KPIs, comunicação, sourcing, política de contratação,
# pool de talentos, self-service de candidato, automação, autônomo, settings
# da empresa, triagem de CV e transição de pipeline.

meta:
  version: "1.1.0"
  task: "#977"
  # Task #1042: cobertura ampliada para os 16 ReActAgents canônicos.
  # Antes 12 cenários; +6 para fechar gap de automation, autonomous,
  # company_settings, cv_screening_pipeline, sourcing e pipeline_transition.
  total_cases: 18
  forbidden_phrases:
    # frases-sintoma case-insensitive — qualquer match → FAIL
    - "sua empresa"
    - "sua organização"
    - "sua organizacao"
    - "qual a empresa"
    - "qual sua empresa"
    - "qual empresa"
    - "id da empresa"
    - "id de empresa"
    - "company_id"
    - "informe a empresa"
    - "preciso saber a empresa"
    - "em qual empresa você trabalha"
    - "em qual empresa voce trabalha"
    - "workspace_id=0"
    - "para qual empresa"

cases:
  # ── WIZARD (3) ─────────────────────────────────────────────────
  - id: TCNR-WZ-001
    agent: wizard
    severity: critical
    prompt: "cria uma nova vaga de Engenheiro de Dados sênior, modalidade híbrida em São Paulo"
    context:
      scope: "Vagas"
      page: "gestao-vagas"

  - id: TCNR-WZ-002
    agent: wizard
    severity: critical
    prompt: "abre uma vaga rascunho de Product Manager pleno com foco em fintech"
    context:
      scope: "Vagas"
      page: "gestao-vagas"

  - id: TCNR-WZ-003
    agent: wizard
    severity: high
    prompt: "configura o pipeline da nova vaga: triagem, teste técnico, entrevista RH, entrevista técnica, proposta"
