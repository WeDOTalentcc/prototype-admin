# LIA Enterprise Eval Suite — Golden Test Cases
# Format: id, category, severity, prompt, context, expected_tools, expected_behavior,
#         canonical_files, success_criteria, anti_patterns
#
# Severity: critical | high | medium | low
# Context: scope (page tag), page (route), entity_id, entity_type
# Score: 0=fail 1=partial 2=pass 3=perfect

meta:
  version: "1.0.0"
  created: "2026-04-17"
  total_cases: 72
  categories:
    JM: "Job Management"
    CM: "Candidate Management"
    KB: "Kanban / Pipeline"
    SC: "Screening / WSI"
    CO: "Communication"
    AN: "Analytics / Reports"
    SO: "Sourcing"
    WZ: "Wizard / Job Creation"
    PR: "Predictive / Proactive"
    MT: "Multi-task Planning"
    CX: "Context Awareness"
    EX: "Edge Cases / Robustness"

cases:

  # ─────────────────────────────────────────────────────────────
  # JM — JOB MANAGEMENT (8 cases)
  # ─────────────────────────────────────────────────────────────

  - id: JM-001
    category: JM
    severity: critical
    title: "List all jobs"
    prompt: "mostra todas as vagas"
    context:
      scope: "Vagas"
      page: "gestao-vagas"
    expected_tools: ["list_jobs"]
    expected_behavior: "Calls list_jobs immediately and returns a list with job titles, IDs and statuses"
    canonical_files:
      - "app/domains/recruiter_assistant/agents/jobs_mgmt_tool_registry.py"
      - "app/domains/recruiter_assistant/agents/jobs_mgmt_system_prompt.py"
    success_criteria:
      - "Response contains at least one job title or ID"
      - "Does not ask for clarification before executing"
      - "Calls list_jobs tool"
    anti_patterns:
      - "Says 'Não encontrei nenhuma vaga' without attempting tool call"
      - "Asks 'qual empresa?' before calling the tool"
      - "Says tool not authorized"

  - id: JM-002
    category: JM
    severity: critical
