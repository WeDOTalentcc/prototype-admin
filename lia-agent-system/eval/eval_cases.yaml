    success_criteria:
      - "Identifies the correct job"
      - "Asks for confirmation before pausing (HITL)"
      - "Confirms action was taken or asks to confirm"
    anti_patterns:
      - "Pauses without asking for confirmation"
      - "Says cannot perform write operations"

