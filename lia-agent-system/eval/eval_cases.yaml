    canonical_files:
      - "app/domains/recruiter_assistant/agents/jobs_mgmt_tool_registry.py"
    success_criteria:
      - "Filters by status=active or ativa"
      - "Returns job list with status indicator"
    anti_patterns:
      - "Returns all jobs without filtering"
      - "Cannot find any jobs"

  - id: JM-003
