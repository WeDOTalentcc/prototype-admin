    **KPIs**
    - Time-to-fill: [X] dias
    - Taxa de aprovação na triagem: [Y]%
    - Taxa de aceitação de propostas: [Z]%

    **Análise**
    [Insights sobre o funil e recomendações]

    ➡️ **Ações Sugeridas**
    1. [ação recomendada]
