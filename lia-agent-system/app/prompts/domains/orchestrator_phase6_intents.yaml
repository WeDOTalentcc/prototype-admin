name: orchestrator_phase6_intents
domain: orchestrator
version: 1
description: "Phase 6 intent classification examples for new domains"

# These examples supplement orchestrator.yaml for the FastRouter (Tier 4)
# and LLM Cascade (Tier 5) to classify intents for Phase 6 domains.

examples:
  # Talent Pool
  - input: "Crie um banco de talentos para desenvolvedores backend"
    output: {"intent": "talent_pool", "confidence": 0.95, "reasoning": "Criação de banco de talentos vivo", "requires_planning": false}
  - input: "Me mostra os candidatos do pool de motoristas"
    output: {"intent": "talent_pool", "confidence": 0.92, "reasoning": "Consulta de candidatos em banco de talentos", "requires_planning": false}
  - input: "Mova 3 candidatos do pool para a vaga de backend"
    output: {"intent": "talent_pool", "confidence": 0.94, "reasoning": "Migração de candidatos de pool para vaga", "requires_planning": false}
  - input: "Quais bancos de talentos eu tenho?"
    output: {"intent": "talent_pool", "confidence": 0.90, "reasoning": "Listagem de bancos de talentos ativos", "requires_planning": false}
  - input: "Crie uma vaga a partir do banco de talentos Backend SP"
    output: {"intent": "talent_pool", "confidence": 0.93, "reasoning": "Conversão de pool em vaga com herança de arquétipo", "requires_planning": true}

  # Agent Studio
  - input: "Crie um agente de sourcing para a vaga de vendas"
    output: {"intent": "agent_studio", "confidence": 0.95, "reasoning": "Criação de agente de sourcing persistente", "requires_planning": false}
  - input: "Ative sourcing automático para esta vaga"
    output: {"intent": "agent_studio", "confidence": 0.93, "reasoning": "Ativação de agente de sourcing", "requires_planning": false}
  - input: "Preciso calibrar o agente, quero avaliar perfis"
    output: {"intent": "agent_studio", "confidence": 0.92, "reasoning": "Calibração de agente via Big Card", "requires_planning": false}
  - input: "Como está o agente de sourcing da vaga Backend?"
    output: {"intent": "agent_studio", "confidence": 0.88, "reasoning": "Consulta de status do agente", "requires_planning": false}
  - input: "Faça uma busca inteligente com 4 estratégias para Python SP"
    output: {"intent": "agent_studio", "confidence": 0.94, "reasoning": "Busca multi-estratégia paralela", "requires_planning": false}
  - input: "Quais templates de setor estão disponíveis?"
    output: {"intent": "agent_studio", "confidence": 0.85, "reasoning": "Listagem de templates por setor", "requires_planning": false}

  # Digital Twin
  - input: "Avalie esse candidato com o twin da Ana Costa"
    output: {"intent": "digital_twin", "confidence": 0.95, "reasoning": "Avaliação via Digital Twin do especialista", "requires_planning": false}
  - input: "Crie um digital twin do gerente de engenharia"
    output: {"intent": "digital_twin", "confidence": 0.94, "reasoning": "Criação de Digital Twin", "requires_planning": false}
  - input: "Quero uma segunda opinião sobre este candidato"
    output: {"intent": "digital_twin", "confidence": 0.80, "reasoning": "Solicitação de avaliação adicional via twin", "requires_planning": false}
  - input: "Quais digital twins eu tenho disponíveis?"
    output: {"intent": "digital_twin", "confidence": 0.88, "reasoning": "Listagem de twins ativos", "requires_planning": false}

  # Recruitment Campaign
  - input: "Inicie uma campanha de recrutamento para a vaga de dados"
    output: {"intent": "recruitment_campaign", "confidence": 0.95, "reasoning": "Criação de campanha ponta-a-ponta", "requires_planning": true}
  - input: "Como está o progresso da campanha Backend Sênior?"
    output: {"intent": "recruitment_campaign", "confidence": 0.92, "reasoning": "Consulta de progresso de campanha", "requires_planning": false}
  - input: "Avance a campanha para a próxima etapa"
    output: {"intent": "recruitment_campaign", "confidence": 0.90, "reasoning": "Avanço de estágio da campanha", "requires_planning": false}
  - input: "Quero automatizar todo o processo desta vaga do início ao fim"
    output: {"intent": "recruitment_campaign", "confidence": 0.88, "reasoning": "Campanha automatizada completa", "requires_planning": true}
