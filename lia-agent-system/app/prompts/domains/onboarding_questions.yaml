# onboarding_questions.yaml — P2-2 Phase 0 foundation (audit 2026-05-26)
#
# Mapping canonical field_key → pergunta conversacional pra onboarding LIA.
# Consumido pelo onboarding_orchestrator quando recrutador novo entra na
# plataforma com setup_progress < 30% e opta por onboarding conversacional.
#
# Princípios canonical (audit §4.4):
#   1. PT-BR conversacional, não enterprise-speak
#   2. Contexto/exemplo embutido — não pergunta seca
#   3. Edge case antecipado via follow_up
#   4. Respeita autonomia (não impõe resposta "certa")
#   5. Combinável com painel — admin pode preencher via chat OU via formulário
#   6. Pergunta única, resposta única
#
# Audit ref: ~/Documents/wedotalent_audit_2026-05-26/CONFIGURACOES_MENU_COHERENCE_AUDIT.md
# P2-2 + §4.3 (18 perguntas Políticas) + §7.3 P3 (onboarding stretch goal).
#
# Versão 1 cobre subset prioritário (~40 dos 80+ campos):
#   - 18 perguntas Políticas (P0-1 já feito, agora em chat também)
#   - 12 campos essenciais Minha Empresa básico + cultura
#   - 5 campos workforce planning
#   - 5 fields LIA persona/learning (futuro)
#
# Sprint XL futuro pode estender pra cobertura 100%.

version: 1
locale: pt-BR

# === META: persona instructions ===
persona:
  greeting: |
    Oi! Sou a LIA, sua assistente de IA aqui na WeDOTalent. Vamos configurar
    a plataforma juntos? Em vez de você preencher 80+ campos em formulários,
    vou te perguntar algumas coisas e configuro pra você. Quer começar?
  closing: |
    Pronto! Configuramos {fields_count} campos juntos. Você pode continuar
    completando o resto via chat OU abrindo Configurações → Minha Empresa
    no menu. O painel sempre fica disponível pra editar tudo.
  hint_skip: "Se quiser pular alguma pergunta, é só dizer 'pulei' ou 'depois'."

# === BLOCKS: agrupamento por categoria conceitual ===
blocks:
  - id: basic
    title: "Identidade da Empresa"
    description: "Quem vocês são (básico)"
    estimated_questions: 6
    fields:
      - field_key: name
        question: "Qual é o nome oficial da sua empresa?"
        validation: required
        extract_hint: "company legal name"

      - field_key: trade_name
        question: "E o nome fantasia? (se for diferente do oficial)"
        validation: optional
        skip_if_same_as: name

      - field_key: cnpj
        question: "Qual o CNPJ da empresa?"
        follow_up: "Pode ser sem máscara — eu formato pra você."
        validation: cnpj_format

      - field_key: website
        question: "Qual o site oficial de vocês?"
        validation: url_format

      - field_key: industry
        question: "Em qual setor vocês atuam? (ex: fintech, saúde, e-commerce, manufatura)"
        validation: required
        extract_hint: "industry/sector"

      - field_key: employee_count
        question: "Quantos funcionários a empresa tem hoje? (aproximado tá ok)"
        validation: integer

  - id: culture
    title: "Cultura & Identidade"
    description: "O que torna vocês únicos"
    estimated_questions: 6
    fields:
      - field_key: mission
        question: "Qual a missão da empresa? Me conta com suas palavras — sem formalidade."
        example_response: "Transformar o jeito que empresas contratam talentos"
        validation: text_min_20

      - field_key: vision
        question: "E a visão pro futuro? Onde vocês querem chegar?"
        example_response: "Ser a plataforma de recrutamento mais confiável do Brasil até 2030"
        validation: text_min_20

      - field_key: values
        question: "Quais os principais valores que guiam vocês? (3-5 valores em palavras-chave)"
        example_response: "Transparência, Diversidade, Excelência, Foco no candidato"
        validation: list_min_3

      - field_key: work_model
        question: "Qual o modelo de trabalho? (presencial / híbrido / remoto)"
        validation: enum_work_model

      - field_key: dei_initiatives
        question: "Vocês têm iniciativas de Diversidade, Equidade e Inclusão (DEI) ativas? Me conta quais."
        skippable: true

      - field_key: evp_bullets
        question: "Qual é a proposta de valor (EVP) que vocês oferecem ao colaborador? (3-5 destaques)"
        example_response: "Cultura colaborativa, plano de carreira, vale-cultura"

  - id: policy
    title: "Processo de Recrutamento"
    description: "Como vocês contratam — as 18 perguntas canonical (P0-1)"
    estimated_questions: 18
    note: "Estas são as mesmas 18 perguntas que aparecem em Configurações → Políticas. Recrutador escolhe canal preferido."
    fields:
      # Bloco A — Estratégia de Triagem
      - field_key: auto_screening_enabled
        question: "A triagem inicial de candidatos (verificação de elegibilidade, ranking Big Five, score WSI) deve acontecer automaticamente quando o candidato se aplica, ou apenas mediante revisão manual?"

      - field_key: min_interviews_before_offer
        question: "Quantas entrevistas mínimas devem acontecer antes de fazer uma oferta ao candidato? Esse número se aplica a TODAS as vagas ou varia por senioridade/cargo?"
        validation: integer_1_to_10

      - field_key: auto_stage_advance_enabled
        question: "Candidatos que atendem todos os critérios de uma etapa devem ser movidos automaticamente para a próxima, ou aguardar revisão manual? Considere risco de mover candidatos prematuramente."

      - field_key: max_days_in_stage
        question: "Qual é o máximo de dias que um candidato pode permanecer em uma mesma etapa antes de exigir ação (lembrar recrutador, marcar como stale)?"
        validation: integer

      # Bloco B — Aprovação e Governança
      - field_key: manager_approval_for_offer
        question: "A oferta requer aprovação formal do gestor da vaga antes de ser enviada ao candidato?"
        follow_up: "Se sim, quem aprova quando o gestor está ausente?"

      - field_key: autonomy_level
        question: |
          Em qual nível de autonomia a LIA deve operar?
            - Low: sempre pede confirmação antes de agir
            - Medium: age em decisões reversíveis, pede pra críticas
            - High: age na maioria, comunica resultado
          Considere o conforto da sua equipe e a maturidade do processo.
        validation: enum_low_medium_high

      # Bloco C — Janela de Comunicação
      - field_key: allowed_days
        question: "Em quais dias da semana podemos agendar entrevistas? (lista: seg, ter, qua, qui, sex, sáb)"
        follow_up: "Considere que alguns candidatos podem estar empregados e preferir horário comercial."

      - field_key: allowed_hours
        question: "Em qual janela horária podemos agendar entrevistas? (ex: 09:00 às 18:00)"

      - field_key: preferred_channel
        question: "Qual o canal preferido para comunicar com candidatos? (whatsapp / email / sms)"
        follow_up: "Candidatos jovens preferem WhatsApp; cargos sêniores costumam preferir e-mail."

      # Bloco D — Feedback ao Candidato
      - field_key: auto_rejection_feedback
        question: "Quando um candidato é rejeitado, a LIA deve enviar feedback automático com motivo? Ou prefere que o recrutador escreva feedback personalizado?"

      - field_key: rejection_feedback_deadline_hours
        question: "Em quantas horas após rejeição enviar feedback? (LGPD recomenda tempestividade)"
        validation: integer_1_to_72

      # Bloco E — Agendamento
      - field_key: default_interview_duration_min
        question: "Duração padrão das entrevistas (em minutos)?"
        follow_up: "Pode ser diferente por etapa — começo com o valor mais comum."
        validation: integer_15_to_180

      - field_key: auto_scheduling_enabled
        question: "A LIA deve agendar entrevistas automaticamente quando candidatos atingem etapas elegíveis, ou prefere agendar manualmente?"

      # Bloco F — Filtros de Compatibilidade
      - field_key: salary_screening_enabled
        question: "Filtrar candidatos fora da faixa salarial automaticamente? Se sim, considere a Tolerância Salarial abaixo."

      - field_key: salary_tolerance_percent
        question: "Tolerância (em %) entre pretensão salarial do candidato e teto da vaga, antes de filtrar?"
        follow_up: "Tolerância baixa = filtro rigoroso; alta = flexível."
        validation: integer_0_to_50
        depends_on: salary_screening_enabled

      - field_key: experience_policy
        question: "Mínimo de experiência: por vaga ou política da empresa? (per_job / company_wide)"

  - id: workforce
    title: "Planejamento de Força de Trabalho"
    description: "Volume e prioridades de contratação"
    estimated_questions: 4
    fields:
      - field_key: hiring_volume
        question: "Quantas vagas vocês esperam abrir nos próximos 12 meses?"
        validation: integer

      - field_key: job_types
        question: "Que tipos de vaga vocês mais contratam? (ex: tech, vendas, marketing, operações)"

      - field_key: main_priority
        question: "Qual é a prioridade mais importante no recrutamento de vocês? (velocidade, qualidade, diversidade, custo, employer branding)"

      - field_key: main_challenges
        question: "Quais os maiores desafios de recrutamento que vocês enfrentam hoje?"
        skippable: true

  - id: lia_persona
    title: "Personalização da LIA"
    description: "Como a LIA deve se apresentar (opcional, pode ficar default)"
    estimated_questions: 2
    fields:
      - field_key: ai_persona.name
        question: "Qual nome vocês querem dar à assistente? (default: 'LIA'). Pode escolher qualquer nome de 2-20 caracteres."
        skippable: true
        validation: ai_persona_name

      - field_key: ai_persona.tone
        question: "Qual tom a LIA deve usar com candidatos? (formal / profissional / amigável / casual / inspirador / direto)"
        skippable: true
        validation: ai_persona_tone

# === EXTRAÇÃO MULTI-FIELD ===
# A LIA pode extrair múltiplos campos de uma só resposta. Ex: "Somos fintech de SP
# com 50 funcionários" → industry=fintech + headquarters_city=SP + employee_count=50.
# Implementação: tool call ao LLM com schema multi-field extraction.

extraction_hints:
  - example_user_input: "Somos uma fintech de São Paulo com 50 funcionários, focada em B2B"
    expected_extraction:
      industry: "fintech"
      headquarters_city: "São Paulo"
      employee_count: 50
      # b2b → ainda exige confirmação porque não é field canonical único

  - example_user_input: "Aprovação só pelo CEO. Sem fluxo automático. Sempre revisar."
    expected_extraction:
      manager_approval_for_offer: true
      autonomy_level: "low"
      auto_screening_enabled: false
      auto_stage_advance_enabled: false

# === CONFIRMATION PATTERN ===
# Após extrair, LIA SEMPRE confirma antes de persistir:
# "Anotei aqui: Setor=Fintech, HQ=SP, employees=50. Tá certo? Posso salvar?"
# Recrutador responde sim/não/corrigir. Só então tool_call: update_company_field.

confirmation_template: |
  Anotei aqui:
  {extracted_fields_summary}

  Tá certo? Posso salvar?

# === FINALIZATION ===
# Quando setup_progress >= 80% ou recrutador disser "chega por hoje":
# - LIA gera resumo do que foi configurado
# - Aponta os campos que ainda faltam (com link pra preencher depois)
# - Oferece criar a primeira vaga juntos

finalization_threshold_percent: 80
