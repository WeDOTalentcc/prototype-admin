# LIA Observability Markers Catalog — Track 3 G2 (2026-04-21)
#
# Canonical inventory of all [LIA-XXX] log markers present in runtime.
# Generated from code audit; each marker's purpose + location.
#
# Usage:
#   grep '[LIA-XXX]' in logs — find structured events by category
#   Future: Grafana/Metabase dashboards keyed off these markers
#
# Categories:
#   A  = Agent / Action execution
#   BYOK = Bring Your Own Key (tenant LLM config)
#   C  = Compliance / Context
#   D  = Deprecation
#   E  = Event publishing
#   I  = Intent / Info-query routing
#   M  = Memory / State
#   P  = Pipeline / Performance
#   QUALITY = Prompt quality warnings

