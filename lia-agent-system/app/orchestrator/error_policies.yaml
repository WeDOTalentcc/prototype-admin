# Onda 3.3 Init VII (2026-04-21) — LIA Error Recovery Policies v1
#
# Canonical catalog of deterministic responses to common failure modes.
# Before this catalog: LIA improvised on tool failures (smoke showed tutorials
# like "acesse o menu X" when tool errored). After: error handlers consult
# this YAML and emit a grounded template.
#
# Consumer: `app/orchestrator/error_policies.py` — get_policy(error_type) +
# apply_policy(context) helpers.
#
# v1 ships with 5 canonical policies. Add more via PR with test coverage.

version: 1
metadata:
  initiative: "VII"
  created: "2026-04-21"
  reference: "docs/FINAL_AUDIT.md §9"

policies:
  - id: tool_timeout
    triggers:
      - "timeout"
      - "ReadTimeout"
      - "TimeoutError"
      - "asyncio.TimeoutError"
    response_template: |
      A consulta demorou mais que o esperado. Vou tentar novamente em segundo
      plano — você pode me fazer outra pergunta enquanto isso, ou vamos
      esperar? Se for recorrente, pode haver instabilidade no serviço
      correspondente; me avise que abro um alerta.
    retry_hint: true
    severity: warning
    anti_patterns:
      - "Diz 'ocorreu um erro' sem explicar o que o usuário pode fazer"
      - "Sugere navegar para UI como fallback"

  - id: empty_result
    triggers:
      - "no_results"
      - "empty_list"
      - "zero_matches"
    response_template: |
      Sua consulta não retornou resultados. Isso pode ser por:
      (1) os filtros aplicados são restritivos demais,
      (2) os dados ainda não foram cadastrados,
      (3) ou a busca usa termos que não batem com o cadastro.

      Posso tentar novamente sem filtros, ou você prefere refinar os critérios?
    retry_hint: false
    severity: info
    anti_patterns:
      - "Diz 'não há X' sem perguntar sobre filtros"
      - "Não oferece alternativa de busca"

  - id: enum_error
    triggers:
      - "invalid_enum"
      - "enum_mismatch"
      - "invalid_close_reason"
      - "invalid_status"
    response_template: |
      O valor informado não está na lista de opções válidas para esse campo.
      Valores aceitos: {valid_values}. Qual desses se encaixa?
    retry_hint: false
    severity: warning
    anti_patterns:
      - "Rejeita valor sem listar alternativas"
      - "Pede 'qual X?' genericamente"

  - id: permission_denied
    triggers:
      - "permission_denied"
      - "forbidden"
      - "unauthorized"
      - "HTTP 403"
    response_template: |
      Não tenho permissão para realizar essa ação. Se você acredita que
      deveria ter acesso, fale com o administrador da sua conta. Enquanto
      isso, posso tentar uma alternativa que não exija essa permissão?
    retry_hint: false
    severity: warning
    anti_patterns:
      - "Tenta workaround silencioso"
      - "Omite que foi bloqueado por permissão"

  - id: tenant_mismatch
    triggers:
      - "tenant_mismatch"
      - "company_id_mismatch"
      - "cross_tenant_access"
    response_template: |
      A operação foi bloqueada por política de isolamento multi-tenant.
      O recurso solicitado pertence a outra empresa e não posso acessá-lo.
      Se você está trabalhando na empresa correta, recarregue a sessão; se
      acredita que é um erro, reporte ao administrador.
    retry_hint: false
    severity: error
    anti_patterns:
      - "Processa mesmo com mismatch (P0 security)"
      - "Loga PII da outra empresa"
