version: "1.0"

description: |
  Domain-level keyword/regex routing (LIA-I05 / Fase 5 cutover).
  Loaded by fast_router.py at startup. Each domain has a list of regex patterns.
  First-match wins (with confidence scoring in matcher).
  When adding a new domain or pattern, restart the worker to pick up changes.
  No code change needed — config-as-data.

domains:
  job_management:
    # ── Leitura / Listagem (BUG-17 fix: sem esses patterns, "listar vagas" caía no
    # genérico \bvaga\b e era roteado para job_wizard, que não tem list_jobs no
    # tool registry. Padrões específicos primeiro para ancorar leitura antes de criação)
    - "list(a|ar|ando|e|em|ei)?\\s+(\\w+\\s+)*vagas?"
    - "ver\\s+(\\w+\\s+)*vagas?"
    - "mostrar?\\s+(\\w+\\s+)*vagas?"
    - "filtr\\w*\\s+(\\w+\\s+)*vagas?"
    - "\\bvagas?\\s+\\w+"
    - "minhas?\\s+vagas?"
    - "quais\\s+(\\w+\\s+)*vagas?"
    - "quantas\\s+vagas?"
    - "vagas?\\s+(abertas?|ativas?|em\\s+aberto|em\\s+andamento|pendentes?|fechadas?|pausadas?|canceladas?|publicadas?|urgentes?|encerradas?|arquivadas?)"
    - "ranking\\s+d[eo]?\\s+vagas?"
    - "\\bfunil\\s+d[ae]\\s+vaga"
    - "detalhes\\s+d[ae]\\s+vaga"
    # ── Criação / Edição
    - "editar?\\s+\\w*\\s*vaga"
    - "atualizar?\\s+\\w*\\s*vaga"
    - "gerar?\\s+jd"
    - "job\\s+description"
    - "descri[çc][ãa]o\\s+d[aeo]\\s+vaga"
    - "requisitos\\s+d[aeo]"
    - "clonar?\\s+\\w*\\s*vaga"
    - "fechar?\\s+\\w*\\s*vaga"
    - "publicar?\\s+\\w*\\s*vaga"
    - "pausar?\\s+\\w*\\s*vaga"
    - "template\\s+d[aeo]\\s+vaga"
    - "\\bvaga\\b"
    - "compet[eê]ncias"
    - "sal[áa]rio"
    - "benef[ií]cios"
    - "enrichment"
  wizard:
    # Wizard UI triggers + explicit job creation request.
    # Frente 1 (unificacao wizard 2026-05-29): TODA intencao de CRIACAO de vaga
    # roteia deterministicamente para o grafo canonico (job_creation/graph.py via
    # WizardSessionService). Espelhado em _HARDCODED_DOMAIN_PATTERNS (fast_router.py)
