    - "abrir?\\s+\\w*\\s*vaga"
    - "requisi[\u00e7c][\u00e3a]o\\s+d[eo]\\s+vaga"
    - "\\bwizard\\b"
    - "quero\\s+criar\\s+\\w*\\s*vaga"
    - "vou\\s+criar\\s+\\w*\\s*vaga"
    - "preciso\\s+contratar"
    - "vamos\\s+criar\\s+\\w*\\s*vaga"
    - "nova\\s+vaga"
    - "criar?\\s+\\w*\\s*vaga"
    - "publicar?\\s+\\w*\\s*vaga"

