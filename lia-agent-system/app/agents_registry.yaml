# Agent Registry — LIA Platform
# Source of truth for dynamic agent declarations.
# Hot-reload supported via AgentRegistryWatcher (app/core/agent_registry_watcher.py).
#
# Format per agent:
#   name: string (unique identifier, matches domain key in ReactAgentRegistry)
#   domain: string (domain label)
#   class_path: string (fully-qualified Python class path)
#   model_id: string (LLM model identifier)
#   system_prompt_path: string | null (path to system_prompt.py module)
#   enabled: bool (set false to disable without removing entry)

agents:
  - name: pipeline
    domain: pipeline
    class_path: app.domains.pipeline.agents.pipeline_transition_agent.PipelineTransitionAgent
    model_id: claude-sonnet-4-6
    system_prompt_path: app/domains/pipeline/agents/system_prompt.py
    enabled: true

  - name: sourcing
    domain: sourcing
    class_path: app.domains.sourcing.agents.sourcing_react_agent.SourcingReActAgent
    model_id: claude-sonnet-4-6
    system_prompt_path: app/domains/sourcing/agents/system_prompt.py
    enabled: true

  - name: wizard
    domain: wizard
    class_path: app.domains.job_management.agents.wizard_react_agent.WizardReActAgent
    model_id: claude-sonnet-4-6
    system_prompt_path: app/domains/job_management/agents/system_prompt.py
    enabled: true

  # R-004 (2026-05-07): apontava para app.domains.talent.agents.talent_agent.TalentAgent
  # (módulo inexistente). Real é talent_pool (domain-aligned).
  - name: talent
    domain: talent
    class_path: app.domains.talent_pool.agents.talent_pool_agent.TalentPoolReActAgent
    model_id: claude-haiku-4-5-20251001
    system_prompt_path: null
    enabled: true

  # R-013 (2026-05-08): TalentFunnelReActAgent — recruitment funnel domain (discovery,
  # analysis, action planning for active candidates). NOT the same as talent (talent bank).
  # Renamed from TalentReActAgent to eliminate @register_agent decorator collision risk.
  - name: talent_funnel
    domain: talent_funnel
    class_path: app.domains.recruiter_assistant.agents.talent_funnel_react_agent.TalentFunnelReActAgent
    model_id: claude-sonnet-4-6
    system_prompt_path: null
    enabled: true

  # R-004 (2026-05-07): apontava para app.domains.kanban.agents.kanban_agent.KanbanAgent
  # (módulo inexistente). Parent canonical em recruiter_assistant; subagents
  # (action/insight/search) acessíveis via tool_registry.
  - name: kanban
    domain: kanban
    class_path: app.domains.recruiter_assistant.agents.kanban_react_agent.KanbanReActAgent
    model_id: claude-haiku-4-5-20251001
    system_prompt_path: null
    enabled: true

  # R-004 (2026-05-07): apontava para app.domains.policy.agents.policy_agent.PolicySetupAgent
  # (módulo inexistente). Real é hiring_policy.PolicyReActAgent.
  - name: policy
    domain: policy
    class_path: app.domains.hiring_policy.agents.policy_react_agent.PolicyReActAgent
    model_id: claude-haiku-4-5-20251001
    system_prompt_path: null
    enabled: true

  # R-004 (2026-05-07): entry jobs_management DELETADA — consolidada em wizard
  # (mesma classe). Histórico apontava para jobs_management_agent.JobsManagementReActAgent
  # (módulo inexistente). Real era WizardReActAgent / JobWizardGraph já cobertos por wizard.

  - name: analytics
    domain: analytics
    class_path: app.domains.analytics.agents.analytics_react_agent.AnalyticsReActAgent
    model_id: claude-sonnet-4-6
    system_prompt_path: app/domains/analytics/agents/analytics_system_prompt.py
    enabled: true

  - name: ats_integration
    domain: ats_integration
    class_path: app.domains.ats_integration.agents.ats_integration_react_agent.ATSIntegrationReActAgent
    model_id: claude-haiku-4-5-20251001
    system_prompt_path: app/domains/ats_integration/agents/ats_integration_system_prompt.py
    enabled: true

  - name: automation
    domain: automation
    class_path: app.domains.automation.agents.automation_react_agent.AutomationReActAgent
    model_id: claude-haiku-4-5-20251001
    system_prompt_path: app/domains/automation/agents/automation_system_prompt.py
    enabled: true

  - name: communication
    domain: communication
    class_path: app.domains.communication.agents.communication_react_agent.CommunicationReActAgent
    model_id: claude-haiku-4-5-20251001
    system_prompt_path: app/domains/communication/agents/communication_system_prompt.py
    enabled: true

  # ACTIVE: autonomous agent is Tier 6 of CascadedRouter (cross-domain ReAct).
  # Triggered when Tiers 0-5 fail to route with sufficient confidence.
  # Exposes dedicated API router via app/api/v1/lia_autonomous.py and
  # AutonomousAgentService (used by proactive_actions endpoints).
  # Pool of 40+ curated tools across all domains; circuit-breaker + FairnessGuard enabled.
  # DO NOT set enabled: false or deprecated: true — this agent is production-critical.
  - name: autonomous
    domain: autonomous
    class_path: app.domains.autonomous.agents.autonomous_react_agent.AutonomousReActAgent
    model_id: claude-sonnet-4-6
    system_prompt_path: null
    enabled: true
