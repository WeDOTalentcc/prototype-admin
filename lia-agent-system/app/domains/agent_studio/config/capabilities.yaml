domain_id: agent_studio
name: Agent Studio
description: Gerenciamento e configuracao de agentes IA personalizados

intents:
  - action: explain_agent_studio
    type: info
    keywords:
      - "como funciona o agent studio"
      - "o que e agent studio"
      - "como usar agent studio"
      - "me explica agent studio"
    description: Explica o que e o Agent Studio e como funciona
    confidence: 0.9

  - action: list_agents
    type: action
    keywords:
      - "listar agentes"
      - "meus agentes"
      - "ver agentes"
      - "quais agentes"
      - "agentes ativos"
    description: Lista agentes configurados
    confidence: 0.85

  - action: create_sourcing_agent
    type: action
    keywords:
      - "criar agente"
      - "novo agente"
      - "configurar agente"
      - "adicionar agente"
      - "ativar agente"
      - "agente sourcing"
    description: Cria um novo agente de sourcing
    confidence: 0.85

  - action: calibrate_agent
    type: action
    keywords:
      - "calibrar"
      - "calibracao"
      - "recalibrar"
    description: Calibra ou recalibra um agente
    confidence: 0.85

  - action: get_agent_status
    type: action
    keywords:
      - "status agente"
      - "como esta o agente"
    description: Consulta status de um agente
    confidence: 0.85

  - action: create_custom_agent
    type: action
    keywords:
      - "agente custom"
      - "agente customizado"
      - "criar custom"
      - "novo custom"
    description: Cria agente customizado
    confidence: 0.85

  - action: browse_marketplace
    type: action
    keywords:
      - "marketplace"
      - "explorar marketplace"
    description: Navega o marketplace de agentes
    confidence: 0.85

  - action: run_multi_strategy
    type: action
    keywords:
      - "busca inteligente"
      - "multi estrategia"
      - "busca multi"
      - "4 estrategias"
    description: Executa busca multi-estrategia
    confidence: 0.85
