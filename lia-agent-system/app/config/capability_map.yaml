# app/config/capability_map.yaml
# Canonical source of truth for Rail A card capabilities.
# PR-J harness-engineering [guide computacional]
# Rule: every intent MUST have navigate_fallback OR modal_id.
# Sensor: tests/unit/services/test_pr_j_capability_map.py enforces this.

capabilities:

  add_candidate:
    label: "Adicionar candidato"
    chat_executable: false   # AddCandidateModal (3 abas) > chat loop de 5 perguntas
    entity_required: []
    modal_id: add_candidate
    navigate_fallback: /funil-de-talentos

  search_candidates:
    label: "Buscar candidatos"
    chat_executable: true
    entity_required: []
    navigate_fallback: /funil-de-talentos

  move_candidate:
    chat_executable: true
    entity_required:
      - type: candidate
        param: candidate_id
      - type: stage
        param: stage_target
    modal_id: stage_transition
    navigate_fallback: /visao-do-funil

  # ── PR-CAL: schedule_interview — Card 4.1 opens InterviewSchedulingModal ─────
  schedule_interview:
    label: "Agendar entrevista"
    chat_executable: false   # modal > AI stub (SIMULATION_STUB is AI-layer only)
    entity_required:
      - type: candidate
        param: candidate_id
    modal_id: interview_scheduling
    navigate_fallback: /visao-do-funil?view=entrevistas

  reschedule_interview:
    label: "Reagendar entrevista"
    chat_executable: true
    entity_required:
      - type: candidate
        param: candidate_id
    modal_id: interview_scheduling
    navigate_fallback: /visao-do-funil?view=entrevistas

  compare_candidates:
    label: "Comparar candidatos"
    chat_executable: true
    entity_required:
      - type: job
        param: job_id
    modal_id: candidate_compare
    navigate_fallback: /visao-do-funil?stage=oferta

  # ── Wave 1 PR-Q2: job entity resolution for VERIFICAR cards ──────────────
  close_job:
    label: "Encerrar vaga"
    chat_executable: true
    requires_confirmation: true   # HITL: encerrar vaga é destrutivo (decisão Paulo 2026-06-06)
    entity_required:
      - type: job
        param: job_id
    navigate_page: vaga_detalhe   # fechar acontece na vaga (HITL na página)
    navigate_fallback: /jobs?status=open

  generate_job_report:
    label: "Gerar relatório da vaga"
    chat_executable: true
    entity_required:
      - type: job
        param: job_id
    modal_id: job_report
    navigate_fallback: /analytics

  # ── Wave 1 PR-Q3: canonical intents for analytics/WSI cards ─────────────
  forecast:
    chat_executable: true
    entity_required: []     # tenant-wide forecast — no entity needed
    navigate_fallback: /analytics?view=previsoes

  # PR-Q3: renamed from start_wsi_flow to align with FE intent_hint "start_wsi_interview"
  # (SUGGESTION_HINTS["wsi-screening"].intent_hint = "start_wsi_interview")
  start_wsi_interview:
    chat_executable: true
    entity_required:
      - type: job
        param: job_id
    navigate_fallback: /jobs


  # ── Wave 4 PR-B + PR-C: Offer + Hire actions ────────────────────────────
  send_offer:
    label: "Enviar oferta"
    chat_executable: false   # opens OfferReviewModal; HITL review before send
    entity_required:
      - type: candidate
        param: candidate_id
    modal_id: offer_review
    navigate_fallback: /visao-do-funil?stage=oferta

  register_hire:
    chat_executable: true    # LIA guides checklist; entity resolution required
    entity_required:
      - type: candidate
        param: candidate_id
      - type: job
        param: job_id
    navigate_fallback: /visao-do-funil?stage=contratacao

  # ── W1-2: daily_briefing — card 7.2, chat_executable (BriefingService legacy) ──
  daily_briefing:
    chat_executable: true
    entity_required: []       # tenant-wide summary — no specific entity needed
    navigate_fallback: /analytics


  # ── PR-J card 3.1: candidate-info — quick contextual Q&A ──────────────
  quick_question:
    chat_executable: true
    entity_required: []
    navigate_fallback: /visao-do-funil

  # ── PR-J2 card 8.3: ai-suggestions — proactive action recommendation ───
  suggest_action:
    chat_executable: true
    entity_required: []
    navigate_fallback: /analytics


  # ── UC-P1-28: Ghost cards Rail A — 7 missing capabilities ───────────────

  criar_vaga:
    chat_executable: true
    entity_required: []
    navigate_fallback: /jobs/new

  listar_talent_pools:
    chat_executable: true
    entity_required: []
    navigate_fallback: /talent-pools

  criar_automacao:
    chat_executable: false
    entity_required: []
    # modal_id: automation_builder — REMOVIDO (F1 2026-06-09): componente inexistente,
    # rota /automacoes nao existe; feature nao-implementada. Domínio automation é real
    # (stage_automation_engine) mas acao create_automation nao tem handler. Usa navigate_fallback.
    navigate_fallback: /automacoes

  consultar_consumo:
    chat_executable: true
    entity_required: []
    navigate_fallback: /analytics?view=consumo

  configurar_policy:
    chat_executable: false
    entity_required: []
    modal_id: hiring_policy_config
    navigate_fallback: /configuracoes/politicas

  criar_template:
    chat_executable: false
    entity_required: []
    # modal_id: template_builder — REMOVIDO (F1 2026-06-09): ghost puro — sem componente FE,
    # sem handler BE, sem rota /templates. Usa navigate_fallback.
    navigate_fallback: /templates

  criar_a_partir_de_template:
    chat_executable: true
    entity_required:
      - type: template
        param: template_id
    navigate_fallback: /templates

  # ── Fase B (2026-06-06): set curado de modais globais abríveis pela LIA ──
  # Decisão Paulo: ~18 modais globais (read-only abrem direto; destrutivos
  # com requires_confirmation=true → o modal confirma a ação, HITL).
  # open_ui(capability) valida + retorna ui_action=open_modal. Os ~110 modais
  # internos de página ficam de fora (não-globais) — promoção caso-a-caso.

  view_profile:
    chat_executable: false
    # Correção 2026-06-06: perfil de CANDIDATO = navegar p/ a página
    # /funil-de-talentos/candidato/{id}. O 'profile-modal' é o perfil do
    # USUÁRIO logado (SSO/email), NÃO do candidato. Sem modal_id → open_ui
    # não oferece; o agente usa [NAVIGATE:candidato_detalhe:id] (Fase A).
    entity_required:
      - type: candidate
        param: candidate_id
    navigate_page: candidato_detalhe
    navigate_fallback: /funil-de-talentos

  job_insights:
    label: "Ver insights da vaga"
    chat_executable: false
    entity_required:
      - type: job
        param: job_id
    modal_id: job_insights          # B3b (2026-06-09): modal de insights inline
    navigate_page: vaga_detalhe   # insights vivem na vaga (métricas pré-computadas)
    navigate_fallback: /jobs

  view_job_kanban:
    label: "Abrir kanban/pipeline da vaga"
    description: "Navega para a pagina de detalhes da vaga com candidatos e pipeline. Use SEMPRE que o recrutador quiser ABRIR, VER, ACESSAR ou MOSTRAR uma vaga existente."
    chat_executable: true
    entity_required:
      - type: job
        param: job_id
    navigate_page: vaga_detalhe
    navigate_fallback: /jobs

  compare_jobs:
    label: "Comparar vagas"
    chat_executable: false
    entity_required: []
    modal_id: job_compare         # abre modal de comparação multi-vaga (Fase 1D)
    navigate_fallback: /jobs

  view_score:
    label: "Ver score do candidato"
    chat_executable: false
    entity_required:
      - type: candidate
        param: candidate_id
    modal_id: general_score
    navigate_fallback: /funil-de-talentos

  view_bigfive:
    label: "Ver perfil Big Five"
    chat_executable: false
    entity_required:
      - type: candidate
        param: candidate_id
    modal_id: big_five
    navigate_fallback: /funil-de-talentos

  change_job_status:
    label: "Mudar status da vaga"
    chat_executable: false
    requires_confirmation: true   # HITL: mudança de status de vaga
    entity_required:
      - type: job
        param: job_id
    navigate_page: vaga_detalhe   # mudar status na vaga (HITL na página)
    navigate_fallback: /jobs

  bulk_action:
    label: "Ação em massa"
    chat_executable: false
    requires_confirmation: true   # HITL: ação em massa (potencialmente destrutiva)
    entity_required: []
    navigate_page: funil_talentos # ação em massa exige seleção (no funil)
    navigate_fallback: /funil-de-talentos

  send_communication:
    label: "Enviar comunicação"
    chat_executable: false
    requires_confirmation: true   # HITL: envio de comunicação a candidato(s)
    entity_required: []
    navigate_page: central_comunicacao
    navigate_fallback: /central-comunicacao

  assign_recruiter:
    label: "Atribuir recrutador"
    chat_executable: false
    requires_confirmation: true   # HITL: reatribuir responsável da vaga
    entity_required:
      - type: job
        param: job_id
    navigate_page: vaga_detalhe   # atribuir na vaga
    navigate_fallback: /jobs

  data_request:
    label: "Solicitar dados (LGPD)"
    chat_executable: false
    requires_confirmation: true   # HITL: solicitação de dados (LGPD)
    entity_required: []
    navigate_page: funil_talentos # solicitar dados exige seleção (no funil)
    navigate_fallback: /trust

  open_fullscreen_chat:
    label: "Abrir chat em tela cheia"
    chat_executable: true          # navegação executada diretamente pelo chat
    requires_confirmation: false
    entity_required: []
    navigate_page: chat             # CanonicalPage.CHAT = "chat" -> /pt/chat
    navigate_fallback: /chat

  # Navegacao para paginas principais (Bug 2026-06-08).
  ir_para_configuracoes:
    label: Ir para Configuracoes
    description: Navegar para a pagina de Configuracoes
    chat_executable: false
    entity_required: []
    navigate_page: configuracoes
    navigate_fallback: /configuracoes

  ir_para_funil_talentos:
    label: Ir para Funil de Talentos
    description: Navegar para o Funil de Talentos
    chat_executable: false
    entity_required: []
    navigate_page: funil_talentos
    navigate_fallback: /funil-de-talentos

  ir_para_agent_studio:
    label: Ir para Estudio de Agentes
    description: Navegar para o Estudio de Agentes de IA
    chat_executable: false
    entity_required: []
    navigate_page: agent_studio
    navigate_fallback: /agent-studio

  # ── Alias: create_job = criar_vaga (corrige divergência SUGGESTION_HINTS vs YAML 2026-06-10)
  create_job:
    label: "Criar nova vaga"
    description: "Iniciar criacao de nova vaga. Alias de criar_vaga para compatibilidade com intent_hint do Rail A."
    chat_executable: true
    entity_required: []
    navigate_fallback: /jobs/new

  # ── Navegacao para paginas principais — expansao canonical 2026-06-10 ──────
  # chat_executable: false → Rail A short-circuit (sem LLM); navigate_page →
  # open_ui via LLM usa enum canonico; navigate_fallback → fallback URL bruta.

  ir_para_dashboard:
    label: "Ir para Dashboard / Indicadores"
    description: "Navegar para o dashboard de indicadores e metricas de recrutamento"
    chat_executable: false
    entity_required: []
    navigate_page: dashboard
    navigate_fallback: /?view=Indicadores

  ir_para_tasks:
    label: "Ir para Tarefas / Aprovacoes"
    description: "Navegar para o centro de tarefas e aprovacoes pendentes (HITL)"
    chat_executable: false
    entity_required: []
    navigate_page: tasks
    navigate_fallback: /tasks

  ir_para_central_comunicacao:
    label: "Ir para Central de Comunicacao"
    description: "Navegar para a central de comunicacao (emails, WhatsApp, templates)"
    chat_executable: false
    entity_required: []
    navigate_page: central_comunicacao
    navigate_fallback: /central-comunicacao

  ir_para_biblioteca:
    label: "Ir para Biblioteca LIA"
    description: "Navegar para a biblioteca de templates e artefatos reutilizaveis da LIA"
    chat_executable: false
    entity_required: []
    navigate_page: biblioteca
    navigate_fallback: /biblioteca-lia

  ir_para_bancos_talentos:
    label: "Ir para Bancos de Talentos"
    description: "Navegar para bancos de talentos (candidatos passados para reativacao e matching)"
    chat_executable: false
    entity_required: []
    navigate_page: bancos_talentos
    navigate_fallback: /bancos-de-talentos

  ir_para_vagas:
    label: "Ir para Lista de Vagas"
    description: "Navegar para a lista de vagas cadastradas da empresa"
    chat_executable: false
    entity_required: []
    navigate_page: vagas
    navigate_fallback: /jobs

  ir_para_trust:
    label: "Ir para Trust Center / Conformidade"
    description: "Navegar para o trust center de compliance, LGPD, auditoria e governanca"
    chat_executable: false
    entity_required: []
    navigate_page: trust
    navigate_fallback: /trust

  ir_para_marketplace:
    label: "Ir para Marketplace de Agentes"
    description: "Navegar para o marketplace de agentes IA disponiveis para instalacao"
    chat_executable: false
    entity_required: []
    navigate_page: agents_marketplace
    navigate_fallback: /agents/marketplace

  ir_para_creditos_ia:
    label: "Ir para Creditos de IA"
    description: "Navegar para a tela de creditos de IA (saldo, consumo, compra de creditos)"
    chat_executable: false
    entity_required: []
    navigate_page: ai_credits
    navigate_fallback: /configuracoes/ai-credits

  ir_para_integracoes:
    label: "Ir para Integracoes ATS"
    description: "Navegar para a pagina de integracoes com sistemas externos de recrutamento"
    chat_executable: false
    entity_required: []
    navigate_page: integracoes_ats
    navigate_fallback: /integracoes-ats

  ir_para_ajuda:
    label: "Ir para Ajuda / Documentacao"
    description: "Navegar para a pagina de ajuda e documentacao da plataforma"
    chat_executable: false
    entity_required: []
    navigate_page: ajuda
    navigate_fallback: /ajuda

  ir_para_home:
    label: "Ir para Inicio / Home"
    description: "Navegar para a pagina inicial da plataforma"
    chat_executable: false
    entity_required: []
    navigate_page: home
    navigate_fallback: /

  # ── Visão Global (Recrutar) — tabs candidatos e vagas (2026-06-10) ──────
  ir_para_visao_global:
    label: "Ir para Visao Global / Pipeline"
    description: "Navegar para a Visao Global do pipeline de recrutamento (pagina Recrutar)"
    chat_executable: false
    entity_required: []
    navigate_page: pipeline_kanban
    navigate_fallback: /recrutar

  ir_para_visao_global_candidatos:
    label: "Ir para Visao Global — aba Candidatos"
    description: "Navegar para a Visao Global mostrando o funil de candidatos por etapa"
    chat_executable: false
    entity_required: []
    navigate_page: pipeline_kanban
    navigate_query:
      view: candidatos
    navigate_fallback: /recrutar?view=candidatos

  ir_para_visao_global_vagas:
    label: "Ir para Visao Global — aba Vagas"
    description: "Navegar para a Visao Global mostrando o ciclo de vida das vagas por etapa"
    chat_executable: false
    entity_required: []
    navigate_page: pipeline_kanban
    navigate_query:
      view: vagas
    navigate_fallback: /recrutar?view=vagas

  # ── Deep-links de Configurações por seção (2026-06-10) ──────────────────
  # settings_section → emite settings_open_tab (navega + abre aba na tela).
  # chat_executable: false → Rail A short-circuit se houver intent_hint.

  ir_para_config_empresa:
    label: "Configurar Empresa"
    description: "Abrir configuracoes de perfil da empresa, cultura, beneficios e dados basicos"
    chat_executable: false
    entity_required: []
    settings_section: minha-empresa
    navigate_fallback: /configuracoes?section=minha-empresa

  ir_para_config_lia:
