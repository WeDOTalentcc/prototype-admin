# app/config/capability_map.yaml
# Canonical source of truth for Rail A card capabilities.
# PR-J harness-engineering [guide computacional]
# Rule: every intent MUST have navigate_fallback OR modal_id.
# Sensor: tests/unit/services/test_pr_j_capability_map.py enforces this.

capabilities:

  add_candidate:
    chat_executable: false   # AddCandidateModal (3 abas) > chat loop de 5 perguntas
    entity_required: []
    modal_id: add_candidate
    navigate_fallback: /funil-de-talentos

  search_candidates:
    chat_executable: true
    entity_required: []
    navigate_fallback: /funil-de-talentos

  move_candidate:
    chat_executable: true
    entity_required:
      - type: candidate
        param: candidate_id
      - type: stage
        param: stage_target
    modal_id: stage_transition
    navigate_fallback: /visao-do-funil

  reschedule_interview:
    chat_executable: true
    entity_required:
      - type: candidate
        param: candidate_id
    modal_id: interview_scheduling
    navigate_fallback: /visao-do-funil?view=entrevistas

  compare_candidates:
    chat_executable: true
    entity_required:
      - type: job
        param: job_id
    modal_id: candidate_compare
    navigate_fallback: /visao-do-funil?stage=oferta

  # ── Wave 1 PR-Q2: job entity resolution for VERIFICAR cards ──────────────
  close_job:
    chat_executable: true
    entity_required:
      - type: job
        param: job_id
    navigate_fallback: /jobs?status=open

  generate_job_report:
    chat_executable: true
    entity_required:
      - type: job
        param: job_id
    navigate_fallback: /analytics

  # ── Wave 1 PR-Q3: canonical intents for analytics/WSI cards ─────────────
  forecast:
    chat_executable: true
    entity_required: []     # tenant-wide forecast — no entity needed
    navigate_fallback: /analytics?view=previsoes

  start_wsi_flow:
    chat_executable: true
    entity_required:
      - type: job
        param: job_id
    navigate_fallback: /jobs

