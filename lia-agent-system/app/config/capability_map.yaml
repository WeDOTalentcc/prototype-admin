# app/config/capability_map.yaml
# Canonical source of truth for Rail A card capabilities.
# PR-J harness-engineering [guide computacional]
# Rule: every intent MUST have navigate_fallback OR modal_id.
# Sensor: tests/unit/services/test_pr_j_capability_map.py enforces this.

capabilities:

  add_candidate:
    chat_executable: false   # AddCandidateModal (3 abas) > chat loop de 5 perguntas
    entity_required: []
    modal_id: add_candidate
    navigate_fallback: /funil-de-talentos

  search_candidates:
    chat_executable: true
    entity_required: []
    navigate_fallback: /funil-de-talentos

  move_candidate:
    chat_executable: true
    entity_required:
      - type: candidate
        param: candidate_id
      - type: stage
        param: stage_target
    modal_id: stage_transition
    navigate_fallback: /visao-do-funil

  # ── PR-CAL: schedule_interview — Card 4.1 opens InterviewSchedulingModal ─────
  schedule_interview:
    chat_executable: false   # modal > AI stub (SIMULATION_STUB is AI-layer only)
    entity_required:
      - type: candidate
        param: candidate_id
    modal_id: interview_scheduling
    navigate_fallback: /visao-do-funil?view=entrevistas

  reschedule_interview:
    chat_executable: true
    entity_required:
      - type: candidate
        param: candidate_id
    modal_id: interview_scheduling
    navigate_fallback: /visao-do-funil?view=entrevistas

  compare_candidates:
    chat_executable: true
    entity_required:
      - type: job
        param: job_id
    modal_id: candidate_compare
    navigate_fallback: /visao-do-funil?stage=oferta

  # ── Wave 1 PR-Q2: job entity resolution for VERIFICAR cards ──────────────
  close_job:
    chat_executable: true
    requires_confirmation: true   # HITL: encerrar vaga é destrutivo (decisão Paulo 2026-06-06)
    entity_required:
      - type: job
        param: job_id
    modal_id: close_vacancy
    navigate_fallback: /jobs?status=open

  generate_job_report:
    chat_executable: true
    entity_required:
      - type: job
        param: job_id
    modal_id: job_report
    navigate_fallback: /analytics

  # ── Wave 1 PR-Q3: canonical intents for analytics/WSI cards ─────────────
  forecast:
    chat_executable: true
    entity_required: []     # tenant-wide forecast — no entity needed
    navigate_fallback: /analytics?view=previsoes

  # PR-Q3: renamed from start_wsi_flow to align with FE intent_hint "start_wsi_interview"
  # (SUGGESTION_HINTS["wsi-screening"].intent_hint = "start_wsi_interview")
  start_wsi_interview:
    chat_executable: true
    entity_required:
      - type: job
        param: job_id
    navigate_fallback: /jobs


  # ── Wave 4 PR-B + PR-C: Offer + Hire actions ────────────────────────────
  send_offer:
    chat_executable: false   # opens OfferReviewModal; HITL review before send
    entity_required:
      - type: candidate
        param: candidate_id
    modal_id: offer_review
    navigate_fallback: /visao-do-funil?stage=oferta

  register_hire:
    chat_executable: true    # LIA guides checklist; entity resolution required
    entity_required:
      - type: candidate
        param: candidate_id
      - type: job
        param: job_id
    navigate_fallback: /visao-do-funil?stage=contratacao

  # ── W1-2: daily_briefing — card 7.2, chat_executable (BriefingService legacy) ──
  daily_briefing:
    chat_executable: true
    entity_required: []       # tenant-wide summary — no specific entity needed
    navigate_fallback: /analytics


  # ── PR-J card 3.1: candidate-info — quick contextual Q&A ──────────────
  quick_question:
    chat_executable: true
    entity_required: []
    navigate_fallback: /visao-do-funil

  # ── PR-J2 card 8.3: ai-suggestions — proactive action recommendation ───
  suggest_action:
    chat_executable: true
    entity_required: []
    navigate_fallback: /analytics


  # ── UC-P1-28: Ghost cards Rail A — 7 missing capabilities ───────────────

  criar_vaga:
    chat_executable: true
    entity_required: []
    navigate_fallback: /jobs/new

  listar_talent_pools:
    chat_executable: true
    entity_required: []
    navigate_fallback: /talent-pools

  criar_automacao:
    chat_executable: false
    entity_required: []
    modal_id: automation_builder
    navigate_fallback: /automacoes

  consultar_consumo:
    chat_executable: true
    entity_required: []
    navigate_fallback: /analytics?view=consumo

  configurar_policy:
    chat_executable: false
    entity_required: []
    modal_id: hiring_policy_config
    navigate_fallback: /configuracoes/politicas

  criar_template:
    chat_executable: false
    entity_required: []
    modal_id: template_builder
    navigate_fallback: /templates

  criar_a_partir_de_template:
    chat_executable: true
    entity_required:
      - type: template
        param: template_id
    navigate_fallback: /templates

  # ── Fase B (2026-06-06): set curado de modais globais abríveis pela LIA ──
  # Decisão Paulo: ~18 modais globais (read-only abrem direto; destrutivos
  # com requires_confirmation=true → o modal confirma a ação, HITL).
  # open_ui(capability) valida + retorna ui_action=open_modal. Os ~110 modais
  # internos de página ficam de fora (não-globais) — promoção caso-a-caso.

  view_profile:
    chat_executable: false
    # Correção 2026-06-06: perfil de CANDIDATO = navegar p/ a página
    # /funil-de-talentos/candidato/{id}. O 'profile-modal' é o perfil do
    # USUÁRIO logado (SSO/email), NÃO do candidato. Sem modal_id → open_ui
    # não oferece; o agente usa [NAVIGATE:candidato_detalhe:id] (Fase A).
    entity_required:
      - type: candidate
        param: candidate_id
    navigate_fallback: /funil-de-talentos

  job_insights:
    chat_executable: false
    entity_required:
      - type: job
        param: job_id
    modal_id: job_insights
    navigate_fallback: /jobs

  compare_jobs:
    chat_executable: false
    entity_required: []
    modal_id: job_compare
    navigate_fallback: /jobs

  view_score:
    chat_executable: false
    entity_required:
      - type: candidate
        param: candidate_id
    modal_id: general_score
    navigate_fallback: /funil-de-talentos

  view_bigfive:
    chat_executable: false
    entity_required:
      - type: candidate
        param: candidate_id
    modal_id: big_five
    navigate_fallback: /funil-de-talentos

  change_job_status:
    chat_executable: false
    requires_confirmation: true   # HITL: mudança de status de vaga
    entity_required:
      - type: job
        param: job_id
    modal_id: job_status
    navigate_fallback: /jobs

  bulk_action:
    chat_executable: false
    requires_confirmation: true   # HITL: ação em massa (potencialmente destrutiva)
    entity_required: []
    modal_id: bulk_action
    navigate_fallback: /funil-de-talentos

  send_communication:
    chat_executable: false
    requires_confirmation: true   # HITL: envio de comunicação a candidato(s)
    entity_required: []
    modal_id: unified_communication
    navigate_fallback: /central-comunicacao

  assign_recruiter:
    chat_executable: false
    requires_confirmation: true   # HITL: reatribuir responsável da vaga
    entity_required:
      - type: job
        param: job_id
    modal_id: job_assign_recruiter
    navigate_fallback: /jobs

  data_request:
    chat_executable: false
    requires_confirmation: true   # HITL: solicitação de dados (LGPD)
    entity_required: []
    modal_id: data_request
    navigate_fallback: /trust
