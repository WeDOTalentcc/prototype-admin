version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: pgvector/pgvector:pg16
    container_name: lia-postgres
    environment:
      POSTGRES_USER: lia_user
      POSTGRES_PASSWORD: lia_password
      POSTGRES_DB: lia_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lia_user -d lia_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: lia-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: lia-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lia-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # api-vagas — Micro-app de gerenciamento de vagas (port 8001)
  api-vagas:
    build:
      context: .
      dockerfile: apps/api-vagas/Dockerfile
    container_name: lia-api-vagas
    env_file:
      - .env
    ports:
      - "8001:8001"
    volumes:
      - ./app:/workspace/app
      - ./apps:/workspace/apps
      - ./libs:/workspace/libs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # api-funil — Micro-app de pipeline e funil de candidatos (port 8002)
  api-funil:
    build:
      context: .
      dockerfile: apps/api-funil/Dockerfile
    container_name: lia-api-funil
    env_file:
      - .env
    ports:
      - "8002:8002"
    volumes:
      - ./app:/workspace/app
      - ./apps:/workspace/apps
      - ./libs:/workspace/libs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # api-onboarding — Micro-app de onboarding de empresas (port 8003)
  api-onboarding:
    build:
      context: .
      dockerfile: apps/api-onboarding/Dockerfile
    container_name: lia-api-onboarding
    env_file:
      - .env
    ports:
      - "8003:8003"
    volumes:
      - ./app:/workspace/app
      - ./apps:/workspace/apps
      - ./libs:/workspace/libs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # Celery Worker — High priority (sourcing, evaluation high)
  # Handles: sourcing_high (priority 8), evaluation_high — time-sensitive tasks
  celery_worker_high:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lia-celery-worker-high
    env_file:
      - .env
    volumes:
      - ./app:/app/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: >
      celery -A app.core.celery_app worker
      --loglevel=info
      --queues=sourcing_high,evaluation_normal
      --concurrency=4
      --hostname=worker-high@%h
    restart: unless-stopped

  # Celery Worker — Normal priority (vagas, pipeline, evaluation normal)
  # Handles: vagas_normal (priority 5), evaluation_normal (priority 5)
  celery_worker_normal:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lia-celery-worker-normal
    env_file:
      - .env
    volumes:
      - ./app:/app/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: >
      celery -A app.core.celery_app worker
      --loglevel=info
      --queues=vagas_normal,celery
      --concurrency=4
      --hostname=worker-normal@%h
    restart: unless-stopped

  # Celery Worker — Low priority (onboarding, drift batch, background)
  # Handles: onboarding_low (priority 3), drift.run_batch (scheduled daily)
  celery_worker_low:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lia-celery-worker-low
    env_file:
      - .env
    volumes:
      - ./app:/app/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: >
      celery -A app.core.celery_app worker
      --loglevel=info
      --queues=onboarding_low
      --concurrency=2
      --hostname=worker-low@%h
    restart: unless-stopped

  # Celery Beat — Scheduler for periodic tasks (drift-run-batch-daily at 06h BRT)
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lia-celery-beat
    env_file:
      - .env
    volumes:
      - ./app:/app/app
    depends_on:
      - redis
      - rabbitmq
    command: celery -A app.core.celery_app beat --loglevel=info --scheduler=celery.beat:PersistentScheduler
    restart: unless-stopped

  # Flower — Celery monitoring dashboard (http://localhost:5555)
  flower:
    image: mher/flower:2.0
    container_name: lia-flower
    env_file:
      - .env
    ports:
      - "5555:5555"
    environment:
      CELERY_BROKER_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672//}
    depends_on:
      - rabbitmq
    command: celery flower --broker=${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672//}
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
