# Task #977 — Prometheus alert rules canônicas para o canary do
# TenantAwareAgentMixin. Esta é a fonte autoritativa do alerta — consulta o
# Counter `lia_agent_tenant_context_resolved_total` agregado por TODAS as
# instâncias do `lia-backend`, garantindo cobertura multi-process / multi-pod
# (o endpoint /health/tenant-context-canary é apenas snapshot por processo).
#
# Carregar via PrometheusRule (kube-prometheus-stack), Grafana Alerting ou
# import direto no `prometheus.yml > rule_files`.

groups:
  - name: lia.tenant_context.canary
    interval: 30s
    rules:
      # ── WARNING: QUALQUER fail_open em prod ─────────────────────────
      # Em prod NUNCA deveria existir — sinaliza LIA_AGENT_TENANT_STRICT=false
      # ativo (TenantAwareAgentMixin degradando para "sua empresa"/"geral").
      # IMPORTANTE: lookback amplo (5m) e SEM `for:` pra disparar mesmo em
      # evento único — esse é o sinal exato que o canary precisa pegar
      # (regressão silenciosa pode ser uma única request degradada).
      # Selector `env=~"production|prod|staging"` espelha _PROD_LIKE em
      # tenant_aware_agent.py — ajustar se sua topologia Prometheus relabel
      # diferente (ex: `cluster`, `namespace`).
      - alert: LIATenantContextFailOpen
        expr: |
          sum by (agent, env) (
            increase(
              lia_agent_tenant_context_resolved_total{
                outcome="fail_open",
                env=~"production|prod|staging"
              }[5m]
            )
          ) > 0
        labels:
          severity: warning
          team: lia-platform
          runbook: missing_tenant_context.md
          event_key: LIA_AGENT_TENANT_STRICT_BYPASS
        annotations:
          summary: "LIA agente {{ $labels.agent }} degradou para tenant vazio (fail_open)"
          description: |
            Em produção o TenantAwareAgentMixin deveria operar em fail-CLOSED
            (LIA_AGENT_TENANT_STRICT=true). fail_open > 0 indica que a flag
            está OFF ou que algum callsite escapou da defesa canônica T-A/T-D/T-F.
            Risco: LIA volta a perguntar `company_id` no chat (3a recorrência
            do bug "LIA esquece a empresa").
          remediation: |
            1. Verificar /api/v1/health/compliance/bypass-status
            2. Garantir LIA_AGENT_TENANT_STRICT=true em prod/staging
            3. Ver runbook docs/runbooks/missing_tenant_context.md

      # ── CRITICAL: fail_closed > 5/min ───────────────────────────────
      # Tenant resolution quebrada em escala — JWT inválido, TenantContextService
      # caindo, ou seed da Demo Company corrompido. Agentes recusam requests.
      - alert: LIATenantContextFailClosedRate
        expr: |
          sum (
            rate(lia_agent_tenant_context_resolved_total{outcome="fail_closed"}[1m])
          ) * 60 > 5
        for: 1m
        labels:
          severity: critical
          team: lia-platform
          runbook: missing_tenant_context.md
          page_oncall: "true"
        annotations:
          summary: "LIA recusando requests por tenant ausente (>5/min)"
          description: |
            fail_closed/min ultrapassou 5 — a Mixin está levantando
            MissingTenantContextError em escala. Causas comuns: SECRET_KEY
            rotacionado sem invalidar JWTs, TenantContextService timeout no
            DB, seed da Demo Company UUID 00000000-0000-4000-a000-000000000001
            corrompido. Usuários estão vendo erro 500 no chat.
          remediation: |
            1. Checar /api/v1/health (DB connectivity)
            2. Tail logs: rg "agent_tenant_context_missing" backend.log
            3. Runbook docs/runbooks/missing_tenant_context.md (top-3 causas)
            4. Rollback emergencial: LIA_AGENT_TENANT_STRICT=false (warning ON,
               serviço volta a responder em fail-OPEN — usar SÓ pra mitigar
               enquanto raiz é corrigida; isso reabre o bug original)

      # ── INFO: cobertura — agentes que NUNCA emitiram hit em 24h ─────
      # Sentinel canônico contra regressão de inventário (T-D conta 16 ReAct
      # agents). Se um agente some das métricas por 24h, ou foi removido
      # silenciosamente, ou parou de invocar a Mixin (drift do contrato).
      - alert: LIATenantContextAgentSilent24h
        expr: |
          (
            count by (agent) (
              lia_agent_tenant_context_resolved_total
            )
          )
            unless
          (
            count by (agent) (
              increase(lia_agent_tenant_context_resolved_total[24h]) > 0
            )
          )
        for: 1h
        labels:
          severity: info
          team: lia-platform
        annotations:
          summary: "Agente LIA {{ $labels.agent }} sem hit de tenant há 24h"
          description: |
            Agente sumiu das métricas — verificar se foi removido do roster
            T-D (16 agentes) ou se está em regressão silenciosa do contrato
            TenantAwareAgentMixin.
