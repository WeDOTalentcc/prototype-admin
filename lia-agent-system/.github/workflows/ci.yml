name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Nightly run that feeds eval/.gate_history.json with real backend scores
    # so the eval-gates job (T-E + T6 #993) stops sitting at "warming up" and
    # actually blocks regression after two consecutive bad nights. Pinned to
    # 05:17 UTC to land outside business hours.
    - cron: "17 5 * * *"
  workflow_dispatch: {}

jobs:
  test:
    name: Test Suite
    # Skip on the nightly schedule — that trigger only exists to feed
    # eval/.gate_history.json via eval-nightly. Re-runs on push/PR/dispatch.
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: lia
          POSTGRES_PASSWORD: lia
          POSTGRES_DB: lia_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://lia:lia@localhost:5432/lia_test
      REDIS_URL: redis://localhost:6379
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ENVIRONMENT: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]" || pip install -e . || pip install -r requirements.txt

      # UC-P1-09: coverage threshold enforced at 50% (plan: raise to 70% once baseline stabilizes).
      # If this step fails, actual coverage is below 50% — check htmlcov/index.html artifact.
      - name: Run tests with coverage
        run: |
          pip install pytest-cov --quiet
          python -m pytest tests/ \
            --ignore=tests/e2e \
            --ignore=tests/test_agents \
            --ignore=tests/load \
            --cov=app \
            --cov-report=xml \
            --cov-report=html \
            --cov-fail-under=50 \
            -q --tb=short --no-header

      - name: Security scan (bandit)
        continue-on-error: true
        run: |
          pip install bandit[toml] --quiet
          bandit -r app/ -ll -q --exclude app/tests 2>&1 | tail -20

      - name: Verify LangSmith config
        continue-on-error: true
        env:
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
          LANGSMITH_PROJECT: lia-agent-system
        run: |
          python -m pytest tests/unit/test_langsmith_config.py \
            -q --no-cov --tb=short --no-header


      # UC-P3-11: Mutation Testing (compliance modules) — non-blocking.
      # Runs only on push to main/develop to avoid slowing down PRs.
      # Results are surfaced in CI logs; does not block the build.
      # To review: run  locally after .
      - name: Mutation Testing (compliance modules)
        if: github.event_name == "push"
        continue-on-error: true
        run: |
          pip install mutmut --quiet
          mutmut run --paths-to-mutate=app/shared/compliance/ 2>&1 || true
          mutmut results 2>&1 || true
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 7

  eval-gates:
    # T-E + T6 (#993): canary eval gates. Each call reads
    # eval/.gate_history.json (filtered by dataset) and exits 1 if the last
    # 2 consecutive runs averaged below 0.85 OR if inventory coverage drops
    # below 80%. Runs are appended by `python eval/eval_runner.py` against a
    # live backend; here we only enforce the gate decision so a regression
    # blocks the build the moment two bad runs land in history. The first
    # call (tenant_context.jsonl) is the T-E reference gate; the second
    # (company_settings_prefill.jsonl) is the T6 Settings ↔ chat lateral gate
    # — same infra, same threshold (0.85), same consecutive-run rule (2).
    name: Eval Gates (T-E + Settings prefill)
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: lia-agent-system
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install minimal eval deps
        run: pip install pyyaml httpx pyjwt --quiet

      - name: Gate — tenant_context.jsonl (T-E)
        run: python -m eval.eval_runner --gate eval/golden/tenant_context.jsonl

      - name: Gate — company_settings_prefill.jsonl (T6 #993)
        run: python -m eval.eval_runner --gate eval/golden/company_settings_prefill.jsonl

      - name: Gate — wizard_calibration_handoff.jsonl (Task #1111)
        # Garante que a etapa de calibração não regrida silenciosamente para
        # respostas vazias ("nenhum candidato encontrado") quando o tenant
        # tem pool. Anti-patterns regex bloqueiam "Carreguei 0 candidato",
        # "0/N aprovados", "nenhum candidato"; success_criteria exigem
        # contagem numérica de candidatos carregados e de aprovados/threshold
        # na resposta final do node de calibração.
        run: python -m eval.eval_runner --gate eval/golden/wizard_calibration_handoff.jsonl

  eval-nightly:
    # Task #999: feeds eval/.gate_history.json with REAL backend scores for
    # the canary golden datasets (T-E tenant_context + T6 #993 Settings
    # prefill). Without this job, eval-gates above only ever sees the
    # bootstrapped history and stays at "pass — warming up" forever, so a
    # regression in the Settings ↔ chat lateral flow (or in any of the 16
    # ReActAgents) ships unblocked. Runs nightly + on-demand only — never on
    # PRs (no live LLM budget burn per push).
    #
    # Flow: boot Postgres + Redis as service containers, install deps, start
    # uvicorn in the background, wait for /health, run eval_runner against
    # each golden dataset, then commit the updated .gate_history.json back
    # to the branch with [skip ci] so the next CI run reads it. After two
    # green nights the gate has real data and stops being a no-op; after
    # two red nights it blocks the next merge to main.
    name: Eval Nightly (record gate history)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    defaults:
      run:
        working-directory: lia-agent-system

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: lia
          POSTGRES_PASSWORD: lia
          POSTGRES_DB: lia_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://lia:lia@localhost:5432/lia_test
      REDIS_URL: redis://localhost:6379
      ENVIRONMENT: test
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      # eval_runner._make_eval_token() signs JWTs with app.core.config.settings.SECRET_KEY.
      # Pin a stable test key so the token survives the uvicorn boot in this
      # job. NEVER use this value in prod.
      SECRET_KEY: ${{ secrets.EVAL_BACKEND_SECRET_KEY || 'eval-nightly-secret-key-do-not-use-in-prod' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need full history + a writeable token so we can push the updated
          # .gate_history.json back to the branch without losing context.
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]" || pip install -e . || pip install -r requirements.txt
          pip install httpx pyjwt pyyaml --quiet

      - name: Boot uvicorn in the background
        run: |
          nohup python -m uvicorn app.main:app --host 0.0.0.0 --port 8001 > /tmp/lia-backend.log 2>&1 &
          echo $! > /tmp/lia-backend.pid
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8001/health >/dev/null 2>&1; then
              echo "backend ready after ${i}s"
              exit 0
            fi
            sleep 2
          done
          echo "::error::backend did not become healthy in 120s"
          tail -200 /tmp/lia-backend.log
          exit 1

      - name: Run Settings prefill battery (T6 #993 — 18+ scenarios)
        run: python -m eval.eval_runner --dataset eval/golden/company_settings_prefill.jsonl --url http://localhost:8001

      - name: Run tenant_context battery (T-E — 16 ReActAgents)
        # Non-blocking: a flaky run shouldn't hide a clean Settings recording.
        # The gate-check job below decides pass/fail using the persisted history.
        continue-on-error: true
        run: python -m eval.eval_runner --dataset eval/golden/tenant_context.jsonl --url http://localhost:8001

      - name: Run wizard_calibration_handoff battery (Task #1111)
        # Non-blocking nightly recording for the calibration gate. The
        # gate-check (eval-gates job) consumes the persisted history.
        continue-on-error: true
        run: python -m eval.eval_runner --dataset eval/golden/wizard_calibration_handoff.jsonl --url http://localhost:8001

      - name: Stop backend
        if: always()
        run: |
          if [ -f /tmp/lia-backend.pid ]; then
            kill "$(cat /tmp/lia-backend.pid)" 2>/dev/null || true
          fi

      - name: Upload backend log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lia-backend-log
          path: /tmp/lia-backend.log
          retention-days: 7

      - name: Commit updated gate history
        run: |
          if git diff --quiet eval/.gate_history.json; then
            echo "no gate-history changes — nothing to commit"
            exit 0
          fi
          git config user.name 'lia-eval-bot'
          git config user.email 'lia-eval-bot@users.noreply.github.com'
          git add eval/.gate_history.json
          # [skip ci] avoids a feedback loop with the on:push trigger above.
          git commit -m "chore(eval): record nightly gate history [skip ci]"
          # Push back to the branch the workflow ran on (main on schedule,
          # whatever the user picked on workflow_dispatch).
          git push origin HEAD:"${GITHUB_REF#refs/heads/}"

  load-tests:
    name: Load Tests (non-blocking)
    runs-on: ubuntu-latest
    needs: test
    continue-on-error: true
    # Skip on nightly schedule (eval-nightly is the only intended schedule job).
    if: github.event_name != 'schedule' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]" || pip install -e . || pip install -r requirements.txt

      - name: Run load tests
        run: |
          python -m pytest tests/load/ \
            -q --tb=short --no-header --no-cov 2>&1 | tail -30

  deepeval:
    name: DeepEval Quality Gate (non-blocking)
    runs-on: ubuntu-latest
    needs: test
    continue-on-error: true
    # Skip on nightly schedule (eval-nightly is the only intended schedule job).
    if: github.event_name != 'schedule'
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install DeepEval
        run: |
          pip install deepeval --quiet

      - name: Run DeepEval metrics
        continue-on-error: true
        run: |
          python -m pytest tests/deepeval/ \
            -q --tb=short --no-header --no-cov 2>&1 | tail -30

  lint:
    name: Lint
    # Skip on nightly schedule (eval-nightly is the only intended schedule job).
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Block unresolved merge conflict markers
        run: |
          if grep -rn --include='*.py' -E '^(<<<<<<< HEAD|=======|>>>>>>> )' .; then
            echo "::error::Unresolved merge conflict markers found in source files"
            exit 1
          fi

      # R-009 — Sprint 1 Quick Wins (REMEDIATION_BRIEF Wave 0).
      # BYOK / Choose Your AI enforcement: bloqueia instanciacao direta de
      # AsyncAnthropic / ChatAnthropic / ChatOpenAI / ChatGoogleGenerativeAI / genai.Client
      # fora da allowlist. Fix-on-source: violacoes vao para scripts/check_llm_factory_enforcement.py.
      # NAO usar '|| true' nem 'continue-on-error: true' — sensor precisa ser bloqueante (Hashimoto: nunca mais BYOK bypass em prod).
      - name: "G-LLM: BYOK enforcement (LLM Factory)"
        run: python scripts/check_llm_factory_enforcement.py
      # R-012 — Wave 1 Sprint 2 (REMEDIATION_BRIEF Wave 1).
      # RLS enforcement: bloqueia Depends(get_db) em app/domains/ — deve usar get_tenant_db
      # para garantir que PostgreSQL RLS isola dados por tenant automaticamente.
      # NAO usar '|| true' — sensor precisa ser bloqueante.
      - name: "G-TENANTDB: RLS tenant_db enforcement"
        run: python scripts/check_tenant_db.py

      - name: "G-TOOLS: tool output schemas"
        run: python scripts/check_tool_output_schemas.py

      - name: "G-GOV: tool governance contracts (PII/decision/delete)"
        run: python scripts/check_tool_governance.py
      # R-017 — ADR-002 model completeness: every *.py in lia_models/ must appear in __init__.py.
      # Prevents silent ImportError when new model files are added but not re-exported.
      # Fix: add `from lia_models.<module> import ...` to libs/models/lia_models/__init__.py.
      - name: "G-MODELS: lia_models __init__ completeness (ADR-002)"
        run: python scripts/check_init_completeness.py

      # Task #1143 — Multi-tenant Ownership Foundation.
      # G-RLS: every table with `company_id` must have a corresponding
      # ENABLE ROW LEVEL SECURITY migration (or `# RLS-EXEMPT:` marker /
      # scripts/.rls_allowlist.txt entry). Warn-only until S10 Sealing.
      - name: "G-RLS: ADR-030 RLS coverage sensor (warn-only)"
        run: python scripts/check_table_has_rls_policy.py
        continue-on-error: true

      # Task #1143 — require_company_id explicit gate ratchet.
      # Counts remaining `Sprint follow-up: add _require_company_id` markers
      # across app/api. Historical marker counter — kept for telemetry only;
      # canonical gate is the structural verifier below.
      - name: "G-OWN: require_company_id marker ratchet (legacy telemetry)"
        run: python scripts/check_require_company_id_coverage.py --block

      # Task #1143 — STRUCTURAL gate. Walks every router decorator in
      # app/api/**/*.py with libcst and asserts the function either carries an
      # explicit Depends(require_company_id[_strict_match]) on its params /
      # decorator dependencies, OR sits behind the PUBLIC_FILES /
      # PUBLIC_FUNCTIONS allowlist baked into the script. Today: 0 gaps
      # across 333 files. Any new endpoint without an explicit gate fails CI.
      - name: "G-OWN-STRUCT: require_company_id structural verifier (--block)"
        run: python scripts/enforce_require_company_id.py --strict



      # LIA-D04: TODO — make lint blocking once 752 ruff errors are resolved.
      # Auto-fixable: ~0 remaining (28 already fixed). F821 (155) and F405 (360) need manual fixes.
      # Currently `|| true` is intentional — remove when error count is near zero.
      - name: Install ruff
        run: pip install ruff

      # UC-P1-09: Blocking step for critical errors only (syntax + undefined names).
      # E9=syntax errors, F821=undefined name. These are always fixable and block deploy.
      # To fix E9: check for syntax errors in the flagged file.
      # To fix F821: add the missing import or define the name before use.
      - name: Lint critical errors (syntax + undefined names) — BLOCKING
        run: |
          if ruff check app/ --select=E9,F821 --quiet; then
            echo "No critical lint errors found"
          else
            echo "::error::Critical lint errors (syntax/undefined names) found — fix before merging."
            echo "Run: ruff check app/ --select=E9,F821 to see details."
            ruff check app/ --select=E9,F821
            exit 1
          fi

      - name: Run ruff (non-blocking)
        run: ruff check app/ --select=E,F --ignore=E501,F401,F403 || true

      # UC-P1-09: mypy type checking — non-blocking. Errors are surfaced for awareness.
      # To fix: add type annotations or use 'type: ignore' with a comment explaining why.
      - name: Type check mypy (non-blocking)
        continue-on-error: true
        run: |
          pip install mypy types-requests --quiet
          mypy app/ --ignore-missing-imports --no-strict-optional 2>&1 | tail -20
