name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: lia
          POSTGRES_PASSWORD: lia
          POSTGRES_DB: lia_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://lia:lia@localhost:5432/lia_test
      REDIS_URL: redis://localhost:6379
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ENVIRONMENT: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]" || pip install -e . || pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ \
            --ignore=tests/e2e \
            --ignore=tests/test_agents \
            --ignore=tests/load \
            -q --tb=short --no-header

      - name: Security scan (bandit)
        continue-on-error: true
        run: |
          pip install bandit[toml] --quiet
          bandit -r app/ -ll -q --exclude app/tests 2>&1 | tail -20

      - name: Verify LangSmith config
        continue-on-error: true
        env:
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
          LANGSMITH_PROJECT: lia-agent-system
        run: |
          python -m pytest tests/unit/test_langsmith_config.py \
            -q --no-cov --tb=short --no-header

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 7

  load-tests:
    name: Load Tests (non-blocking)
    runs-on: ubuntu-latest
    needs: test
    continue-on-error: true
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]" || pip install -e . || pip install -r requirements.txt

      - name: Run load tests
        run: |
          python -m pytest tests/load/ \
            -q --tb=short --no-header --no-cov 2>&1 | tail -30

  deepeval:
    name: DeepEval Quality Gate (non-blocking)
    runs-on: ubuntu-latest
    needs: test
    continue-on-error: true
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install DeepEval
        run: |
          pip install deepeval --quiet

      - name: Run DeepEval metrics
        continue-on-error: true
        run: |
          python -m pytest tests/deepeval/ \
            -q --tb=short --no-header --no-cov 2>&1 | tail -30

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Block unresolved merge conflict markers
        run: |
          if grep -rn --include='*.py' -E '^(<<<<<<< HEAD|=======|>>>>>>> )' .; then
            echo "::error::Unresolved merge conflict markers found in source files"
            exit 1
          fi

      # LIA-D04: TODO — make lint blocking once 752 ruff errors are resolved.
      # Auto-fixable: ~0 remaining (28 already fixed). F821 (155) and F405 (360) need manual fixes.
      # Currently `|| true` is intentional — remove when error count is near zero.
      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check app/ --select=E,F --ignore=E501,F401,F403 || true

      # G-DOMAIN: all domain.py must call super().get_system_prompt() — BLOCKING
      - name: "G-DOMAIN: compliance super() in domain prompts"
        run: python scripts/check_domain_prompt_super.py
