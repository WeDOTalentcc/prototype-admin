name: Deploy LIA Backend

on:
  push:
    branches: [develop, main]

env:
  GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
  GCP_REGION: ${{ secrets.GCP_REGION || 'us-east1' }}

jobs:
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install security tools
        run: pip install bandit[toml] pip-audit safety --quiet

      - name: Bandit SAST scan
        run: bandit -r app/ -ll -q --exclude app/tests 2>&1 | tail -30
        continue-on-error: true

      - name: pip-audit (dependency vulnerabilities)
        run: pip-audit -r requirements.txt --desc --fix --dry-run 2>&1 | tail -30
        continue-on-error: true

  build-and-deploy:
    name: Build & Deploy API + Worker
    runs-on: ubuntu-latest
    needs: security
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ secrets.GCP_PROJECT }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set GCP project
        run: gcloud config set project ${{ env.GCP_PROJECT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Set environment tag
        id: env
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "env_name=production" >> "$GITHUB_OUTPUT"
            echo "service_suffix=" >> "$GITHUB_OUTPUT"
          else
            echo "env_name=staging" >> "$GITHUB_OUTPUT"
            echo "service_suffix=-staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify app import
        run: |
          pip install --quiet -r requirements.txt 2>/dev/null || true
          python3 -c "import importlib; importlib.import_module('app.core.config')" 2>/dev/null || echo "⚠️ Import check skipped (deps not fully available in CI)"

      - name: Verify Alembic chain
        run: |
          python3 -m alembic heads 2>/dev/null | grep -c "head" || echo "⚠️ Alembic check skipped"
        continue-on-error: true

      - name: Build API image
        run: |
          docker build \
            -f Dockerfile.prod \
            -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/lia/lia-api:${{ github.sha }} \
            -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/lia/lia-api:latest \
            .

      - name: Build Worker image
        run: |
          docker build \
            -f Dockerfile.worker \
            -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/lia/lia-worker:${{ github.sha }} \
            -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/lia/lia-worker:latest \
            .

      - name: Push images
        run: |
          docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/lia/lia-api:${{ github.sha }}
          docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/lia/lia-api:latest
          docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/lia/lia-worker:${{ github.sha }}
          docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/lia/lia-worker:latest

      - name: Deploy API to Cloud Run
        run: |
          gcloud run deploy lia-api${{ steps.env.outputs.service_suffix }} \
            --project ${{ env.GCP_PROJECT }} \
            --image ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/lia/lia-api:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --port 8000 \
            --memory 1Gi \
            --cpu 2 \
            --min-instances 1 \
            --max-instances 20 \
            --timeout 120 \
            --set-env-vars "APP_ENV=${{ steps.env.outputs.env_name }},DEBUG=false,LOG_LEVEL=WARNING" \
            --set-secrets "DATABASE_URL=DATABASE_URL:latest,REDIS_URL=REDIS_URL:latest,SECRET_KEY=SECRET_KEY:latest,ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest" \
            --allow-unauthenticated \
            --quiet

      - name: Deploy Worker to Cloud Run
        run: |
          gcloud run deploy lia-worker${{ steps.env.outputs.service_suffix }} \
            --project ${{ env.GCP_PROJECT }} \
            --image ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/lia/lia-worker:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --no-allow-unauthenticated \
            --memory 1Gi \
            --cpu 2 \
            --min-instances 0 \
            --max-instances 5 \
            --timeout 900 \
            --set-env-vars "APP_ENV=${{ steps.env.outputs.env_name }},CELERY_CONCURRENCY=2" \
            --set-secrets "DATABASE_URL=DATABASE_URL:latest,REDIS_URL=REDIS_URL:latest,ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest" \
            --quiet

      - name: Smoke test API
        run: |
          SERVICE_URL=$(gcloud run services describe lia-api${{ steps.env.outputs.service_suffix }} \
            --region ${{ env.GCP_REGION }} --format='value(status.url)')
          echo "API URL: $SERVICE_URL"
          curl -sf --max-time 30 "$SERVICE_URL/api/v1/health/live" || echo "⚠️ Smoke test failed (non-blocking)"
