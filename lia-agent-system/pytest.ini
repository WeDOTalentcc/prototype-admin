[pytest]
asyncio_mode = auto
# testpaths inclui app/tests (legado) + tests/ (novo padrão Sprint A-D)
testpaths = app/tests tests app/domains
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Coverage gate: 15% (GAP-00-003, 2026-06-16 — ratchet +5pp desde Wave D2.4).
# NOTA: CI (.github/workflows/ci.yml) enforça 50% na suite completa (fonte de verdade).
# Este gate serve como sanidade local; --no-cov para runs TDD individuais.
#
# Histórico do gate (ratchet canonical):
#   2026-04-06: 45% (Task #53 — aspirational, nunca atingiu baseline)
#   2026-05-27: 10% (Wave D2.4 — realismo + ratchet)
#   2026-06-16: 15% (GAP-00-003 — ratchet +5pp; CI = 50%)
#
# Ratchet plan canonical:
#   Sprint atual:  15%
#   Próx +1:       20%  (+5pp)
#   ...
#   Target local:  45% — alvo histórico.
#   CI (full suite): 50% → 70% quando baseline estabilizar.
#
# Quando elevar: baseline efetivo (suite completa) > gate + 3pp → +5pp.
# Arquivos cobertos Sprint A-F: wsi_call_flow, interview_scheduling, lia_score,
#   circuit_breaker, whatsapp_pipeline, multi_tenant, token_budget, orchestrator,
#   cv_screening, merge_webhook, custom_agent, twin_inference, hitl, opt_out.
addopts = -v --tb=short --cov=app --cov-report=term-missing --cov-fail-under=15 --ignore=app/tests/test_multi_tenancy_security.py --ignore=app/tests/test_policy_gaps_fixes.py --ignore=app/tests/test_sync_canonical_endpoint.py --ignore=app/tests/test_main_orchestrator_severity_delegation.py
asyncio_default_fixture_loop_scope = function
# Note: asyncio_default_test_loop_scope is not a valid pytest-asyncio option (0.24.0); removed to avoid PytestConfigWarning.
markers =
    easy: Testes unitários rápidos, funções puras, sem I/O (<5ms cada). Rodar em pre-commit.
    medium: Testes unitários com mocking moderado (<50ms cada). Rodar no CI push.
    hard: Testes com estado complexo ou múltiplos mocks (~100ms cada). Rodar no CI nightly.
    very_hard: Testes que requerem infraestrutura real ou chamadas LLM. Rodar apenas em release.
    integration: Testes que exercitam Postgres real (RLS, transactions, async DB) — requerem DATABASE_URL+lia_app role.
filterwarnings =
    ignore::DeprecationWarning
    ignore::pytest.PytestUnraisableExceptionWarning
