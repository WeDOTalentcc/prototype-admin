[pytest]
asyncio_mode = auto
# testpaths inclui app/tests (legado) + tests/ (novo padrão Sprint A-D)
testpaths = app/tests tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Coverage gate: 45% (06/04/2026 — elevado após Task #53: 10 novos test files críticos, 169+ testes).
# Cobertura anterior: ~32% com suite completa → realinhamento para 27% → 30% → 45% (gate atual).
# Progressão: 10% → 12% → 25% → 29% → 32% → 27% (realinhamento) → 30% → 45% → 80% (target).
# Novos arquivos cobertos: wsi_call_flow, interview_scheduling, lia_score, circuit_breaker,
#   whatsapp_pipeline, multi_tenant, token_budget, orchestrator, cv_screening, merge_webhook.
addopts = -v --tb=short --cov=app --cov-report=term-missing --cov-fail-under=45 --ignore=app/tests/test_multi_tenancy_security.py --ignore=app/tests/test_policy_gaps_fixes.py --ignore=app/tests/test_sync_canonical_endpoint.py --ignore=app/tests/test_dev_auto_login_tenant.py --ignore=app/tests/test_main_orchestrator_severity_delegation.py
asyncio_default_fixture_loop_scope = function
# Note: asyncio_default_test_loop_scope is not a valid pytest-asyncio option (0.24.0); removed to avoid PytestConfigWarning.
markers =
    easy: Testes unitários rápidos, funções puras, sem I/O (<5ms cada). Rodar em pre-commit.
    medium: Testes unitários com mocking moderado (<50ms cada). Rodar no CI push.
    hard: Testes com estado complexo ou múltiplos mocks (~100ms cada). Rodar no CI nightly.
    very_hard: Testes que requerem infraestrutura real ou chamadas LLM. Rodar apenas em release.
filterwarnings =
    ignore::DeprecationWarning
    ignore::pytest.PytestUnraisableExceptionWarning
