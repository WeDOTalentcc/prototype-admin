[pytest]
asyncio_mode = auto
# testpaths inclui app/tests (legado) + tests/ (novo padrão Sprint A-D)
testpaths = app/tests tests app/domains
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Coverage gate: 10% (Wave D2.4, 2026-05-27 — baixado de 45% efetivamente desligado).
# Investigação: baseline real ~4.19%, gate de 45% era teatro (PRs não bloqueavam).
# Decisão canonical: gate realístico 10% + ratchet plan +5% por sprint até 45%.
#
# Histórico do gate (Sprint cadence):
#   2026-04-06: 45% (Task #53 — aspirational, nunca atingiu baseline)
#   2026-05-27: 10% (Wave D2.4 — realismo + ratchet)
#
# Ratchet plan canonical (Wave D2.4):
#   Sprint atual:  10%
#   Próx +1:       15%  (5% bump após Sprint D fechar)
#   Próx +2:       20%
#   ...
#   Target final:  45% — alvo histórico, atingível com test ratchet por sprint.
#
# Quando elevar: cada vez que baseline efetivo passar gate + 3% (folga de 3pp),
# elevar gate em +5% no mesmo PR + atualizar este bloco.
#
# Arquivos cobertos pelos testes Sprint A-D: wsi_call_flow, interview_scheduling,
#   lia_score, circuit_breaker, whatsapp_pipeline, multi_tenant, token_budget,
#   orchestrator, cv_screening, merge_webhook, custom_agent, twin_inference.
addopts = -v --tb=short --cov=app --cov-report=term-missing --cov-fail-under=10 --ignore=app/tests/test_multi_tenancy_security.py --ignore=app/tests/test_policy_gaps_fixes.py --ignore=app/tests/test_sync_canonical_endpoint.py --ignore=app/tests/test_main_orchestrator_severity_delegation.py
asyncio_default_fixture_loop_scope = function
# Note: asyncio_default_test_loop_scope is not a valid pytest-asyncio option (0.24.0); removed to avoid PytestConfigWarning.
markers =
    easy: Testes unitários rápidos, funções puras, sem I/O (<5ms cada). Rodar em pre-commit.
    medium: Testes unitários com mocking moderado (<50ms cada). Rodar no CI push.
    hard: Testes com estado complexo ou múltiplos mocks (~100ms cada). Rodar no CI nightly.
    very_hard: Testes que requerem infraestrutura real ou chamadas LLM. Rodar apenas em release.
    integration: Testes que exercitam Postgres real (RLS, transactions, async DB) — requerem DATABASE_URL+lia_app role.
filterwarnings =
    ignore::DeprecationWarning
    ignore::pytest.PytestUnraisableExceptionWarning
