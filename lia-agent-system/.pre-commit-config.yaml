repos:
  # ── Ruff: linting + formatting ──────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        exclude: ^(tests/|migrations/)
      - id: ruff-format
        exclude: ^(tests/|migrations/)

  # ── mypy: static type checking (warn-only during gradual adoption) ───────────
  # Non-blocking wrapper: runs mypy and prints diagnostics but always exits 0.
  # Remove the '|| true' suffix when ready to enforce (planned: after full type coverage).
  - repo: local
    hooks:
      - id: mypy-warn-only
        name: mypy (type check — warn only, non-blocking)
        language: system
        entry: bash -c 'python3 -m mypy app/ --ignore-missing-imports --no-error-summary --config-file=pyproject.toml 2>&1 || true'
        pass_filenames: false
        always_run: false
        files: ^app/.*\.py$

  # ── Local guardrails ─────────────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: no-sql-in-controllers
        name: "G1: No SQL in API controllers"
        language: python
        entry: python3 scripts/check_no_sql_in_controllers.py
        files: ^app/api/.*\.py$
        pass_filenames: false
        always_run: false

      - id: no-pii-in-logs
        name: "G4: No PII in log calls (LGPD)"
        language: python
        entry: python3 scripts/check_no_pii_in_logs.py
        files: ^app/.*\.py$
        pass_filenames: false
        always_run: false
        exclude: ^(tests/|scripts/)

      - id: response-model-required
        name: "G2: response_model required on all endpoints"
        language: python
        entry: python3 scripts/check_response_models.py
        files: ^app/api/.*\.py$
        pass_filenames: false
        always_run: false

      - id: tenant-db-required
        name: "G-TENANTDB: Depends(get_tenant_db) required in app/domains/"
        language: python
        entry: python3 scripts/check_tenant_db.py
        files: ^app/domains/.*\.py$
        pass_filenames: false
        always_run: false

      - id: no-tenant-in-tool-schemas
        name: "ADR-029 §2: tool schemas must not expose tenant keys to LLM (BLOCKING)"
        language: system
        entry: python3 scripts/check_no_tenant_in_tool_schemas.py --block
        files: ^app/(domains|shared|tools)/.*\.py$
        pass_filenames: false
        always_run: false

      - id: no-devmode-in-prod-env
        name: "G-DEVMODE: block LIA_DEV_MODE active in .env.staging/.env.production (BLOCKING)"
        language: system
        entry: python3 scripts/check_no_devmode_in_prod_env.py
        files: ^(\.env\.|\.env$|app/).*
        pass_filenames: false
        always_run: false

      - id: company-id-in-routes-warn
        name: "Multi-tenancy: routes must call _require_company_id (warn-only)"
        language: system
        entry: bash -c "python3 scripts/check_company_id_in_routes.py 2>&1; exit 0"
        files: ^app/api/v1/.*\.py$
        pass_filenames: false
        always_run: false

      - id: no-direct-contextvar-set-warn
        name: "G-CONTEXTVAR: bloquear set direto fora dos helpers R-008 (warn-only)"
        language: system
        entry: bash -c "python3 scripts/check_no_direct_contextvar_set.py 2>&1; exit 0"
        files: ^app/.*\.py$
        pass_filenames: false
        always_run: false

      - id: no-cid-empty-escape
        name: "Multi-tenancy: SQL escape  cid empty OR  forbidden (BLOCKING)"
        language: system
        entry: python3 scripts/check_no_cid_empty_escape.py
        files: ^app/.*\.py$
        pass_filenames: false
        always_run: false

      - id: table-has-rls-policy
        name: "ADR-030 v2: tables with company_id should have RLS migration (warn-only)"
        language: system
        entry: bash -c "python3 scripts/check_table_has_rls_policy.py 2>&1 | head -5; exit 0"
        files: ^(libs/models/lia_models/.*\.py|alembic/versions/.*\.py)$
        pass_filenames: false
        always_run: false

      - id: agent-compliance-warn
        name: "G7: agent canonical anatomy (warn-only)"
        language: system
        entry: python3 scripts/check_agent_compliance.py
        files: ^app/domains/.*react_agent\.py$
        pass_filenames: false
        always_run: false

      - id: deprecated-rail-a-tools-warn
        name: "Rail A × @deprecated tools sensor (warn-only)"
        language: system
        entry: python3 scripts/check_deprecated_rail_a_tools.py
        files: ^app/.*\.py$
        pass_filenames: false
        always_run: false

      - id: domain-prompt-super-warn
        name: "G-DOMAIN: domain.py super().get_system_prompt() (warn-only)"
        language: system
        entry: python3 scripts/check_domain_prompt_super.py
        files: ^app/domains/.*domain\.py$
        pass_filenames: false
        always_run: false

      - id: duplicate-indexes-warn
        name: "Duplicate SQLAlchemy index detection (warn-only)"
        language: system
        entry: bash -c "python3 scripts/check_duplicate_indexes.py 2>&1; exit 0"
        files: ^libs/models/.*\.py$
        pass_filenames: false
        always_run: false

      - id: forbidden-imports-warn
        name: "ADR-012: forbidden imports drift (warn-only)"
        language: system
        entry: bash -c "python3 scripts/check_forbidden_imports.py 2>&1; exit 0"
        files: ^app/.*\.py$
        pass_filenames: false
        always_run: false

      - id: init-completeness-warn
        name: "lia_models __init__ completeness (warn-only)"
        language: system
        entry: bash -c "python3 scripts/check_init_completeness.py 2>&1; exit 0"
        files: ^libs/models/lia_models/.*\.py$
        pass_filenames: false
        always_run: false

      - id: llm-imports-warn
        name: "Direct LLM SDK imports outside allowlist (warn-only)"
        language: system
        entry: bash -c "python3 scripts/check_llm_imports.py 2>&1; exit 0"
        files: ^app/.*\.py$
        pass_filenames: false
        always_run: false

      - id: no-getattr-on-models-warn
        name: "G6: no getattr on SQLAlchemy model rows (warn-only)"
        language: system
        entry: bash -c "python3 scripts/check_no_getattr_on_models.py 2>&1; exit 0"
        files: ^app/.*\.py$
        pass_filenames: false
        always_run: false

      - id: no-langchain-tool-decorator-warn
        name: "F11: forbid langchain_core.tools @tool inside domain (warn-only)"
        language: system
        entry: bash -c "python3 scripts/check_no_langchain_tool_decorator.py 2>&1; exit 0"
        files: ^app/domains/.*\.py$
        pass_filenames: false
        always_run: false

      - id: no-legacy-tool-decorator-warn
        name: "S7.3: forbid legacy @tool decorator (warn-only)"
        language: system
        entry: bash -c "python3 scripts/check_no_legacy_tool_decorator.py 2>&1; exit 0"
        files: ^app/domains/.*\.py$
        pass_filenames: false
        always_run: false

      - id: require-company-exemptions-warn
        name: "F8: require_company=False needs # kept comment (warn-only)"
        language: system
        entry: bash -c "python3 scripts/check_require_company_exemptions.py 2>&1; exit 0"
        files: ^app/.*\.py$
        pass_filenames: false
        always_run: false

      - id: shim-sla-warn
        name: "S7.1: shim file SLA aging (warn-only)"
        language: system
        entry: bash -c "python3 scripts/check_shim_sla.py 2>&1; exit 0"
        files: ^app/.*\.py$
        pass_filenames: false
        always_run: false

      - id: tool-authoring-surface-warn
        name: "S7.5: forbid direct tool_registry.register outside canonical (warn-only)"
        language: system
        entry: bash -c "python3 scripts/check_tool_authoring_surface.py 2>&1; exit 0"
        files: ^app/.*\.py$
        pass_filenames: false
        always_run: false

      - id: adr-001-no-sql-inline-services-warn
        name: "ADR-001: no raw SQL inline in services (warn-only Caminho C)"
        language: system
        entry: python3 scripts/check_no_sql_inline_in_services.py
        files: ^app/domains/.*/services/.*\.py$
        pass_filenames: false
        always_run: false

      - id: adr-001-no-select-in-services-warn
        name: "ADR-001: no select(Model) in services (warn-only Caminho C)"
        language: system
        entry: python3 scripts/check_no_select_in_services.py
        files: ^app/domains/.*/services/.*\.py$
        pass_filenames: false
        always_run: false

      - id: prompt-composer-uniformity
        name: "ADR-028: react_agents use PromptComposer (BLOCKING — 14/14 adopted Sprint 2 P2)"
        language: system
        entry: python3 scripts/check_prompt_composer_uniformity.py --block
        files: ^app/domains/.*react_agent\.py$
        pass_filenames: false
        always_run: false

      - id: required-env-vars
        name: "R-006 / ADR-AUTH-001: required env vars (FIELD_ENCRYPTION_KEY, SECRET_KEY, DATABASE_URL)"
        language: system
        entry: bash -c "python3 scripts/check_required_env.py --strict --dotenv .env 2>&1 | head -30; exit 0"
        files: ^\.env(\..+)?$|^libs/config/lia_config/config\.py$
        pass_filenames: false
        always_run: false

      - id: pydantic-schemas-no-duplicates-warn
        name: "R-008 / ADR-SCHEMAS-001: no duplicate Pydantic schemas (warn-only — 192 known)"
        language: system
        entry: bash -c "python3 scripts/check_duplicate_pydantic_schemas.py 2>&1 | head -30; exit 0"
        files: ^app/.*\.py$
        pass_filenames: false
        always_run: false

      - id: schema-drift-warn
        name: "R-007 / ADR-MIGRATIONS-001: model ↔ DB drift (warn-only — 196 known, requires DATABASE_URL)"
        language: system
        entry: bash -c "python3 scripts/check_schema_drift.py 2>&1 | head -40; exit 0"
        files: ^(libs/models/lia_models/.*\.py|alembic/versions/.*\.py)$
        pass_filenames: false
        always_run: false

      - id: pydantic-conventions-warn
        name: "Pydantic Conventions R1+R2+R3+R4 (CLAUDE.md 2026-05-20 pós-audit E2E, warn-only)"
        language: system
        entry: bash -c "python3 scripts/check_pydantic_conventions.py app/ 2>&1 | tail -10; exit 0"
        files: ^app/.*\.py$
        pass_filenames: false

      - id: training-data-anonymized
        name: "T-21 ADR-LGPD-002: training data export DEVE anonymizer (warn-only)"
        language: system
        entry: bash -c "python3 scripts/check_training_data_anonymized.py 2>&1; exit 0"
        files: ^app/domains/analytics/services/training_data_service\.py$
        pass_filenames: false

      - id: audit-log-completeness
        name: "T-20 ADR-035: audit_log demographic proxies (warn-only)"
        language: system
        entry: bash -c "python3 scripts/check_audit_log_completeness.py 2>&1; exit 0"
        files: ^app/domains/.*services/.*\.py$
        pass_filenames: false

      - id: canonical-domain-structure
        name: "T-15: agentic domains canonical structure (R1-R5 warn-only)"
        language: system
        entry: bash -c "python3 scripts/check_canonical_domain_structure.py 2>&1; exit 0"
        files: ^(app/domains/|app/prompts/domains/|tests/).*\.(py|yaml)$
        pass_filenames: false

      - id: pydantic-R4-blocking
        name: "R4 BLOCKING (T-03 ADR-029-v2): no x_company_id via Header (LGPD multi-tenancy)"
        language: system
        entry: python3 scripts/check_pydantic_R4_only.py
        files: ^app/.*\.py$
        pass_filenames: false

      - id: yaml-metadata-version
        name: "T-05 ADR-028-v2: YAML metadata.version enforcement"
        language: system
        entry: python3 scripts/check_yaml_metadata_version.py
        files: ^app/prompts/.*\.(yaml|yml)$
        pass_filenames: false

      - id: pydantic-R1-ratchet
        name: "T-07 ADR-029-v3: R1 ratchet (no new violations vs baseline)"
        language: system
        entry: python3 scripts/check_pydantic_R1_ratchet.py
        files: ^app/.*\.py$
        pass_filenames: false
        always_run: false

