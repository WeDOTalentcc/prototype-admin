repos:
  # ── Ruff: linting + formatting ──────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        exclude: ^(tests/|migrations/)
      - id: ruff-format
        exclude: ^(tests/|migrations/)

  # ── mypy: static type checking (warn-only during gradual adoption) ───────────
  # Non-blocking wrapper: runs mypy and prints diagnostics but always exits 0.
  # Remove the '|| true' suffix when ready to enforce (planned: after full type coverage).
  - repo: local
    hooks:
      - id: mypy-warn-only
        name: mypy (type check — warn only, non-blocking)
        language: system
        entry: bash -c 'python3 -m mypy app/ --ignore-missing-imports --no-error-summary --config-file=pyproject.toml 2>&1 || true'
        pass_filenames: false
        always_run: false
        files: ^app/.*\.py$

  # ── Local guardrails ─────────────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: no-sql-in-controllers
        name: "G1: No SQL in API controllers"
        language: python
        entry: python3 scripts/check_no_sql_in_controllers.py
        files: ^app/api/.*\.py$
        pass_filenames: false
        always_run: false

      - id: no-pii-in-logs
        name: "G4: No PII in log calls (LGPD)"
        language: python
        entry: python3 scripts/check_no_pii_in_logs.py
        files: ^app/.*\.py$
        pass_filenames: false
        always_run: false
        exclude: ^(tests/|scripts/)

      - id: response-model-required
        name: "G2: response_model required on all endpoints"
        language: python
        entry: python3 scripts/check_response_models.py
        files: ^app/api/.*\.py$
        pass_filenames: false
        always_run: false

      - id: no-forbidden-imports
        name: "G5: No forbidden import paths (ADR-012)"
        language: python
        entry: python3 scripts/check_forbidden_imports.py
        files: ^(app|scripts|tests)/.*\.py$
        pass_filenames: false
        always_run: false

      - id: init-completeness
        name: "G6: All model files exported in lia_models/__init__.py (ADR-002)"
        language: python
        entry: python3 scripts/check_init_completeness.py
        files: ^libs/models/lia_models/.*\.py$
        pass_filenames: false
        always_run: false

      - id: shim-sla
        name: "S7.1: Shim SLA — no orphan shims older than 90 days"
        language: system
        entry: python3 scripts/check_shim_sla.py
        files: ^(app|libs)/.*\.py$
        pass_filenames: false
        always_run: false

      - id: no-legacy-tool-decorator
        name: "S7.3: No `from langchain_core.tools import tool` in app/domains/*/tools/"
        language: system
        entry: python3 scripts/check_no_legacy_tool_decorator.py
        files: ^app/domains/.*/tools/.*\.py$
        pass_filenames: false
        always_run: false

      - id: tool-authoring-surface
        name: "S7.5: No `tool_registry.register(` outside app/tools/__init__.py (ADR-016)"
        language: system
        entry: python3 scripts/check_tool_authoring_surface.py
        files: ^app/.*\.py$
        pass_filenames: false
        always_run: false
      - id: no-getattr-on-models
        name: "G6: No getattr fallback on SQLAlchemy model rows"
        language: system
        entry: python3 scripts/check_no_getattr_on_models.py
        files: ^(app|libs)/.*\\.py$
        pass_filenames: false
        always_run: false
      - id: agent-compliance
        name: "G7: Canonical agent compliance"
        language: system
        entry: python3 scripts/check_agent_compliance.py
        files: ^app/domains/.*/agents/.*_react_agent\.py$
        pass_filenames: false
        always_run: false

