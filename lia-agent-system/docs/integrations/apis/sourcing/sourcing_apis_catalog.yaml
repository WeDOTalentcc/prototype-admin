# Catálogo de APIs Externas — Domínio Sourcing
# Version: 1.0 | Updated: 2026-03-19
# Referência para subagentes Z2-02: Planner, Search, Enrich, Engagement

apis:
  pearch_ai:
    name: "Pearch AI"
    purpose: "Busca externa de candidatos (190M+ perfis globais)"
    base_url: "https://api.pearch.ai/v2"
    auth: "Bearer token (PEARCH_API_KEY)"
    circuit_breaker: "PEARCH_CIRCUIT"
    used_by_agents: ["sourcing_search", "sourcing_enrich"]
    rate_limit: "100 req/min"
    endpoints:
      search: "POST /search"
      profile: "GET /profiles/{profile_id}"
      boolean: "POST /search/boolean"
    fallback: "RAGPipelineService (busca interna)"
    slo:
      availability: 99.5
      latency_p95_ms: 3000

  apify:
    name: "Apify"
    purpose: "Web scraping — salary data, job boards"
    base_url: "https://api.apify.com/v2"
    auth: "Bearer token (APIFY_API_KEY)"
    circuit_breaker: "APIFY_CIRCUIT"
    used_by_agents: ["sourcing_planner"]
    rate_limit: "60 req/min"
    endpoints:
      run_actor: "POST /acts/{actorId}/runs"
      get_dataset: "GET /datasets/{datasetId}/items"
    fallback: "static_salary_benchmark (setor)"
    slo:
      availability: 99.0
      latency_p95_ms: 10000

  linkedin_ats_sync:
    name: "LinkedIn ATS Sync (via Merge)"
    purpose: "Importar candidatos e perfis do LinkedIn via Merge connector"
    base_url: "https://api.merge.dev/api/ats/v1"
    auth: "X-Account-Token (MERGE_ACCESS_TOKEN)"
    circuit_breaker: "MERGE_CIRCUIT"
    used_by_agents: ["sourcing_search"]
    rate_limit: "200 req/min"
    endpoints:
      candidates: "GET /candidates"
      applications: "GET /applications"
    fallback: "internal_talent_pool"
    slo:
      availability: 99.5
      latency_p95_ms: 2000

  gupy:
    name: "Gupy ATS"
    purpose: "Sincronização bidirecional de vagas e candidatos"
    base_url: "https://api.gupy.io/api/v1"
    auth: "API Key (GUPY_API_KEY)"
    circuit_breaker: "GUPY_CIRCUIT"
    used_by_agents: ["sourcing_search", "sourcing_enrich"]
    rate_limit: "300 req/min"
    endpoints:
      jobs: "GET /jobs"
      candidates: "GET /candidates"
      applications: "GET /applications"
    fallback: "internal_ats_cache"
    slo:
      availability: 99.0
      latency_p95_ms: 1500

  pandape:
    name: "Pandapé ATS"
    purpose: "Sincronização bidirecional de vagas e candidatos"
    base_url: "https://api.pandape.com.br/v1"
    auth: "API Key (PANDAPE_API_KEY)"
    circuit_breaker: "PANDAPE_CIRCUIT"
    used_by_agents: ["sourcing_search"]
    rate_limit: "200 req/min"
    endpoints:
      jobs: "GET /vagas"
      candidates: "GET /candidatos"
    fallback: "internal_ats_cache"
    slo:
      availability: 99.0
      latency_p95_ms: 2000

subagent_api_mapping:
  sourcing_planner:
    primary: ["apify"]
    secondary: []
    description: "Usa Apify para benchmark salarial e análise de mercado"
  sourcing_search:
    primary: ["pearch_ai", "gupy", "pandape"]
    secondary: ["linkedin_ats_sync"]
    description: "Busca multi-fonte: Pearch externo + ATSs internos"
  sourcing_enrich:
    primary: ["pearch_ai", "gupy"]
    secondary: []
    description: "Enriquece perfis via Pearch e Gupy para scoring"
  sourcing_engagement:
    primary: []
    secondary: []
    description: "Usa apenas banco interno — sem API externa para outreach"
