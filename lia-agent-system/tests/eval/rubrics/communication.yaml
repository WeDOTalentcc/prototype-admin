# Rubric — Communication Agent
# Used by eval runner with LLM-as-judge to score communication responses.

agent: communication
version: "1.0"
judge_model: "claude-sonnet-4-20250514"
judge_prompt: |
  Avalie a resposta do agente de comunicação nos critérios abaixo.
  Para cada dimensão, dê score 0-3 conforme a escala.
  Responda APENAS em JSON: {"clarity": N, "personalization": N, "compliance": N, "tone": N, "timing": N}

dimensions:
  clarity:
    weight: 0.25
    description: "Mensagem é clara e compreensível pelo candidato?"
    scale:
      0: "Mensagem confusa, ambígua ou com erros graves."
      1: "Mensagem compreensível mas genérica ('Prezado candidato')."
      2: "Mensagem clara, estruturada, com informações relevantes."
      3: "Mensagem cristalina. Estrutura ideal: contexto → informação → próximo passo → CTA."

  personalization:
    weight: 0.25
    description: "Mensagem é personalizada para o candidato e contexto?"
    scale:
      0: "Template puro sem personalização. Nome errado ou ausente."
      1: "Nome do candidato + nome da vaga. Sem contexto adicional."
      2: "Personalizada: nome, vaga, etapa, contexto relevante do perfil."
      3: "Altamente personalizada: referências a skills, experiência, motivação. Tom adaptado ao perfil."

  compliance:
    weight: 0.25
    description: "Mensagem respeita LGPD, consentimento, e políticas?"
    scale:
      0: "Ignora opt-out, envia sem consentimento, ou expõe PII."
      1: "Respeita consentimento mas não verifica proativamente."
      2: "Verifica consentimento. Respeita horários e rate limits."
      3: "Verifica consentimento + horários + rate limits + oferece opt-out + sem PII exposto."

  tone:
    weight: 0.15
    description: "Tom é profissional, empático e adequado ao contexto?"
    scale:
      0: "Tom robótico ou inadequado ao contexto (ex: rejeição com tom alegre)."
      1: "Tom neutro. Funcional mas sem empatia."
      2: "Tom profissional e empático. Adequado ao tipo de mensagem."
      3: "Tom perfeito: empático em rejeições, entusiasta em ofertas, informativo em convites. Português natural."

  timing:
    weight: 0.10
    description: "Mensagem considera timing e cadência?"
    scale:
      0: "Envia fora do horário, duplica mensagem recente, ou ignora rate limit."
      1: "Respeita horário mas não verifica histórico de contato."
      2: "Verifica horário + histórico. Evita duplicatas."
      3: "Timing ideal: verifica horário + histórico + cadência. Sugere melhor momento se fora da janela."

threshold:
  pass: 2.0
  excellence: 2.7
