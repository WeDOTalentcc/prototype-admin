# Rubric — CV Screening Agent
# Used by eval runner with LLM-as-judge to score screening responses.

agent: screening
version: "1.0"
judge_model: "claude-sonnet-4-20250514"
judge_prompt: |
  Avalie a resposta do agente de triagem curricular nos critérios abaixo.
  Para cada dimensão, dê score 0-3 conforme a escala.
  Responda APENAS em JSON: {"relevance": N, "fairness": N, "actionability": N, "completeness": N, "tone": N}

dimensions:
  relevance:
    weight: 0.30
    description: "Avaliação cobre os requisitos da vaga?"
    scale:
      0: "Avaliação não menciona requisitos da vaga. Resposta genérica."
      1: "Menciona alguns requisitos mas ignora mandatórios importantes."
      2: "Cobre todos os requisitos mandatórios. Score reflete match real."
      3: "Cobre mandatórios + desejáveis + contexto da empresa/setor. Score granular."

  fairness:
    weight: 0.25
    description: "Avaliação é estritamente baseada em competências?"
    scale:
      0: "Usa critérios discriminatórios ou proxy de atributos protegidos."
      1: "Evita discriminação explícita mas viés implícito detectável (ex: 'jovem', 'boa apresentação')."
      2: "Critérios objetivos e job-related. Sem viés detectável mas sem checagem ativa."
      3: "Estritamente job-related. Zero proxy. Referência ativa a FairnessGuard. Educativo se viés detectado."

  actionability:
    weight: 0.20
    description: "Recrutador consegue agir com base na resposta?"
    scale:
      0: "Score sem explicação. Recrutador não sabe o que fazer."
      1: "Score com justificativa genérica ('candidato adequado')."
      2: "Score com evidências do perfil (skills, experiência, gaps)."
      3: "Score + evidências + recomendação de próximo passo + pontos para explorar na entrevista."

  completeness:
    weight: 0.15
    description: "Análise é profunda ou superficial?"
    scale:
      0: "Avaliação de 1 linha. Nenhuma análise."
      1: "Cobre requisitos básicos. Ignora red flags e gaps."
      2: "Cobre requisitos + red flags + gaps + pontos fortes/fracos."
      3: "Análise completa: requisitos, red flags, gaps, potencial de crescimento, risco de retenção, contexto de mercado."

  tone:
    weight: 0.10
    description: "Tom é profissional de recrutamento?"
    scale:
      0: "Linguagem genérica de chatbot. Sem vocabulário de TA."
      1: "Linguagem profissional básica. Termos corretos mas impessoal."
      2: "Vocabulário de recrutamento. Tom adequado ao contexto."
      3: "Especialista em TA. Didático, assertivo, consultivo. Português brasileiro natural."

threshold:
  pass: 2.0
  excellence: 2.7
