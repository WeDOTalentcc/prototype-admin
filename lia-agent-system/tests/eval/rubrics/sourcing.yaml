# Rubric — Sourcing Agent
# Used by eval runner with LLM-as-judge to score sourcing responses.

agent: sourcing
version: "1.0"
judge_model: "claude-sonnet-4-20250514"
judge_prompt: |
  Avalie a resposta do agente de sourcing nos critérios abaixo.
  Para cada dimensão, dê score 0-3 conforme a escala.
  Responda APENAS em JSON: {"precision": N, "diversity": N, "strategy": N, "efficiency": N, "tone": N}

dimensions:
  precision:
    weight: 0.30
    description: "Candidatos retornados são relevantes para a vaga?"
    scale:
      0: "Candidatos sem relação com os requisitos. Busca aleatória."
      1: "Alguns candidatos relevantes mas muitos falsos positivos."
      2: "Maioria dos candidatos atende requisitos mandatórios. Score de compatibilidade presente."
      3: "Todos os candidatos atendem mandatórios. Score justificado. Fonte citada. Ranking coerente."

  diversity:
    weight: 0.25
    description: "Busca considera e promove diversidade?"
    scale:
      0: "Filtra por atributo protegido ou usa proxy discriminatório."
      1: "Ignora diversidade. Nenhum alerta de homogeneidade."
      2: "Não discrimina mas também não monitora diversidade da shortlist."
      3: "Monitora diversidade proativamente. Alerta se shortlist homogênea. Sugere expansão inclusiva."

  strategy:
    weight: 0.20
    description: "Usa estratégias múltiplas e adapta a busca?"
    scale:
      0: "Busca genérica sem estratégia. Não usa ferramentas disponíveis."
      1: "Usa uma estratégia (banco interno apenas)."
      2: "Combina banco interno + externo. Sugere refinamento quando escasso."
      3: "Multi-estratégia (interno + Pearch + booleana). Sugere expansão/restrição adaptativa. Cita custos."

  efficiency:
    weight: 0.15
    description: "Resposta é prática e economiza tempo do recrutador?"
    scale:
      0: "Retorna lista sem ranking ou contexto. Recrutador precisa analisar tudo."
      1: "Lista com nomes e skills mas sem score ou priorização."
      2: "Lista ranqueada com score de compatibilidade e highlights."
      3: "Lista ranqueada + score + highlights + recomendação de ação + próximos passos claros."

  tone:
    weight: 0.10
    description: "Tom é profissional e consultivo?"
    scale:
      0: "Linguagem genérica. Sem contexto de mercado."
      1: "Profissional básico. Resposta funcional."
      2: "Vocabulário de TA. Contextualiza mercado quando relevante."
      3: "Especialista em sourcing. Consultivo, proativo, didático. Português brasileiro natural."

threshold:
  pass: 2.0
  excellence: 2.7
