name: Deploy LIA Frontend

on:
  push:
    branches: [develop, main]

env:
  GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
  GCP_REGION: ${{ secrets.GCP_REGION || 'us-east1' }}
  IMAGE_NAME: lia-frontend

jobs:
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: npm audit (production deps)
        continue-on-error: true
        run: npm audit --production --audit-level=high

  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: security
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ secrets.GCP_PROJECT }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set GCP project
        run: gcloud config set project ${{ env.GCP_PROJECT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Set environment tag
        id: env
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "env_name=production" >> "$GITHUB_OUTPUT"
            echo "service_suffix=" >> "$GITHUB_OUTPUT"
          else
            echo "env_name=staging" >> "$GITHUB_OUTPUT"
            echo "service_suffix=-staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_APP_URL=${{ secrets.APP_BASE_URL }} \
            --build-arg NEXT_PUBLIC_SENTRY_DSN=${{ secrets.SENTRY_DSN_FRONTEND }} \
            --build-arg NEXT_PUBLIC_WS_URL=${{ secrets.WS_URL }} \
            --build-arg NEXT_PUBLIC_WHATSAPP_NUMBER=${{ secrets.WHATSAPP_NUMBER }} \
            -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/lia/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/lia/${{ env.IMAGE_NAME }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/lia/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/lia/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy lia-frontend${{ steps.env.outputs.service_suffix }} \
            --project ${{ env.GCP_PROJECT }} \
            --image ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/lia/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --port 3000 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 10 \
            --set-env-vars "NODE_ENV=production,BACKEND_URL=${{ secrets.BACKEND_INTERNAL_URL }}" \
            --allow-unauthenticated \
            --quiet

      - name: Smoke test
        run: |
          SERVICE_URL=$(gcloud run services describe lia-frontend${{ steps.env.outputs.service_suffix }} \
            --region ${{ env.GCP_REGION }} --format='value(status.url)')
          echo "Service URL: $SERVICE_URL"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$SERVICE_URL/" || true)
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ Smoke test passed (HTTP $HTTP_STATUS)"
          else
            echo "⚠️ Smoke test returned HTTP $HTTP_STATUS (non-blocking)"
          fi
