# A tag 'version' não é mais necessária para versões recentes do Docker Compose.
# Removê-la elimina o warning.

services:
  db:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    image: ats_api_postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.20
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1024m -Xmx1024m
    ports:
      - "9201:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    expose:
      - "5672"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8025/api/v1/info"]
      interval: 10s
      timeout: 5s
      retries: 3

  sidekiq:
    build:
      context: .
      args:
        APP_ENV: development
    # -c alinha com pool (db pequeno). Remova -c para usar config/sidekiq.yml
    command: bundle exec sidekiq -C config/sidekiq.yml -c 10
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
      elasticsearch:
        condition: service_started
      mailpit:
        condition: service_started
    environment:
      RAILS_ENV: development # <-- só aqui
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_URL: redis://redis:6379/0
      ELASTICSEARCH_URL: http://elasticsearch:9200
      APP_ENV: development
      SIDEKIQ_CONCURRENCY: 10
      SMTP_HOST: mailpit
    extra_hosts:
      - "host.docker.internal:host-gateway"

  sidekiq_critical:
    build:
      context: .
      args:
        APP_ENV: development
    command: bundle exec sidekiq -C config/sidekiq_critical.yml
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    environment:
      RAILS_ENV: development
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_URL: redis://redis:6379/0
      ELASTICSEARCH_URL: http://elasticsearch:9200
      APP_ENV: development
      SMTP_HOST: mailpit
    extra_hosts:
      - "host.docker.internal:host-gateway"

  sneakers:
    build:
      context: .
      args:
        APP_ENV: development
    command: bundle exec rake sneakers:run
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_URL: redis://redis:6379/0
      ELASTICSEARCH_URL: http://elasticsearch:9200
      RAILS_ENV: development
      APP_ENV: development
    extra_hosts:
      - "host.docker.internal:host-gateway"


  web:
    build:
      context: .
      args:
        APP_ENV: development
    command: bash -c "rm -f tmp/pids/server.pid && bundle exec rails server -b 0.0.0.0"
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
    ports:
      - "8080:3000"
    depends_on:
      db:
        condition: service_healthy
      elasticsearch:
        condition: service_started
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_URL: redis://redis:6379/0
      ELASTICSEARCH_URL: http://elasticsearch:9200
      RAILS_ENV: development
      APP_ENV: development
      RECRUITER_AGENT_API_URL: http://api:5001
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      SMTP_HOST: mailpit
    stdin_open: true
    tty: true
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
    name: ats_postgres_data
  esdata:
    name: ats_elasticsearch_data
  bundle_cache:
    name: ats_bundle_cache

networks:
  default:
    name: ats_network
    external: true
