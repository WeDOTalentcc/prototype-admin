evaluation_report_check_worker:
  cron: "0 12 * * *" # Todos os dias às 12h (horário do servidor)
  class: "EvaluationReportCheckWorker"
  queue: default
  args:
    - 5 # dias atrás para considerar o created_at

microsoft_token_refresh_job:
  cron: "*/5 * * * *" # A cada 5 minutos
  class: "Microsoft::TokenRefreshJob"
  queue: default
  description: "Proactive refresh of Microsoft tokens expiring within 10 minutes"

chatbot_timeout_check:
  cron: "* * * * *" # A cada 1 minuto
  class: "ChatbotTimeoutCheckWorker"
  queue: default
  description: "Verifica timeouts e envia lembretes para sessões de triagem WhatsApp"

llm_quota_usage_sync:
  cron: "0 * * * *"
  class: "Llm::QuotaUsageSyncJob"
  queue: low
  description: "Sync LLM quota usage snapshots with real data from llm_usages"

llm_monthly_quota_setup:
  cron: "5 0 1 * *"
  class: "Llm::MonthlyQuotaSetupJob"
  queue: low
  description: "Pre-create monthly quota usage records on the 1st of each month"

llm_expire_extra_budget:
  cron: "10 0 * * *"
  class: "Llm::ExpireExtraBudgetJob"
  queue: low
  description: "Expire extra budgets past their expiration date"

teams_subscription_renewal:
  cron: "*/15 * * * *"
  class: "Microsoft::TeamsSubscriptionRenewalJob"
  queue: default
  description: "Renew Microsoft Teams chat subscriptions before they expire (55min TTL, check every 15min)"

teams_subscription_full_reset:
  cron: "0 6,18 * * *"
  class: "Microsoft::TeamsSubscriptionFullResetJob"
  queue: default
  description: "Full reset of all Teams subscriptions 2x/day — deletes from MS and recreates fresh to prevent silent failures"

send_screening_evaluations_cron:
  cron: "*/10 * * * *"
  class: "Jobs::SendScreeningEvaluationsCronJob"
  queue: low
  description: "Fallback: enqueue screening evaluations for jobs with is_screening_active (every 10min)"

evaluation_escalation_cron:
  cron: "0 8 * * *"
  class: "Evaluations::EscalationJob"
  queue: default
  description: "Escalação de triagem: 48h, 72h, 96h para EvaluationCandidates internal não concluídos"

background_agents_morning:
  cron: "0 9 * * 1-5"
  class: "BackgroundAgents::CronJob"
  queue: background_agents
  description: "Dispatch background sourcing agents — morning cycle (Mon-Fri 9AM UTC)"

background_agents_afternoon:
  cron: "0 15 * * 1-5"
  class: "BackgroundAgents::CronJob"
  queue: background_agents
  description: "Dispatch background sourcing agents — afternoon cycle (Mon-Fri 3PM UTC)"
email_followup_checker:
  cron: "0 * * * *"
  class: "EmailFollowupCheckerJob"
  queue: default
  description: "Verifica candidatos sem resposta e re-envia emails a cada 24h por até 7 dias"
lgpd_candidate_cleanup:
  cron: "0 2 * * *" # Daily at 02:00 UTC — LGPD Art. 16/18 data retention
  class: "LgpdCandidateCleanupJob"
  queue: low_priority
  description: "GAP-10-004: Anonymize Rails candidates whose lgpd_expires_at has passed"
