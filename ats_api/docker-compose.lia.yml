# docker-compose.lia.yml
# Sobe apenas os serviços Rails — reutiliza postgres/redis/rabbitmq do stack LIA.
# Uso: docker compose -f docker-compose.lia.yml up
#
# Pré-requisito: os containers lia-postgres, lia-redis, lia-rabbitmq precisam estar
# conectados à rede ats_network (feito uma vez com:
#   docker network connect ats_network lia-postgres
#   docker network connect ats_network lia-redis
#   docker network connect ats_network lia-rabbitmq
# )

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.20
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9201:9200"
    volumes:
      - ats_esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025"
      - "1025:1025"

  web:
    build:
      context: .
      args:
        APP_ENV: development
    command: bash -c "rm -f tmp/pids/server.pid && bundle exec rails server -b 0.0.0.0"
    volumes:
      - .:/rails
      - ats_bundle:/usr/local/bundle
    ports:
      - "8080:3000"
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: lia-postgres
      POSTGRES_PORT: 5432
      REDIS_URL: redis://lia-redis:6379/2
      RABBITMQ_URL: amqp://guest:guest@lia-rabbitmq:5672
      ELASTICSEARCH_URL: http://elasticsearch:9200
      RAILS_ENV: development
      APP_ENV: development
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      RAILS_JWT_SECRET_KEY: ${RAILS_JWT_SECRET_KEY}
      SMTP_HOST: mailpit
    stdin_open: true
    tty: true
    extra_hosts:
      - "host.docker.internal:host-gateway"

  sidekiq:
    build:
      context: .
      args:
        APP_ENV: development
    command: bundle exec sidekiq
    volumes:
      - .:/rails
      - ats_bundle:/usr/local/bundle
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: lia-postgres
      POSTGRES_PORT: 5432
      REDIS_URL: redis://lia-redis:6379/2
      RABBITMQ_URL: amqp://guest:guest@lia-rabbitmq:5672
      ELASTICSEARCH_URL: http://elasticsearch:9200
      RAILS_ENV: development
      APP_ENV: development
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      RAILS_JWT_SECRET_KEY: ${RAILS_JWT_SECRET_KEY}
      SIDEKIQ_CONCURRENCY: 5
      SMTP_HOST: mailpit
    extra_hosts:
      - "host.docker.internal:host-gateway"

  sneakers:
    build:
      context: .
      args:
        APP_ENV: development
    command: bundle exec rake sneakers:run
    volumes:
      - .:/rails
      - ats_bundle:/usr/local/bundle
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: lia-postgres
      POSTGRES_PORT: 5432
      REDIS_URL: redis://lia-redis:6379/2
      RABBITMQ_URL: amqp://guest:guest@lia-rabbitmq:5672
      ELASTICSEARCH_URL: http://elasticsearch:9200
      RAILS_ENV: development
      APP_ENV: development
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      RAILS_JWT_SECRET_KEY: ${RAILS_JWT_SECRET_KEY}
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  ats_esdata:
    name: ats_elasticsearch_data
  ats_bundle:
    name: ats_bundle_cache

networks:
  default:
    name: ats_network
    external: true
