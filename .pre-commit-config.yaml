# Pre-commit hooks — WeDOTalent / lia-agent-system
#
# Instalação (1x por dev):
#   pip install pre-commit
#   pre-commit install --hook-type commit-msg
#
# Documentação completa: scripts/README_HOOKS.md

repos:
  - repo: local
    hooks:
      - id: branch-map-theme-check
        name: Branch Map Theme Check
        description: |
          Bloqueia commits em branches genéricas (sprint accumulators) que tocam
          temas não mapeados em docs/BRANCH_MAP.md. Veja CLAUDE.md (Guide 1+2).
        entry: python3 scripts/check_branch_map.py
        language: system
        stages: [commit-msg]
        pass_filenames: false
        verbose: true
      - id: lia-field-toggles-sync-warn
        name: LIA Field Toggles — TS↔Python sync
        description: |
          Schema-sync entre DEFAULT_FIELD_TOGGLES (Python) e LIA_FIELD_DEFINITIONS
          (TypeScript). Audit 2026-05-21 P2-10. Baseline 34/34 in sync — drift
          aqui é silent + devastating (recruiter configura toggle, backend nao
          tem row, persistencia vira no-op).
        entry: python3 lia-agent-system/scripts/check_lia_field_definitions_sync.py
        language: system
        pass_filenames: false
        verbose: true
      - id: lia-agent-respects-toggles
        name: Agent respeita lia_field_toggles
        description: |
          Anti-regressao P0-1: agentes que injetam company fields em system
          prompts DEVEM passar pelo helper build_company_agent_context.
          Baseline=0 — qualquer offender novo eh flag P1 imediato.
        entry: python3 lia-agent-system/scripts/check_agent_respects_lia_toggles.py
        language: system
        pass_filenames: false
        verbose: true
