repos:
  # ── Backend (Python) ─────────────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff
        name: ruff (lint + autofix)
        args: [--fix, --exit-non-zero-on-fix]
        files: ^lia-agent-system/
      - id: ruff-format
        name: ruff-format
        files: ^lia-agent-system/

  # ── mypy: static type checking (warn-only during gradual adoption) ────────
  # Non-blocking wrapper: runs mypy and prints diagnostics but always exits 0.
  # Remove the '|| true' suffix when ready to enforce (planned: after full type coverage).
  - repo: local
    hooks:
      - id: mypy-backend-warn-only
        name: mypy (BE type check — warn only, non-blocking)
        language: system
        entry: bash -c 'cd lia-agent-system && python3 -m mypy app/ --ignore-missing-imports --no-error-summary --config-file=pyproject.toml 2>&1 || true'
        pass_filenames: false
        always_run: false
        files: ^lia-agent-system/app/.*\.py$

  # ── Frontend (TypeScript) ─────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: biome-check
        name: Biome Check (FE)
        entry: bash -c 'cd plataforma-lia && npx biome check --write src/ 2>&1'
        language: system
        files: \.(ts|tsx|js|jsx)$
        pass_filenames: false

      - id: ts-nocheck
        name: No @ts-nocheck in source files
        entry: bash -c 'grep -rn "@ts-nocheck" plataforma-lia/src/ --include="*.ts" --include="*.tsx" && echo "ERROR: @ts-nocheck found" && exit 1 || exit 0'
        language: system
        pass_filenames: false

  # ── General ───────────────────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: no-print-in-app
        name: No print() in BE app code
        entry: bash -c 'grep -rn "^\s*print(" lia-agent-system/app/ --include="*.py" | grep -v "# noqa" | grep -v "__pycache__" && echo "Use logger instead of print()" && exit 1 || exit 0'
        language: system
        pass_filenames: false

      - id: no-console-log
        name: No console.log in FE source
        entry: bash -c 'grep -rn "console\.log(" plataforma-lia/src/ --include="*.ts" --include="*.tsx" | grep -v "// eslint-disable" | grep -v "console\.log.*TODO" | head -5 && echo "Remove console.log statements before committing" && exit 1 || exit 0'
        language: system
        pass_filenames: false

      - id: no-hardcoded-secrets
        name: No hardcoded secrets
        entry: bash -c 'grep -rn "change-this-in-production\|sk-[a-zA-Z0-9]*\|AIzaSy[a-zA-Z0-9]*" lia-agent-system/app/ --include="*.py" | grep -v ".env\|config.py" && echo "Potential hardcoded secret found" && exit 1 || exit 0'
        language: system
        pass_filenames: false

  # ── Standard hooks ────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.(md|txt)$
      - id: end-of-file-fixer
        exclude: \.(md|txt)$
      - id: check-yaml
      - id: check-json
        exclude: tsconfig.*\.json$
      - id: check-merge-conflict
      - id: detect-private-key
